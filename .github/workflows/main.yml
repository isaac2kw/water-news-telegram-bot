name: Daily Water News Telegram Bot

on:
  workflow_dispatch:
    inputs:
      backfill_mode:
        description: "Backfill mode"
        required: false
        default: "false"
      backfill_start_date:
        description: "Backfill start date, e.g. 2026-05-01"
        required: false
        default: ""
      backfill_end_date:
        description: "Backfill end date, e.g. 2026-05-31"
        required: false
        default: ""
      send_telegram:
        description: "Send Telegram message"
        required: false
        default: "true"

  schedule:
    # GitHub Actions cron uses UTC. 22:00 UTC = 07:00 KST.
    - cron: "0 22 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: water-news-telegram-bot

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run news bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: "gpt-4o-mini"
          MAX_ITEMS: "30"
          MIN_SCORE: "8"
          BACKFILL_MODE: ${{ github.event.inputs.backfill_mode || 'false' }}
          BACKFILL_START_DATE: ${{ github.event.inputs.backfill_start_date || '' }}
          BACKFILL_END_DATE: ${{ github.event.inputs.backfill_end_date || '' }}
          SEND_TELEGRAM: ${{ github.event.inputs.send_telegram || 'true' }}
        run: python main.py

      - name: Commit generated files
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          
          git pull --rebase origin main
          
          git add sent_links.json news_history.json ../docs
          
          git commit -m "Update water news reports" || echo "No changes to commit"
          
          git push origin main

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
