name: Daily Water News Telegram Bot

on:
  workflow_dispatch:
    inputs:
      backfill_mode:
        description: "Backfill mode"
        required: false
        default: "false"
      backfill_start_date:
        description: "Backfill start date, e.g. 2026-05-01"
        required: false
        default: ""
      backfill_end_date:
        description: "Backfill end date, e.g. 2026-05-31"
        required: false
        default: ""
      send_telegram:
        description: "Send Telegram message"
        required: false
        default: "false"

  schedule:
    # GitHub Actions cron uses UTC.
    # 22:00 UTC = 07:00 KST.
    - cron: "0 22 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: daily-water-news-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      TZ: Asia/Seoul

    defaults:
      run:
        working-directory: water-news-telegram-bot

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Prepare generated file paths
        run: |
          mkdir -p ../docs/reports
          mkdir -p ../docs/weekly
          mkdir -p ../docs/monthly

          if [ ! -f news_history.json ]; then
            echo "[]" > news_history.json
          fi

          if [ ! -f sent_links.json ]; then
            echo "[]" > sent_links.json
          fi

      - name: Show trigger information
        run: |
          echo "GitHub event name: ${{ github.event_name }}"
          echo "KST now:"
          date
          echo "Backfill mode: ${{ github.event_name == 'workflow_dispatch' && inputs.backfill_mode || 'false' }}"
          echo "Backfill start date: ${{ github.event_name == 'workflow_dispatch' && inputs.backfill_start_date || '' }}"
          echo "Backfill end date: ${{ github.event_name == 'workflow_dispatch' && inputs.backfill_end_date || '' }}"
          echo "Send telegram: ${{ github.event_name == 'schedule' && 'true' || inputs.send_telegram }}"

      - name: Run news bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: "gpt-5.4"
          MAX_ITEMS: "30"
          MIN_SCORE: "8"

          BACKFILL_MODE: ${{ github.event_name == 'workflow_dispatch' && inputs.backfill_mode || 'false' }}
          BACKFILL_START_DATE: ${{ github.event_name == 'workflow_dispatch' && inputs.backfill_start_date || '' }}
          BACKFILL_END_DATE: ${{ github.event_name == 'workflow_dispatch' && inputs.backfill_end_date || '' }}

          # Scheduled run always sends Telegram.
          # Manual run follows the workflow_dispatch input.
          SEND_TELEGRAM: ${{ github.event_name == 'schedule' && 'true' || inputs.send_telegram }}

          TZ: Asia/Seoul
        run: python main.py

      - name: Commit generated files
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git status

          git add -A ../docs

          if [ -f sent_links.json ]; then
            git add sent_links.json
          fi

          if [ -f news_history.json ]; then
            git add news_history.json
          fi

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Update water news reports"

          for i in 1 2 3; do
            echo "Push attempt $i"

            git pull --rebase --autostash origin main

            if git push origin HEAD:main; then
              echo "Push succeeded"
              exit 0
            fi

            echo "Push failed. Retrying after 10 seconds..."
            sleep 10
          done

          echo "Push failed after 3 attempts"
          exit 1

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
