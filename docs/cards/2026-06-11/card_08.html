<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  :root{--main-blue:#0075C1;--yellow:#DDA11D;--navy:#00205D;--tint:#E6F1FB;--card-bg:#F5F7FA;--line:#B5D4F4;--gray-light:#888780;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;}
  .card{width:1080px;height:1080px;background:#ffffff;position:relative;overflow:hidden;}
  .pad{padding:0 90px;}
  .footer{position:absolute;left:0;right:0;bottom:46px;padding:0 90px;}
  .footer .line{height:1px;background:var(--line);margin-bottom:22px;}
  .footer .row{display:flex;align-items:center;justify-content:space-between;}
  .logo{font-size:26px;font-weight:700;}
  .logo .h{color:var(--main-blue);} .logo .m{color:var(--yellow);} .logo .inc{color:var(--navy);}
  .footer .center{color:var(--main-blue);font-size:22px;font-weight:600;letter-spacing:2px;}
  .footer .right{width:120px;}
  .label{display:flex;align-items:center;gap:12px;padding-top:96px;color:var(--main-blue);font-size:24px;font-weight:700;letter-spacing:3px;}
  .label .ldot{width:10px;height:10px;border-radius:50%;background:var(--main-blue);}
  .label .lbadge{margin-left:6px;background:var(--tint);color:var(--main-blue);font-size:18px;letter-spacing:2px;padding:5px 14px;border-radius:20px;}
  .ctitle{margin-top:34px;color:var(--navy);font-size:50px;font-weight:700;line-height:1.18;}
  .ctitle .b{color:var(--main-blue);} .ctitle .y{color:var(--yellow);}
  .cdivider{width:160px;height:4px;background:var(--main-blue);margin-top:30px;}
  .info{margin-top:40px;}
  .facts{position:absolute;left:90px;right:90px;bottom:150px;display:flex;gap:18px;}
  .fact{flex:1;background:var(--card-bg);border-radius:16px;padding:24px 22px;}
  .fact .k{color:var(--gray-light);font-size:17px;letter-spacing:1px;margin-bottom:10px;}
  .fact .v{color:var(--navy);font-size:22px;font-weight:700;line-height:1.25;}
  .fact .v .b{color:var(--main-blue);} .fact .v .y{color:var(--yellow);}
</style>
</head>
<body>
<div class="card" id="card_08">
  <div class="pad">
    <div class="label"><span class="ldot"></span>INCIDENT<span class="lbadge">KOREA</span></div>
    <div class="ctitle"><span class="y">Panpo</span> Sewage Plant <span class="b">Illegally Discharges</span> Wastewater to Coast</div>
    <div class="cdivider"></div>
    <div class="info">
      <svg width="900" height="320" viewBox="0 0 900 320" xmlns="http://www.w3.org/2000/svg">
        <rect x="40" y="100" width="220" height="140" rx="12" fill="#E6F1FB" stroke="#0075C1" stroke-width="2"/>
        <text x="150" y="155" text-anchor="middle" font-size="22" font-weight="700" fill="#00205D">Panpo WWTP</text>
        <text x="150" y="185" text-anchor="middle" font-size="15" fill="#0075C1">Sewage Plant</text>
        <text x="150" y="215" text-anchor="middle" font-size="13" fill="#888780">Source</text>
        <polygon points="280,165 340,165 340,145 380,170 340,195 340,175 280,175" fill="#DDA11D"/>
        <text x="330" y="135" text-anchor="middle" font-size="14" font-weight="700" fill="#DDA11D">UNAUTHORIZED</text>
        <rect x="400" y="100" width="220" height="140" rx="12" fill="#DDA11D" opacity="0.15" stroke="#DDA11D" stroke-width="2"/>
        <text x="510" y="155" text-anchor="middle" font-size="22" font-weight="700" fill="#DDA11D">DISCHARGE</text>
        <text x="510" y="185" text-anchor="middle" font-size="15" fill="#00205D">Raw Wastewater</text>
        <text x="510" y="215" text-anchor="middle" font-size="13" fill="#888780">Spill Event</text>
        <polygon points="640,165 700,165 700,145 740,170 700,195 700,175 640,175" fill="#0075C1"/>
        <rect x="760" y="100" width="100" height="140" rx="12" fill="#0075C1"/>
        <text x="810" y="160" text-anchor="middle" font-size="18" font-weight="700" fill="#fff">COAST</text>
        <text x="810" y="185" text-anchor="middle" font-size="13" fill="#fff">Sea</text>
        <text x="810" y="210" text-anchor="middle" font-size="13" fill="#fff">Impact</text>
        <text x="450" y="280" text-anchor="middle" font-size="16" fill="#00205D" font-weight="600">Pollution Pathway · Coastal Contamination Risk</text>
      </svg>
    </div>
  </div>
  <div class="facts">
    <div class="fact"><div class="k">CATEGORY</div><div class="v"><span class="b">Incident</span></div></div>
    <div class="fact"><div class="k">SITE</div><div class="v"><span class="y">Panpo</span> WWTP</div></div>
    <div class="fact"><div class="k">IMPACT</div><div class="v">Coastal Spill</div></div>
  </div>
  <div class="footer"><div class="line"></div><div class="row"><div class="logo"><span class="h">Hifil</span><span class="m">M</span>&nbsp;<span class="inc">INC.</span></div><div class="center">Water Treatment</div><div class="right"></div></div></div>
</div>
</body>
</html>
