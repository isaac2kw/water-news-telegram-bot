<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  :root{--main-blue:#0075C1;--yellow:#DDA11D;--navy:#00205D;--tint:#E6F1FB;--card-bg:#F5F7FA;--line:#B5D4F4;--gray-light:#888780;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;}
  .card{width:1080px;height:1080px;background:#ffffff;position:relative;overflow:hidden;}
  .pad{padding:0 90px;}
  .footer{position:absolute;left:0;right:0;bottom:46px;padding:0 90px;}
  .footer .line{height:1px;background:var(--line);margin-bottom:22px;}
  .footer .row{display:flex;align-items:center;justify-content:space-between;}
  .logo{font-size:26px;font-weight:700;}
  .logo .h{color:var(--main-blue);} .logo .m{color:var(--yellow);} .logo .inc{color:var(--navy);}
  .footer .center{color:var(--main-blue);font-size:22px;font-weight:600;letter-spacing:2px;}
  .footer .right{width:120px;}
  .label{display:flex;align-items:center;gap:12px;padding-top:96px;color:var(--main-blue);font-size:24px;font-weight:700;letter-spacing:3px;}
  .label .ldot{width:10px;height:10px;border-radius:50%;background:var(--main-blue);}
  .label .lbadge{margin-left:6px;background:var(--tint);color:var(--main-blue);font-size:18px;letter-spacing:2px;padding:5px 14px;border-radius:20px;}
  .ctitle{margin-top:34px;color:var(--navy);font-size:50px;font-weight:700;line-height:1.18;}
  .ctitle .b{color:var(--main-blue);} .ctitle .y{color:var(--yellow);}
  .cdivider{width:160px;height:4px;background:var(--main-blue);margin-top:30px;}
  .info{margin-top:40px;}
  .facts{position:absolute;left:90px;right:90px;bottom:150px;display:flex;gap:18px;}
  .fact{flex:1;background:var(--card-bg);border-radius:16px;padding:24px 22px;}
  .fact .k{color:var(--gray-light);font-size:17px;letter-spacing:1px;margin-bottom:10px;}
  .fact .v{color:var(--navy);font-size:22px;font-weight:700;line-height:1.25;}
  .fact .v .b{color:var(--main-blue);} .fact .v .y{color:var(--yellow);}
</style>
</head>
<body>
<div class="card" id="card_05">
  <div class="pad">
    <div class="label"><span class="ldot"></span>INSIGHT<span class="lbadge">KOREA</span></div>
    <div class="ctitle"><span class="y">K-eco</span>: Wastewater Plants Transform into <span class="b">Smart Energy Hubs</span></div>
    <div class="cdivider"></div>
    <div class="info">
      <svg width="900" height="320" viewBox="0 0 900 320" xmlns="http://www.w3.org/2000/svg">
        <rect x="60" y="100" width="200" height="140" rx="12" fill="#E6F1FB" stroke="#0075C1" stroke-width="2"/>
        <text x="160" y="155" text-anchor="middle" font-size="22" font-weight="700" fill="#00205D">WWTP</text>
        <text x="160" y="185" text-anchor="middle" font-size="15" fill="#0075C1">Traditional</text>
        <text x="160" y="210" text-anchor="middle" font-size="15" fill="#888780">Treatment Only</text>
        <polygon points="285,165 340,165 340,145 380,170 340,195 340,175 285,175" fill="#DDA11D"/>
        <rect x="400" y="60" width="450" height="220" rx="14" fill="#DDA11D" opacity="0.1" stroke="#DDA11D" stroke-width="2"/>
        <text x="625" y="100" text-anchor="middle" font-size="22" font-weight="700" fill="#DDA11D">SMART ENERGY HUB</text>
        <circle cx="475" cy="170" r="40" fill="#0075C1"/>
        <text x="475" y="165" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">BIOGAS</text>
        <text x="475" y="182" text-anchor="middle" font-size="11" fill="#fff">Generation</text>
        <circle cx="625" cy="170" r="40" fill="#00205D"/>
        <text x="625" y="165" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">SOLAR</text>
        <text x="625" y="182" text-anchor="middle" font-size="11" fill="#fff">Power</text>
        <circle cx="775" cy="170" r="40" fill="#0075C1"/>
        <text x="775" y="165" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">HEAT</text>
        <text x="775" y="182" text-anchor="middle" font-size="11" fill="#fff">Recovery</text>
        <text x="625" y="250" text-anchor="middle" font-size="14" fill="#00205D">New Value Creation</text>
      </svg>
    </div>
  </div>
  <div class="facts">
    <div class="fact"><div class="k">CATEGORY</div><div class="v"><span class="b">Energy Vision</span></div></div>
    <div class="fact"><div class="k">AUTHOR</div><div class="v"><span class="y">K-eco</span></div></div>
    <div class="fact"><div class="k">FOCUS</div><div class="v">Smart Hub</div></div>
  </div>
  <div class="footer"><div class="line"></div><div class="row"><div class="logo"><span class="h">Hifil</span><span class="m">M</span>&nbsp;<span class="inc">INC.</span></div><div class="center">Water Treatment</div><div class="right"></div></div></div>
</div>
</body>
</html>
