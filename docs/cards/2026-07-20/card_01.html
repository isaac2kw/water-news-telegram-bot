<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  :root{--main-blue:#0075C1;--yellow:#DDA11D;--navy:#00205D;--tint:#E6F1FB;--card-bg:#F5F7FA;--line:#B5D4F4;--gray-light:#888780;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;}
  .card{width:1080px;height:1080px;background:#fff;position:relative;overflow:hidden;}
  .pad{padding:0 90px;}
  .footer{position:absolute;left:0;right:0;bottom:46px;padding:0 90px;}
  .footer .line{height:1px;background:var(--line);margin-bottom:22px;}
  .footer .row{display:flex;align-items:center;justify-content:space-between;}
  .logo{font-size:26px;font-weight:700;}
  .logo .h{color:var(--main-blue);} .logo .m{color:var(--yellow);} .logo .inc{color:var(--navy);}
  .footer .center{color:var(--main-blue);font-size:22px;font-weight:600;letter-spacing:2px;}
  .footer .right{width:120px;}
  .label{display:flex;align-items:center;gap:12px;padding-top:96px;color:var(--main-blue);font-size:24px;font-weight:700;letter-spacing:3px;}
  .label .ldot{width:10px;height:10px;border-radius:50%;background:var(--main-blue);}
  .label .lbadge{margin-left:6px;background:var(--tint);color:var(--main-blue);font-size:18px;letter-spacing:2px;padding:5px 14px;border-radius:20px;}
  .ctitle{margin-top:34px;color:var(--navy);font-size:52px;font-weight:700;line-height:1.18;}
  .ctitle .b{color:var(--main-blue);} .ctitle .y{color:var(--yellow);}
  .cdivider{width:160px;height:4px;background:var(--main-blue);margin-top:30px;}
  .info{margin-top:44px;}
  .facts{position:absolute;left:90px;right:90px;bottom:150px;display:flex;gap:18px;}
  .fact{flex:1;background:var(--card-bg);border-radius:16px;padding:26px 24px;}
  .fact .k{color:var(--gray-light);font-size:18px;letter-spacing:1px;margin-bottom:10px;}
  .fact .v{color:var(--navy);font-size:24px;font-weight:700;line-height:1.25;}
  .fact .v .b{color:var(--main-blue);} .fact .v .y{color:var(--yellow);}
</style>
</head>
<body>
<div class="card" id="card_01">
  <div class="pad">
    <div class="label"><span class="ldot"></span>INFRASTRUCTURE<span class="lbadge">KOREA</span></div>
    <div class="ctitle"><span class="y">Pocheon Urban Corp.</span> inspects new <span class="b">centrifugal dewatering unit</span> at Yongjeong WWTP</div>
    <div class="cdivider"></div>
    <div class="info">
      <svg width="900" height="320" viewBox="0 0 900 320" xmlns="http://www.w3.org/2000/svg">
        <rect x="40" y="120" width="180" height="90" rx="10" fill="#E6F1FB" stroke="#0075C1" stroke-width="2"/>
        <text x="130" y="155" text-anchor="middle" fill="#00205D" font-size="18" font-weight="700">Sludge</text>
        <text x="130" y="185" text-anchor="middle" fill="#0075C1" font-size="16">Feed</text>
        <polygon points="230,165 275,150 275,180" fill="#0075C1"/>
        <rect x="290" y="80" width="240" height="170" rx="14" fill="#0075C1"/>
        <circle cx="410" cy="165" r="55" fill="#DDA11D"/>
        <circle cx="410" cy="165" r="30" fill="#00205D"/>
        <text x="410" y="290" text-anchor="middle" fill="#00205D" font-size="20" font-weight="700">Centrifugal Dewaterer</text>
        <polygon points="540,165 585,150 585,180" fill="#0075C1"/>
        <rect x="600" y="70" width="180" height="80" rx="10" fill="#F5F7FA" stroke="#0075C1" stroke-width="2"/>
        <text x="690" y="105" text-anchor="middle" fill="#00205D" font-size="18" font-weight="700">Dry Cake</text>
        <text x="690" y="130" text-anchor="middle" fill="#0075C1" font-size="16">Disposal</text>
        <rect x="600" y="180" width="180" height="80" rx="10" fill="#F5F7FA" stroke="#0075C1" stroke-width="2"/>
        <text x="690" y="215" text-anchor="middle" fill="#00205D" font-size="18" font-weight="700">Filtrate</text>
        <text x="690" y="240" text-anchor="middle" fill="#0075C1" font-size="16">Return to Plant</text>
      </svg>
    </div>
  </div>
  <div class="facts">
    <div class="fact"><div class="k">OWNER</div><div class="v"><span class="y">Pocheon</span> Urban Corp.</div></div>
    <div class="fact"><div class="k">SITE</div><div class="v"><span class="y">Yongjeong</span> WWTP</div></div>
    <div class="fact"><div class="k">STAGE</div><div class="v"><span class="b">Factory</span> Inspection</div></div>
  </div>
  <div class="footer">
    <div class="line"></div>
    <div class="row">
      <div class="logo"><span class="h">Hifil</span><span class="m">M</span>&nbsp;<span class="inc">INC.</span></div>
      <div class="center">Water Treatment</div>
      <div class="right"></div>
    </div>
  </div>
</div>
</body>
</html>
