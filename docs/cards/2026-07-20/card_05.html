<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  :root{--main-blue:#0075C1;--yellow:#DDA11D;--navy:#00205D;--tint:#E6F1FB;--card-bg:#F5F7FA;--line:#B5D4F4;--gray-light:#888780;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;}
  .card{width:1080px;height:1080px;background:#fff;position:relative;overflow:hidden;}
  .pad{padding:0 90px;}
  .footer{position:absolute;left:0;right:0;bottom:46px;padding:0 90px;}
  .footer .line{height:1px;background:var(--line);margin-bottom:22px;}
  .footer .row{display:flex;align-items:center;justify-content:space-between;}
  .logo{font-size:26px;font-weight:700;}
  .logo .h{color:var(--main-blue);} .logo .m{color:var(--yellow);} .logo .inc{color:var(--navy);}
  .footer .center{color:var(--main-blue);font-size:22px;font-weight:600;letter-spacing:2px;}
  .footer .right{width:120px;}
  .label{display:flex;align-items:center;gap:12px;padding-top:96px;color:var(--main-blue);font-size:24px;font-weight:700;letter-spacing:3px;}
  .label .ldot{width:10px;height:10px;border-radius:50%;background:var(--main-blue);}
  .label .lbadge{margin-left:6px;background:var(--tint);color:var(--main-blue);font-size:18px;letter-spacing:2px;padding:5px 14px;border-radius:20px;}
  .ctitle{margin-top:34px;color:var(--navy);font-size:52px;font-weight:700;line-height:1.18;}
  .ctitle .b{color:var(--main-blue);} .ctitle .y{color:var(--yellow);}
  .cdivider{width:160px;height:4px;background:var(--main-blue);margin-top:30px;}
  .info{margin-top:44px;}
  .facts{position:absolute;left:90px;right:90px;bottom:150px;display:flex;gap:18px;}
  .fact{flex:1;background:var(--card-bg);border-radius:16px;padding:26px 24px;}
  .fact .k{color:var(--gray-light);font-size:18px;letter-spacing:1px;margin-bottom:10px;}
  .fact .v{color:var(--navy);font-size:24px;font-weight:700;line-height:1.25;}
  .fact .v .b{color:var(--main-blue);} .fact .v .y{color:var(--yellow);}
</style>
</head>
<body>
<div class="card" id="card_05">
  <div class="pad">
    <div class="label"><span class="ldot"></span>EQUIPMENT<span class="lbadge">KOREA</span></div>
    <div class="ctitle"><span class="y">Pocheon Urban Corp.</span> verifies <span class="b">new dewatering equipment</span> for <span class="y">Yongjeong</span> plant</div>
    <div class="cdivider"></div>
    <div class="info">
      <svg width="900" height="320" viewBox="0 0 900 320" xmlns="http://www.w3.org/2000/svg">
        <rect x="60" y="60" width="240" height="200" rx="14" fill="#E6F1FB" stroke="#0075C1" stroke-width="2"/>
        <text x="180" y="105" text-anchor="middle" fill="#00205D" font-size="20" font-weight="700">FACTORY</text>
        <text x="180" y="135" text-anchor="middle" fill="#0075C1" font-size="18">Manufacturer</text>
        <text x="180" y="165" text-anchor="middle" fill="#0075C1" font-size="18">Assembly Line</text>
        <text x="180" y="225" text-anchor="middle" fill="#DDA11D" font-size="16" font-weight="700">Inspection Site</text>
        <line x1="305" y1="160" x2="425" y2="160" stroke="#0075C1" stroke-width="4" stroke-dasharray="8,6"/>
        <polygon points="425,160 413,151 413,169" fill="#0075C1"/>
        <text x="365" y="145" text-anchor="middle" fill="#00205D" font-size="15" font-weight="700">TEST &amp;</text>
        <text x="365" y="185" text-anchor="middle" fill="#00205D" font-size="15" font-weight="700">VERIFY</text>
        <rect x="430" y="60" width="240" height="200" rx="14" fill="#0075C1"/>
        <text x="550" y="105" text-anchor="middle" fill="#fff" font-size="20" font-weight="700">EQUIPMENT</text>
        <text x="550" y="140" text-anchor="middle" fill="#DDA11D" font-size="20" font-weight="700">Dewaterer</text>
        <text x="550" y="175" text-anchor="middle" fill="#fff" font-size="16">Performance</text>
        <text x="550" y="200" text-anchor="middle" fill="#fff" font-size="16">Verified</text>
        <line x1="675" y1="160" x2="740" y2="160" stroke="#0075C1" stroke-width="4"/>
        <polygon points="740,160 728,151 728,169" fill="#0075C1"/>
        <rect x="750" y="80" width="120" height="160" rx="12" fill="#F5F7FA" stroke="#0075C1" stroke-width="2"/>
        <text x="810" y="140" text-anchor="middle" fill="#00205D" font-size="16" font-weight="700">Yongjeong</text>
        <text x="810" y="165" text-anchor="middle" fill="#0075C1" font-size="14">WWTP</text>
        <text x="810" y="195" text-anchor="middle" fill="#DDA11D" font-size="14" font-weight="700">Install</text>
      </svg>
    </div>
  </div>
  <div class="facts">
    <div class="fact"><div class="k">OWNER</div><div class="v"><span class="y">Pocheon</span></div></div>
    <div class="fact"><div class="k">EQUIPMENT</div><div class="v"><span class="b">Centrifugal</span> Dewaterer</div></div>
    <div class="fact"><div class="k">STAGE</div><div class="v">Factory Verification</div></div>
  </div>
  <div class="footer">
    <div class="line"></div>
    <div class="row">
      <div class="logo"><span class="h">Hifil</span><span class="m">M</span>&nbsp;<span class="inc">INC.</span></div>
      <div class="center">Water Treatment</div>
      <div class="right"></div>
    </div>
  </div>
</div>
</body>
</html>
