<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  :root{--main-blue:#0075C1;--yellow:#DDA11D;--navy:#00205D;--tint:#E6F1FB;--card-bg:#F5F7FA;--line:#B5D4F4;--gray-light:#888780;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;}
  .card{width:1080px;height:1080px;background:#fff;position:relative;overflow:hidden;}
  .pad{padding:0 90px;}
  .footer{position:absolute;left:0;right:0;bottom:46px;padding:0 90px;}
  .footer .line{height:1px;background:var(--line);margin-bottom:22px;}
  .footer .row{display:flex;align-items:center;justify-content:space-between;}
  .logo{font-size:26px;font-weight:700;}
  .logo .h{color:var(--main-blue);} .logo .m{color:var(--yellow);} .logo .inc{color:var(--navy);}
  .footer .center{color:var(--main-blue);font-size:22px;font-weight:600;letter-spacing:2px;}
  .footer .right{width:120px;}
  .label{display:flex;align-items:center;gap:12px;padding-top:96px;color:var(--main-blue);font-size:24px;font-weight:700;letter-spacing:3px;}
  .label .ldot{width:10px;height:10px;border-radius:50%;background:var(--main-blue);}
  .label .lbadge{margin-left:6px;background:var(--tint);color:var(--main-blue);font-size:18px;letter-spacing:2px;padding:5px 14px;border-radius:20px;}
  .ctitle{margin-top:34px;color:var(--navy);font-size:50px;font-weight:700;line-height:1.18;}
  .ctitle .b{color:var(--main-blue);} .ctitle .y{color:var(--yellow);}
  .cdivider{width:160px;height:4px;background:var(--main-blue);margin-top:30px;}
  .info{margin-top:40px;}
  .facts{position:absolute;left:90px;right:90px;bottom:150px;display:flex;gap:18px;}
  .fact{flex:1;background:var(--card-bg);border-radius:16px;padding:26px 24px;}
  .fact .k{color:var(--gray-light);font-size:18px;letter-spacing:1px;margin-bottom:10px;}
  .fact .v{color:var(--navy);font-size:24px;font-weight:700;line-height:1.25;}
  .fact .v .b{color:var(--main-blue);} .fact .v .y{color:var(--yellow);}
</style>
</head>
<body>
<div class="card" id="card_09">
  <div class="pad">
    <div class="label"><span class="ldot"></span>MEMBRANE<span class="lbadge">GLOBAL</span></div>
    <div class="ctitle"><span class="y">PFAS</span> buildup on <span class="b">RO membranes</span> raises end-of-life handling concerns</div>
    <div class="cdivider"></div>
    <div class="info">
      <svg width="900" height="320" viewBox="0 0 900 320" xmlns="http://www.w3.org/2000/svg">
        <rect x="40" y="70" width="160" height="180" rx="10" fill="#E6F1FB" stroke="#0075C1" stroke-width="2"/>
        <text x="120" y="105" text-anchor="middle" fill="#00205D" font-size="18" font-weight="700">Feed Water</text>
        <text x="120" y="145" text-anchor="middle" fill="#DDA11D" font-size="14" font-weight="700">PFAS present</text>
        <circle cx="90" cy="180" r="6" fill="#DDA11D"/>
        <circle cx="120" cy="200" r="6" fill="#DDA11D"/>
        <circle cx="150" cy="180" r="6" fill="#DDA11D"/>
        <circle cx="100" cy="220" r="6" fill="#DDA11D"/>
        <circle cx="140" cy="220" r="6" fill="#DDA11D"/>
        <polygon points="210,160 260,145 260,175" fill="#0075C1"/>
        <rect x="270" y="70" width="240" height="180" rx="10" fill="#0075C1"/>
        <text x="390" y="105" text-anchor="middle" fill="#fff" font-size="18" font-weight="700">RO MEMBRANE</text>
        <line x1="300" y1="130" x2="480" y2="130" stroke="#DDA11D" stroke-width="2"/>
        <line x1="300" y1="150" x2="480" y2="150" stroke="#DDA11D" stroke-width="2"/>
        <line x1="300" y1="170" x2="480" y2="170" stroke="#DDA11D" stroke-width="2"/>
        <line x1="300" y1="190" x2="480" y2="190" stroke="#DDA11D" stroke-width="2"/>
        <circle cx="320" cy="140" r="5" fill="#DDA11D"/>
        <circle cx="360" cy="160" r="5" fill="#DDA11D"/>
        <circle cx="400" cy="140" r="5" fill="#DDA11D"/>
        <circle cx="440" cy="180" r="5" fill="#DDA11D"/>
        <circle cx="380" cy="195" r="5" fill="#DDA11D"/>
        <text x="390" y="235" text-anchor="middle" fill="#DDA11D" font-size="14" font-weight="700">PFAS Accumulation</text>
        <polygon points="520,160 570,145 570,175" fill="#0075C1"/>
        <rect x="580" y="70" width="250" height="180" rx="10" fill="#F5F7FA" stroke="#DDA11D" stroke-width="3"/>
        <text x="705" y="115" text-anchor="middle" fill="#00205D" font-size="20" font-weight="700">END-OF-LIFE</text>
        <text x="705" y="150" text-anchor="middle" fill="#0075C1" font-size="16">Disposal Risk</text>
        <text x="705" y="180" text-anchor="middle" fill="#0075C1" font-size="16">Recycling Barrier</text>
        <text x="705" y="215" text-anchor="middle" fill="#DDA11D" font-size="16" font-weight="700">Handling Concern</text>
      </svg>
    </div>
  </div>
  <div class="facts">
    <div class="fact"><div class="k">CONTAMINANT</div><div class="v"><span class="y">PFAS</span></div></div>
    <div class="fact"><div class="k">MEDIA</div><div class="v"><span class="b">RO</span> Membranes</div></div>
    <div class="fact"><div class="k">ISSUE</div><div class="v">End-of-Life Handling</div></div>
  </div>
  <div class="footer">
    <div class="line"></div>
    <div class="row">
      <div class="logo"><span class="h">Hifil</span><span class="m">M</span>&nbsp;<span class="inc">INC.</span></div>
      <div class="center">Water Treatment</div>
      <div class="right"></div>
    </div>
  </div>
</div>
</body>
</html>
