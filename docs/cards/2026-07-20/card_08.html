<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  :root{--main-blue:#0075C1;--yellow:#DDA11D;--navy:#00205D;--tint:#E6F1FB;--card-bg:#F5F7FA;--line:#B5D4F4;--gray-light:#888780;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;}
  .card{width:1080px;height:1080px;background:#fff;position:relative;overflow:hidden;}
  .pad{padding:0 90px;}
  .footer{position:absolute;left:0;right:0;bottom:46px;padding:0 90px;}
  .footer .line{height:1px;background:var(--line);margin-bottom:22px;}
  .footer .row{display:flex;align-items:center;justify-content:space-between;}
  .logo{font-size:26px;font-weight:700;}
  .logo .h{color:var(--main-blue);} .logo .m{color:var(--yellow);} .logo .inc{color:var(--navy);}
  .footer .center{color:var(--main-blue);font-size:22px;font-weight:600;letter-spacing:2px;}
  .footer .right{width:120px;}
  .label{display:flex;align-items:center;gap:12px;padding-top:96px;color:var(--main-blue);font-size:24px;font-weight:700;letter-spacing:3px;}
  .label .ldot{width:10px;height:10px;border-radius:50%;background:var(--main-blue);}
  .label .lbadge{margin-left:6px;background:var(--tint);color:var(--main-blue);font-size:18px;letter-spacing:2px;padding:5px 14px;border-radius:20px;}
  .ctitle{margin-top:34px;color:var(--navy);font-size:50px;font-weight:700;line-height:1.18;}
  .ctitle .b{color:var(--main-blue);} .ctitle .y{color:var(--yellow);}
  .cdivider{width:160px;height:4px;background:var(--main-blue);margin-top:30px;}
  .info{margin-top:40px;}
  .facts{position:absolute;left:90px;right:90px;bottom:150px;display:flex;gap:18px;}
  .fact{flex:1;background:var(--card-bg);border-radius:16px;padding:26px 24px;}
  .fact .k{color:var(--gray-light);font-size:18px;letter-spacing:1px;margin-bottom:10px;}
  .fact .v{color:var(--navy);font-size:24px;font-weight:700;line-height:1.25;}
  .fact .v .b{color:var(--main-blue);} .fact .v .y{color:var(--yellow);}
</style>
</head>
<body>
<div class="card" id="card_08">
  <div class="pad">
    <div class="label"><span class="ldot"></span>POLICY<span class="lbadge">KOREA</span></div>
    <div class="ctitle"><span class="y">Incheon City</span> unveils <span class="b">wastewater response</span> for <span class="y">Starfield Cheongna</span> opening</div>
    <div class="cdivider"></div>
    <div class="info">
      <svg width="900" height="320" viewBox="0 0 900 320" xmlns="http://www.w3.org/2000/svg">
        <circle cx="450" cy="160" r="70" fill="#0075C1"/>
        <text x="450" y="155" text-anchor="middle" fill="#fff" font-size="18" font-weight="700">INCHEON</text>
        <text x="450" y="180" text-anchor="middle" fill="#DDA11D" font-size="14" font-weight="700">RESPONSE PLAN</text>
        <rect x="60" y="60" width="180" height="80" rx="12" fill="#E6F1FB" stroke="#0075C1" stroke-width="2"/>
        <text x="150" y="95" text-anchor="middle" fill="#00205D" font-size="16" font-weight="700">Diversion</text>
        <text x="150" y="120" text-anchor="middle" fill="#0075C1" font-size="14">Sewer Rerouting</text>
        <line x1="240" y1="100" x2="380" y2="140" stroke="#0075C1" stroke-width="3"/>
        <rect x="60" y="180" width="180" height="80" rx="12" fill="#E6F1FB" stroke="#0075C1" stroke-width="2"/>
        <text x="150" y="215" text-anchor="middle" fill="#00205D" font-size="16" font-weight="700">Capacity</text>
        <text x="150" y="240" text-anchor="middle" fill="#0075C1" font-size="14">Plant Upgrade</text>
        <line x1="240" y1="220" x2="380" y2="180" stroke="#0075C1" stroke-width="3"/>
        <rect x="660" y="60" width="180" height="80" rx="12" fill="#F5F7FA" stroke="#0075C1" stroke-width="2"/>
        <text x="750" y="95" text-anchor="middle" fill="#00205D" font-size="16" font-weight="700">Monitoring</text>
        <text x="750" y="120" text-anchor="middle" fill="#0075C1" font-size="14">Real-time Flow</text>
        <line x1="660" y1="100" x2="520" y2="140" stroke="#0075C1" stroke-width="3"/>
        <rect x="660" y="180" width="180" height="80" rx="12" fill="#F5F7FA" stroke="#0075C1" stroke-width="2"/>
        <text x="750" y="215" text-anchor="middle" fill="#00205D" font-size="16" font-weight="700">Coordination</text>
        <text x="750" y="240" text-anchor="middle" fill="#0075C1" font-size="14">Starfield Ops</text>
        <line x1="660" y1="220" x2="520" y2="180" stroke="#0075C1" stroke-width="3"/>
      </svg>
    </div>
  </div>
  <div class="facts">
    <div class="fact"><div class="k">CITY</div><div class="v"><span class="y">Incheon</span></div></div>
    <div class="fact"><div class="k">EVENT</div><div class="v"><span class="y">Starfield</span> Opening</div></div>
    <div class="fact"><div class="k">SCOPE</div><div class="v"><span class="b">Wastewater</span> Response</div></div>
  </div>
  <div class="footer">
    <div class="line"></div>
    <div class="row">
      <div class="logo"><span class="h">Hifil</span><span class="m">M</span>&nbsp;<span class="inc">INC.</span></div>
      <div class="center">Water Treatment</div>
      <div class="right"></div>
    </div>
  </div>
</div>
</body>
</html>
