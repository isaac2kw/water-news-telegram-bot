<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  :root{--main-blue:#0075C1;--yellow:#DDA11D;--navy:#00205D;--tint:#E6F1FB;--card-bg:#F5F7FA;--line:#B5D4F4;--gray-light:#888780;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;}
  .card{width:1080px;height:1080px;background:#fff;position:relative;overflow:hidden;}
  .pad{padding:0 90px;}
  .footer{position:absolute;left:0;right:0;bottom:46px;padding:0 90px;}
  .footer .line{height:1px;background:var(--line);margin-bottom:22px;}
  .footer .row{display:flex;align-items:center;justify-content:space-between;}
  .logo{font-size:26px;font-weight:700;}
  .logo .h{color:var(--main-blue);} .logo .m{color:var(--yellow);} .logo .inc{color:var(--navy);}
  .footer .center{color:var(--main-blue);font-size:22px;font-weight:600;letter-spacing:2px;}
  .footer .right{width:120px;}
  .label{display:flex;align-items:center;gap:12px;padding-top:96px;color:var(--main-blue);font-size:24px;font-weight:700;letter-spacing:3px;}
  .label .ldot{width:10px;height:10px;border-radius:50%;background:var(--main-blue);}
  .label .lbadge{margin-left:6px;background:var(--tint);color:var(--main-blue);font-size:18px;letter-spacing:2px;padding:5px 14px;border-radius:20px;}
  .ctitle{margin-top:34px;color:var(--navy);font-size:52px;font-weight:700;line-height:1.18;}
  .ctitle .b{color:var(--main-blue);} .ctitle .y{color:var(--yellow);}
  .cdivider{width:160px;height:4px;background:var(--main-blue);margin-top:30px;}
  .info{margin-top:44px;}
  .facts{position:absolute;left:90px;right:90px;bottom:150px;display:flex;gap:18px;}
  .fact{flex:1;background:var(--card-bg);border-radius:16px;padding:26px 24px;}
  .fact .k{color:var(--gray-light);font-size:18px;letter-spacing:1px;margin-bottom:10px;}
  .fact .v{color:var(--navy);font-size:24px;font-weight:700;line-height:1.25;}
  .fact .v .b{color:var(--main-blue);} .fact .v .y{color:var(--yellow);}
</style>
</head>
<body>
<div class="card" id="card_07">
  <div class="pad">
    <div class="label"><span class="ldot"></span>URBAN PLAN<span class="lbadge">KOREA</span></div>
    <div class="ctitle"><span class="y">Incheon</span> secures <span class="b">sewage capacity</span> ahead of <span class="y">Starfield Cheongna</span> launch</div>
    <div class="cdivider"></div>
    <div class="info">
      <svg width="900" height="300" viewBox="0 0 900 300" xmlns="http://www.w3.org/2000/svg">
        <text x="60" y="50" fill="#00205D" font-size="18" font-weight="700">Sewage Load Buildup</text>
        <line x1="60" y1="240" x2="840" y2="240" stroke="#B5D4F4" stroke-width="2"/>
        <line x1="60" y1="70" x2="60" y2="240" stroke="#B5D4F4" stroke-width="2"/>
        <rect x="110" y="200" width="80" height="40" fill="#E6F1FB"/>
        <text x="150" y="265" text-anchor="middle" fill="#0075C1" font-size="14">Current</text>
        <rect x="240" y="170" width="80" height="70" fill="#0075C1"/>
        <text x="280" y="265" text-anchor="middle" fill="#0075C1" font-size="14">Q1</text>
        <rect x="370" y="130" width="80" height="110" fill="#0075C1"/>
        <text x="410" y="265" text-anchor="middle" fill="#0075C1" font-size="14">Q2</text>
        <rect x="500" y="90" width="80" height="150" fill="#DDA11D"/>
        <text x="540" y="265" text-anchor="middle" fill="#DDA11D" font-size="14" font-weight="700">Opening</text>
        <rect x="630" y="80" width="80" height="160" fill="#00205D"/>
        <text x="670" y="265" text-anchor="middle" fill="#00205D" font-size="14" font-weight="700">Peak</text>
        <text x="540" y="80" text-anchor="middle" fill="#DDA11D" font-size="14" font-weight="700">Starfield</text>
        <text x="670" y="70" text-anchor="middle" fill="#00205D" font-size="14" font-weight="700">Target Capacity</text>
      </svg>
    </div>
  </div>
  <div class="facts">
    <div class="fact"><div class="k">CITY</div><div class="v"><span class="y">Incheon</span></div></div>
    <div class="fact"><div class="k">TRIGGER</div><div class="v"><span class="y">Starfield</span> Cheongna</div></div>
    <div class="fact"><div class="k">GOAL</div><div class="v"><span class="b">Capacity</span> Expansion</div></div>
  </div>
  <div class="footer">
    <div class="line"></div>
    <div class="row">
      <div class="logo"><span class="h">Hifil</span><span class="m">M</span>&nbsp;<span class="inc">INC.</span></div>
      <div class="center">Water Treatment</div>
      <div class="right"></div>
    </div>
  </div>
</div>
</body>
</html>
