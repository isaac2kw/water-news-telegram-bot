<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  :root{--main-blue:#0075C1;--yellow:#DDA11D;--navy:#00205D;--tint:#E6F1FB;--card-bg:#F5F7FA;--line:#B5D4F4;--gray-light:#888780;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;}
  .card{width:1080px;height:1080px;background:#fff;position:relative;overflow:hidden;}
  .pad{padding:0 90px;}
  .footer{position:absolute;left:0;right:0;bottom:46px;padding:0 90px;}
  .footer .line{height:1px;background:var(--line);margin-bottom:22px;}
  .footer .row{display:flex;align-items:center;justify-content:space-between;}
  .logo{font-size:26px;font-weight:700;}
  .logo .h{color:var(--main-blue);} .logo .m{color:var(--yellow);} .logo .inc{color:var(--navy);}
  .footer .center{color:var(--main-blue);font-size:22px;font-weight:600;letter-spacing:2px;}
  .footer .right{width:120px;}
  .label{display:flex;align-items:center;gap:12px;padding-top:96px;color:var(--main-blue);font-size:24px;font-weight:700;letter-spacing:3px;}
  .label .ldot{width:10px;height:10px;border-radius:50%;background:var(--main-blue);}
  .label .lbadge{margin-left:6px;background:var(--tint);color:var(--main-blue);font-size:18px;letter-spacing:2px;padding:5px 14px;border-radius:20px;}
  .ctitle{margin-top:34px;color:var(--navy);font-size:52px;font-weight:700;line-height:1.18;}
  .ctitle .b{color:var(--main-blue);} .ctitle .y{color:var(--yellow);}
  .cdivider{width:160px;height:4px;background:var(--main-blue);margin-top:30px;}
  .info{margin-top:40px;}
  .facts{position:absolute;left:90px;right:90px;bottom:150px;display:flex;gap:18px;}
  .fact{flex:1;background:var(--card-bg);border-radius:16px;padding:22px 20px;}
  .fact .k{color:var(--gray-light);font-size:16px;letter-spacing:1px;margin-bottom:8px;}
  .fact .v{color:var(--navy);font-size:22px;font-weight:700;line-height:1.25;}
  .fact .v .b{color:var(--main-blue);} .fact .v .y{color:var(--yellow);}
</style>
</head>
<body>
<div class="card" id="card_09">
  <div class="pad">
    <div class="label"><span class="ldot"></span>PFAS · COMPLIANCE<span class="lbadge">US</span></div>
    <div class="ctitle">Down the Drain but Not Forgotten: <span class="b">PFAS</span> Compliance in Wastewater</div>
    <div class="cdivider"></div>
    <div class="info">
      <svg width="900" height="320" viewBox="0 0 900 320" xmlns="http://www.w3.org/2000/svg">
        <rect x="40" y="120" width="150" height="90" fill="#E6F1FB" rx="10"/>
        <text x="115" y="160" text-anchor="middle" font-size="16" font-weight="700" fill="#00205D">INDUSTRY</text>
        <text x="115" y="185" text-anchor="middle" font-size="14" fill="#888780">PFAS use</text>
        <polygon points="200,160 240,160 240,150 265,175 240,200 240,190 200,190" fill="#0075C1"/>
        <rect x="275" y="120" width="150" height="90" fill="#E6F1FB" rx="10"/>
        <text x="350" y="160" text-anchor="middle" font-size="16" font-weight="700" fill="#00205D">DRAIN</text>
        <text x="350" y="185" text-anchor="middle" font-size="14" fill="#888780">Discharge</text>
        <polygon points="435,160 475,160 475,150 500,175 475,200 475,190 435,190" fill="#0075C1"/>
        <rect x="510" y="90" width="150" height="150" fill="#DDA11D" rx="10"/>
        <text x="585" y="150" text-anchor="middle" font-size="18" font-weight="700" fill="#fff">WWTP</text>
        <text x="585" y="180" text-anchor="middle" font-size="14" fill="#fff">Not removed</text>
        <text x="585" y="205" text-anchor="middle" font-size="14" fill="#fff">by std treatment</text>
        <polygon points="670,160 710,160 710,150 735,175 710,200 710,190 670,190" fill="#0075C1"/>
        <rect x="745" y="120" width="120" height="90" fill="#0075C1" rx="10"/>
        <text x="805" y="160" text-anchor="middle" font-size="16" font-weight="700" fill="#fff">RIVERS</text>
        <text x="805" y="185" text-anchor="middle" font-size="14" fill="#B5D4F4">& biosolids</text>
        <text x="450" y="290" text-anchor="middle" font-size="18" font-weight="700" fill="#00205D">Regulation targets the entire chain</text>
      </svg>
    </div>
  </div>
  <div class="facts">
    <div class="fact"><div class="k">REGION</div><div class="v"><span class="y">Connecticut</span></div></div>
    <div class="fact"><div class="k">POLLUTANT</div><div class="v"><span class="b">PFAS</span></div></div>
    <div class="fact"><div class="k">SCOPE</div><div class="v">WW Compliance</div></div>
  </div>
  <div class="footer"><div class="line"></div><div class="row"><div class="logo"><span class="h">Hifil</span><span class="m">M</span>&nbsp;<span class="inc">INC.</span></div><div class="center">Water Treatment</div><div class="right"></div></div></div>
</div>
</body>
</html>
