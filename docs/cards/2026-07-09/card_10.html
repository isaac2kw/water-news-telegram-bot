<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  :root{--main-blue:#0075C1;--yellow:#DDA11D;--navy:#00205D;--tint:#E6F1FB;--card-bg:#F5F7FA;--line:#B5D4F4;--gray-light:#888780;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;}
  .card{width:1080px;height:1080px;background:#fff;position:relative;overflow:hidden;}
  .pad{padding:0 90px;}
  .footer{position:absolute;left:0;right:0;bottom:46px;padding:0 90px;}
  .footer .line{height:1px;background:var(--line);margin-bottom:22px;}
  .footer .row{display:flex;align-items:center;justify-content:space-between;}
  .logo{font-size:26px;font-weight:700;}
  .logo .h{color:var(--main-blue);} .logo .m{color:var(--yellow);} .logo .inc{color:var(--navy);}
  .footer .center{color:var(--main-blue);font-size:22px;font-weight:600;letter-spacing:2px;}
  .footer .right{width:120px;}
  .label{display:flex;align-items:center;gap:12px;padding-top:96px;color:var(--main-blue);font-size:24px;font-weight:700;letter-spacing:3px;}
  .label .ldot{width:10px;height:10px;border-radius:50%;background:var(--main-blue);}
  .label .lbadge{margin-left:6px;background:var(--tint);color:var(--main-blue);font-size:18px;letter-spacing:2px;padding:5px 14px;border-radius:20px;}
  .ctitle{margin-top:34px;color:var(--navy);font-size:50px;font-weight:700;line-height:1.18;}
  .ctitle .b{color:var(--main-blue);} .ctitle .y{color:var(--yellow);}
  .cdivider{width:160px;height:4px;background:var(--main-blue);margin-top:30px;}
  .info{margin-top:40px;}
  .facts{position:absolute;left:90px;right:90px;bottom:150px;display:flex;gap:18px;}
  .fact{flex:1;background:var(--card-bg);border-radius:16px;padding:22px 20px;}
  .fact .k{color:var(--gray-light);font-size:16px;letter-spacing:1px;margin-bottom:8px;}
  .fact .v{color:var(--navy);font-size:22px;font-weight:700;line-height:1.25;}
  .fact .v .b{color:var(--main-blue);} .fact .v .y{color:var(--yellow);}
</style>
</head>
<body>
<div class="card" id="card_10">
  <div class="pad">
    <div class="label"><span class="ldot"></span>LEGISLATION<span class="lbadge">US</span></div>
    <div class="ctitle"><span class="y">Illinois</span> <span class="b">PFAS</span> Data Bill Awaits <span class="y">Pritzker</span>'s Approval</div>
    <div class="cdivider"></div>
    <div class="info">
      <svg width="900" height="320" viewBox="0 0 900 320" xmlns="http://www.w3.org/2000/svg">
        <line x1="80" y1="170" x2="820" y2="170" stroke="#B5D4F4" stroke-width="3"/>
        <circle cx="160" cy="170" r="20" fill="#0075C1"/>
        <text x="160" y="177" text-anchor="middle" font-size="16" font-weight="700" fill="#fff">1</text>
        <text x="160" y="130" text-anchor="middle" font-size="16" font-weight="700" fill="#00205D">BILL</text>
        <text x="160" y="220" text-anchor="middle" font-size="14" fill="#888780">Drafted</text>
        <circle cx="380" cy="170" r="20" fill="#0075C1"/>
        <text x="380" y="177" text-anchor="middle" font-size="16" font-weight="700" fill="#fff">2</text>
        <text x="380" y="130" text-anchor="middle" font-size="16" font-weight="700" fill="#00205D">LEGISLATURE</text>
        <text x="380" y="220" text-anchor="middle" font-size="14" fill="#888780">Passed</text>
        <circle cx="600" cy="170" r="24" fill="#DDA11D"/>
        <text x="600" y="177" text-anchor="middle" font-size="16" font-weight="700" fill="#fff">3</text>
        <text x="600" y="125" text-anchor="middle" font-size="16" font-weight="700" fill="#00205D">GOVERNOR</text>
        <text x="600" y="225" text-anchor="middle" font-size="14" fill="#DDA11D" font-weight="700">Awaiting sign</text>
        <circle cx="780" cy="170" r="20" fill="#E6F1FB" stroke="#B5D4F4" stroke-width="2"/>
        <text x="780" y="177" text-anchor="middle" font-size="16" font-weight="700" fill="#0075C1">4</text>
        <text x="780" y="130" text-anchor="middle" font-size="16" font-weight="700" fill="#00205D">LAW</text>
        <text x="780" y="220" text-anchor="middle" font-size="14" fill="#888780">Enforced</text>
        <text x="450" y="290" text-anchor="middle" font-size="18" font-weight="700" fill="#00205D">Data requirement: PFAS in wastewater & biosolids</text>
      </svg>
    </div>
  </div>
  <div class="facts">
    <div class="fact"><div class="k">STATE</div><div class="v"><span class="y">Illinois</span></div></div>
    <div class="fact"><div class="k">SIGNER</div><div class="v"><span class="y">Pritzker</span></div></div>
    <div class="fact"><div class="k">DATA</div><div class="v"><span class="b">PFAS + Biosolids</span></div></div>
  </div>
  <div class="footer"><div class="line"></div><div class="row"><div class="logo"><span class="h">Hifil</span><span class="m">M</span>&nbsp;<span class="inc">INC.</span></div><div class="center">Water Treatment</div><div class="right"></div></div></div>
</div>
</body>
</html>
