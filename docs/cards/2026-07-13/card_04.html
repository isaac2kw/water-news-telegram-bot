<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  :root{--main-blue:#0075C1;--yellow:#DDA11D;--navy:#00205D;--tint:#E6F1FB;--card-bg:#F5F7FA;--line:#B5D4F4;--gray-light:#888780;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;}
  .card{width:1080px;height:1080px;background:#ffffff;position:relative;overflow:hidden;}
  .pad{padding:0 90px;}
  .footer{position:absolute;left:0;right:0;bottom:46px;padding:0 90px;}
  .footer .line{height:1px;background:var(--line);margin-bottom:22px;}
  .footer .row{display:flex;align-items:center;justify-content:space-between;}
  .logo{font-size:26px;font-weight:700;}.logo .h{color:var(--main-blue);}.logo .m{color:var(--yellow);}.logo .inc{color:var(--navy);}
  .footer .center{color:var(--main-blue);font-size:22px;font-weight:600;letter-spacing:2px;}
  .footer .right{width:120px;}
  .label{display:flex;align-items:center;gap:12px;padding-top:96px;color:var(--main-blue);font-size:24px;font-weight:700;letter-spacing:3px;}
  .label .ldot{width:10px;height:10px;border-radius:50%;background:var(--main-blue);}
  .label .lbadge{margin-left:6px;background:var(--tint);color:var(--main-blue);font-size:18px;letter-spacing:2px;padding:5px 14px;border-radius:20px;}
  .ctitle{margin-top:34px;color:var(--navy);font-size:50px;font-weight:700;line-height:1.18;}
  .ctitle .b{color:var(--main-blue);}.ctitle .y{color:var(--yellow);}
  .cdivider{width:160px;height:4px;background:var(--main-blue);margin-top:30px;}
  .info{margin-top:44px;}
  .facts{position:absolute;left:90px;right:90px;bottom:150px;display:flex;gap:18px;}
  .fact{flex:1;background:var(--card-bg);border-radius:16px;padding:26px 24px;}
  .fact .k{color:var(--gray-light);font-size:18px;letter-spacing:1px;margin-bottom:10px;}
  .fact .v{color:var(--navy);font-size:24px;font-weight:700;line-height:1.25;}
  .fact .v .b{color:var(--main-blue);}.fact .v .y{color:var(--yellow);}
</style>
</head>
<body>
<div class="card" id="card_04">
  <div class="pad">
    <div class="label"><span class="ldot"></span>HYDROGEN HUB<span class="lbadge">KOREA</span></div>
    <div class="ctitle"><span class="y">Cheongju</span> WWTP Biogas Powers <span class="b">Clean Hydrogen</span> and Urban Hydrogen Hub</div>
    <div class="cdivider"></div>
    <div class="info">
      <svg width="900" height="300" viewBox="0 0 900 300" xmlns="http://www.w3.org/2000/svg">
        <circle cx="450" cy="150" r="80" fill="#DDA11D"/>
        <text x="450" y="145" text-anchor="middle" fill="#ffffff" font-size="20" font-weight="700">Urban H₂</text>
        <text x="450" y="170" text-anchor="middle" fill="#ffffff" font-size="16">Hub · Cheongju</text>

        <rect x="60" y="40" width="180" height="70" rx="10" fill="#E6F1FB" stroke="#0075C1" stroke-width="2"/>
        <text x="150" y="72" text-anchor="middle" fill="#00205D" font-size="18" font-weight="700">WWTP</text>
        <text x="150" y="93" text-anchor="middle" fill="#0075C1" font-size="14">Biogas Source</text>
        <line x1="240" y1="90" x2="380" y2="130" stroke="#0075C1" stroke-width="3"/>

        <rect x="60" y="190" width="180" height="70" rx="10" fill="#E6F1FB" stroke="#0075C1" stroke-width="2"/>
        <text x="150" y="222" text-anchor="middle" fill="#00205D" font-size="18" font-weight="700">Reforming</text>
        <text x="150" y="243" text-anchor="middle" fill="#0075C1" font-size="14">Clean H₂</text>
        <line x1="240" y1="215" x2="380" y2="175" stroke="#0075C1" stroke-width="3"/>

        <rect x="660" y="40" width="180" height="70" rx="10" fill="#E6F1FB" stroke="#0075C1" stroke-width="2"/>
        <text x="750" y="72" text-anchor="middle" fill="#00205D" font-size="18" font-weight="700">Fuel Cell</text>
        <text x="750" y="93" text-anchor="middle" fill="#0075C1" font-size="14">Power / Mobility</text>
        <line x1="520" y1="130" x2="660" y2="90" stroke="#0075C1" stroke-width="3"/>

        <rect x="660" y="190" width="180" height="70" rx="10" fill="#E6F1FB" stroke="#0075C1" stroke-width="2"/>
        <text x="750" y="222" text-anchor="middle" fill="#00205D" font-size="18" font-weight="700">City Grid</text>
        <text x="750" y="243" text-anchor="middle" fill="#0075C1" font-size="14">Energy Supply</text>
        <line x1="520" y1="175" x2="660" y2="215" stroke="#0075C1" stroke-width="3"/>
      </svg>
    </div>
  </div>
  <div class="facts">
    <div class="fact"><div class="k">CATEGORY</div><div class="v"><span class="b">Clean Hydrogen</span></div></div>
    <div class="fact"><div class="k">MODEL</div><div class="v">Urban H₂ Hub</div></div>
    <div class="fact"><div class="k">LOCATION</div><div class="v"><span class="y">Cheongju</span></div></div>
  </div>
  <div class="footer"><div class="line"></div><div class="row"><div class="logo"><span class="h">Hifil</span><span class="m">M</span>&nbsp;<span class="inc">INC.</span></div><div class="center">Water Treatment</div><div class="right"></div></div></div>
</div>
</body>
</html>
