<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  :root{--main-blue:#0075C1;--yellow:#DDA11D;--navy:#00205D;--tint:#E6F1FB;--card-bg:#F5F7FA;--line:#B5D4F4;--gray-light:#888780;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;}
  .card{width:1080px;height:1080px;background:#ffffff;position:relative;overflow:hidden;}
  .pad{padding:0 90px;}
  .footer{position:absolute;left:0;right:0;bottom:46px;padding:0 90px;}
  .footer .line{height:1px;background:var(--line);margin-bottom:22px;}
  .footer .row{display:flex;align-items:center;justify-content:space-between;}
  .logo{font-size:26px;font-weight:700;}.logo .h{color:var(--main-blue);}.logo .m{color:var(--yellow);}.logo .inc{color:var(--navy);}
  .footer .center{color:var(--main-blue);font-size:22px;font-weight:600;letter-spacing:2px;}
  .footer .right{width:120px;}
  .label{display:flex;align-items:center;gap:12px;padding-top:96px;color:var(--main-blue);font-size:24px;font-weight:700;letter-spacing:3px;}
  .label .ldot{width:10px;height:10px;border-radius:50%;background:var(--main-blue);}
  .label .lbadge{margin-left:6px;background:var(--tint);color:var(--main-blue);font-size:18px;letter-spacing:2px;padding:5px 14px;border-radius:20px;}
  .ctitle{margin-top:34px;color:var(--navy);font-size:52px;font-weight:700;line-height:1.18;}
  .ctitle .b{color:var(--main-blue);}.ctitle .y{color:var(--yellow);}
  .cdivider{width:160px;height:4px;background:var(--main-blue);margin-top:30px;}
  .info{margin-top:44px;}
  .facts{position:absolute;left:90px;right:90px;bottom:150px;display:flex;gap:18px;}
  .fact{flex:1;background:var(--card-bg);border-radius:16px;padding:26px 24px;}
  .fact .k{color:var(--gray-light);font-size:18px;letter-spacing:1px;margin-bottom:10px;}
  .fact .v{color:var(--navy);font-size:24px;font-weight:700;line-height:1.25;}
  .fact .v .b{color:var(--main-blue);}.fact .v .y{color:var(--yellow);}
</style>
</head>
<body>
<div class="card" id="card_10">
  <div class="pad">
    <div class="label"><span class="ldot"></span>INFRASTRUCTURE<span class="lbadge">KOREA</span></div>
    <div class="ctitle"><span class="b">Clean Hydrogen</span> Production Facility Using WWTP Biogas Completed</div>
    <div class="cdivider"></div>
    <div class="info">
      <svg width="900" height="300" viewBox="0 0 900 300" xmlns="http://www.w3.org/2000/svg">
        <rect x="60" y="80" width="200" height="150" rx="12" fill="#E6F1FB" stroke="#0075C1" stroke-width="2"/>
        <text x="160" y="120" text-anchor="middle" fill="#00205D" font-size="18" font-weight="700">WWTP Biogas</text>
        <text x="160" y="150" text-anchor="middle" fill="#0075C1" font-size="14">Feedstock</text>
        <circle cx="160" cy="190" r="18" fill="#0075C1"/>
        <text x="160" y="196" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="700">CH₄</text>

        <polygon points="275,150 335,130 335,145 355,145 355,160 335,160 335,175" fill="#0075C1"/>

        <rect x="370" y="80" width="200" height="150" rx="12" fill="#F5F7FA" stroke="#00205D" stroke-width="2"/>
        <text x="470" y="120" text-anchor="middle" fill="#00205D" font-size="18" font-weight="700">Reforming Unit</text>
        <text x="470" y="150" text-anchor="middle" fill="#0075C1" font-size="14">Purification</text>
        <text x="470" y="185" text-anchor="middle" fill="#00205D" font-size="16" font-weight="700">Completed</text>
        <circle cx="470" cy="205" r="6" fill="#0075C1"/>

        <polygon points="585,150 645,130 645,145 665,145 665,160 645,160 645,175" fill="#0075C1"/>

        <rect x="680" y="80" width="200" height="150" rx="12" fill="#DDA11D"/>
        <text x="780" y="120" text-anchor="middle" fill="#ffffff" font-size="18" font-weight="700">Clean H₂</text>
        <text x="780" y="150" text-anchor="middle" fill="#ffffff" font-size="14">Output</text>
        <circle cx="780" cy="190" r="18" fill="#ffffff"/>
        <text x="780" y="196" text-anchor="middle" fill="#DDA11D" font-size="14" font-weight="700">H₂</text>
      </svg>
    </div>
  </div>
  <div class="facts">
    <div class="fact"><div class="k">CATEGORY</div><div class="v"><span class="b">Infrastructure</span></div></div>
    <div class="fact"><div class="k">TECHNOLOGY</div><div class="v">Biogas Reforming</div></div>
    <div class="fact"><div class="k">STATUS</div><div class="v"><span class="y">Completed</span></div></div>
  </div>
  <div class="footer"><div class="line"></div><div class="row"><div class="logo"><span class="h">Hifil</span><span class="m">M</span>&nbsp;<span class="inc">INC.</span></div><div class="center">Water Treatment</div><div class="right"></div></div></div>
</div>
</body>
</html>
