<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  :root{--main-blue:#0075C1;--yellow:#DDA11D;--navy:#00205D;--tint:#E6F1FB;--card-bg:#F5F7FA;--line:#B5D4F4;--gray-light:#888780;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;}
  .card{width:1080px;height:1080px;background:#ffffff;position:relative;overflow:hidden;}
  .pad{padding:0 90px;}
  .footer{position:absolute;left:0;right:0;bottom:46px;padding:0 90px;}
  .footer .line{height:1px;background:var(--line);margin-bottom:22px;}
  .footer .row{display:flex;align-items:center;justify-content:space-between;}
  .logo{font-size:26px;font-weight:700;}.logo .h{color:var(--main-blue);}.logo .m{color:var(--yellow);}.logo .inc{color:var(--navy);}
  .footer .center{color:var(--main-blue);font-size:22px;font-weight:600;letter-spacing:2px;}
  .footer .right{width:120px;}
  .label{display:flex;align-items:center;gap:12px;padding-top:96px;color:var(--main-blue);font-size:24px;font-weight:700;letter-spacing:3px;}
  .label .ldot{width:10px;height:10px;border-radius:50%;background:var(--main-blue);}
  .label .lbadge{margin-left:6px;background:var(--tint);color:var(--main-blue);font-size:18px;letter-spacing:2px;padding:5px 14px;border-radius:20px;}
  .ctitle{margin-top:34px;color:var(--navy);font-size:50px;font-weight:700;line-height:1.18;}
  .ctitle .b{color:var(--main-blue);}.ctitle .y{color:var(--yellow);}
  .cdivider{width:160px;height:4px;background:var(--main-blue);margin-top:30px;}
  .info{margin-top:44px;}
  .facts{position:absolute;left:90px;right:90px;bottom:150px;display:flex;gap:18px;}
  .fact{flex:1;background:var(--card-bg);border-radius:16px;padding:26px 24px;}
  .fact .k{color:var(--gray-light);font-size:18px;letter-spacing:1px;margin-bottom:10px;}
  .fact .v{color:var(--navy);font-size:24px;font-weight:700;line-height:1.25;}
  .fact .v .b{color:var(--main-blue);}.fact .v .y{color:var(--yellow);}
</style>
</head>
<body>
<div class="card" id="card_09">
  <div class="pad">
    <div class="label"><span class="ldot"></span>WATER REUSE STRATEGY<span class="lbadge">KOREA</span></div>
    <div class="ctitle"><span class="y">Incheon Free Economic Zone</span> Seeks <span class="b">Improvements</span> for <span class="y">Songdo</span> WWTP Reuse Water</div>
    <div class="cdivider"></div>
    <div class="info">
      <svg width="900" height="290" viewBox="0 0 900 290" xmlns="http://www.w3.org/2000/svg">
        <rect x="40" y="60" width="260" height="170" rx="14" fill="#F5F7FA" stroke="#B5D4F4" stroke-width="2"/>
        <text x="170" y="100" text-anchor="middle" fill="#00205D" font-size="20" font-weight="700">Current Status</text>
        <line x1="70" y1="115" x2="270" y2="115" stroke="#B5D4F4" stroke-width="1"/>
        <text x="170" y="145" text-anchor="middle" fill="#0075C1" font-size="15">Reclaimed Water Supply</text>
        <text x="170" y="175" text-anchor="middle" fill="#0075C1" font-size="15">Quality &amp; Distribution</text>
        <text x="170" y="205" text-anchor="middle" fill="#0075C1" font-size="15">Songdo District</text>

        <polygon points="315,140 365,120 365,135 385,135 385,150 365,150 365,165" fill="#0075C1"/>

        <rect x="410" y="60" width="450" height="170" rx="14" fill="#DDA11D"/>
        <text x="635" y="100" text-anchor="middle" fill="#ffffff" font-size="20" font-weight="700">Improvement Directions</text>
        <line x1="440" y1="115" x2="830" y2="115" stroke="#ffffff" stroke-width="1" opacity="0.5"/>
        <text x="635" y="145" text-anchor="middle" fill="#ffffff" font-size="15">· Broaden User Base</text>
        <text x="635" y="175" text-anchor="middle" fill="#ffffff" font-size="15">· Upgrade Water Quality Standards</text>
        <text x="635" y="205" text-anchor="middle" fill="#ffffff" font-size="15">· Optimize Supply Infrastructure</text>
      </svg>
    </div>
  </div>
  <div class="facts">
    <div class="fact"><div class="k">CATEGORY</div><div class="v"><span class="b">Water Reuse</span></div></div>
    <div class="fact"><div class="k">DISTRICT</div><div class="v"><span class="y">Songdo</span></div></div>
    <div class="fact"><div class="k">AUTHORITY</div><div class="v"><span class="y">IFEZ</span></div></div>
  </div>
  <div class="footer"><div class="line"></div><div class="row"><div class="logo"><span class="h">Hifil</span><span class="m">M</span>&nbsp;<span class="inc">INC.</span></div><div class="center">Water Treatment</div><div class="right"></div></div></div>
</div>
</body>
</html>
