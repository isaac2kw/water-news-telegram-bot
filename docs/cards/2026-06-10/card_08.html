<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  :root{--main-blue:#0075C1;--yellow:#DDA11D;--navy:#00205D;--tint:#E6F1FB;--card-bg:#F5F7FA;--line:#B5D4F4;--gray-light:#888780;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;}
  .card{width:1080px;height:1080px;background:#ffffff;position:relative;overflow:hidden;}
  .pad{padding:0 90px;}
  .footer{position:absolute;left:0;right:0;bottom:46px;padding:0 90px;}
  .footer .line{height:1px;background:var(--line);margin-bottom:22px;}
  .footer .row{display:flex;align-items:center;justify-content:space-between;}
  .logo{font-size:26px;font-weight:700;}
  .logo .h{color:var(--main-blue);} .logo .m{color:var(--yellow);} .logo .inc{color:var(--navy);}
  .footer .center{color:var(--main-blue);font-size:22px;font-weight:600;letter-spacing:2px;}
  .footer .right{width:120px;}
  .label{display:flex;align-items:center;gap:12px;padding-top:96px;color:var(--main-blue);font-size:24px;font-weight:700;letter-spacing:3px;}
  .label .ldot{width:10px;height:10px;border-radius:50%;background:var(--main-blue);}
  .label .lbadge{margin-left:6px;background:var(--tint);color:var(--main-blue);font-size:18px;letter-spacing:2px;padding:5px 14px;border-radius:20px;}
  .ctitle{margin-top:34px;color:var(--navy);font-size:50px;font-weight:700;line-height:1.18;}
  .ctitle .b{color:var(--main-blue);} .ctitle .y{color:var(--yellow);}
  .cdivider{width:160px;height:4px;background:var(--main-blue);margin-top:30px;}
  .info{margin-top:40px;}
  .facts{position:absolute;left:90px;right:90px;bottom:150px;display:flex;gap:18px;}
  .fact{flex:1;background:var(--card-bg);border-radius:16px;padding:22px 22px;}
  .fact .k{color:var(--gray-light);font-size:16px;letter-spacing:1px;margin-bottom:8px;}
  .fact .v{color:var(--navy);font-size:22px;font-weight:700;line-height:1.25;}
  .fact .v .b{color:var(--main-blue);} .fact .v .y{color:var(--yellow);}
</style>
</head>
<body>
<div class="card" id="card_08">
  <div class="pad">
    <div class="label"><span class="ldot"></span>INVESTMENT<span class="lbadge">USA</span></div>
    <div class="ctitle"><span class="y">Henderson</span> Completes <span class="b">$100M</span> Wastewater Upgrade at Reclamation Facility</div>
    <div class="cdivider"></div>
    <div class="info">
      <svg width="900" height="320" viewBox="0 0 900 320" xmlns="http://www.w3.org/2000/svg">
        <line x1="80" y1="280" x2="860" y2="280" stroke="#B5D4F4" stroke-width="2"/>
        <rect x="120" y="200" width="100" height="80" fill="#B5D4F4"/>
        <text x="170" y="190" font-size="16" fill="#888780" text-anchor="middle">PHASE 1</text>
        <text x="170" y="245" font-size="20" font-weight="700" fill="#ffffff" text-anchor="middle">$</text>
        <rect x="260" y="140" width="100" height="140" fill="#0075C1"/>
        <text x="310" y="130" font-size="16" fill="#888780" text-anchor="middle">PHASE 2</text>
        <text x="310" y="215" font-size="20" font-weight="700" fill="#ffffff" text-anchor="middle">$$</text>
        <rect x="400" y="80" width="100" height="200" fill="#DDA11D"/>
        <text x="450" y="70" font-size="16" fill="#888780" text-anchor="middle">COMPLETION</text>
        <text x="450" y="190" font-size="24" font-weight="700" fill="#ffffff" text-anchor="middle">$100M</text>
        <rect x="560" y="100" width="280" height="180" rx="14" fill="#E6F1FB" stroke="#DDA11D" stroke-width="3"/>
        <text x="700" y="150" font-size="20" font-weight="700" fill="#0075C1" text-anchor="middle">TOTAL INVESTMENT</text>
        <text x="700" y="220" font-size="60" font-weight="700" fill="#DDA11D" text-anchor="middle">$100M</text>
        <text x="700" y="255" font-size="16" font-weight="600" fill="#00205D" text-anchor="middle">Reclamation Facility</text>
      </svg>
    </div>
  </div>
  <div class="facts">
    <div class="fact"><div class="k">CATEGORY</div><div class="v"><span class="b">Investment</span></div></div>
    <div class="fact"><div class="k">SCALE</div><div class="v"><span class="y">$100M</span></div></div>
    <div class="fact"><div class="k">CITY</div><div class="v"><span class="y">Henderson</span></div></div>
  </div>
  <div class="footer">
    <div class="line"></div>
    <div class="row">
      <div class="logo"><span class="h">Hifil</span><span class="m">M</span>&nbsp;<span class="inc">INC.</span></div>
      <div class="center">Water Treatment</div>
      <div class="right"></div>
    </div>
  </div>
</div>
</body>
</html>
