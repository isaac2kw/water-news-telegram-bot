<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  :root{--main-blue:#0075C1;--yellow:#DDA11D;--navy:#00205D;--tint:#E6F1FB;--card-bg:#F5F7FA;--line:#B5D4F4;--gray-light:#888780;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;}
  .card{width:1080px;height:1080px;background:#ffffff;position:relative;overflow:hidden;}
  .pad{padding:0 90px;}
  .footer{position:absolute;left:0;right:0;bottom:46px;padding:0 90px;}
  .footer .line{height:1px;background:var(--line);margin-bottom:22px;}
  .footer .row{display:flex;align-items:center;justify-content:space-between;}
  .logo{font-size:26px;font-weight:700;}
  .logo .h{color:var(--main-blue);} .logo .m{color:var(--yellow);} .logo .inc{color:var(--navy);}
  .footer .center{color:var(--main-blue);font-size:22px;font-weight:600;letter-spacing:2px;}
  .footer .right{width:120px;}
  .label{display:flex;align-items:center;gap:12px;padding-top:96px;color:var(--main-blue);font-size:24px;font-weight:700;letter-spacing:3px;}
  .label .ldot{width:10px;height:10px;border-radius:50%;background:var(--main-blue);}
  .label .lbadge{margin-left:6px;background:var(--tint);color:var(--main-blue);font-size:18px;letter-spacing:2px;padding:5px 14px;border-radius:20px;}
  .ctitle{margin-top:34px;color:var(--navy);font-size:52px;font-weight:700;line-height:1.18;}
  .ctitle .b{color:var(--main-blue);} .ctitle .y{color:var(--yellow);}
  .cdivider{width:160px;height:4px;background:var(--main-blue);margin-top:30px;}
  .info{margin-top:40px;}
  .facts{position:absolute;left:90px;right:90px;bottom:150px;display:flex;gap:18px;}
  .fact{flex:1;background:var(--card-bg);border-radius:16px;padding:22px 22px;}
  .fact .k{color:var(--gray-light);font-size:16px;letter-spacing:1px;margin-bottom:8px;}
  .fact .v{color:var(--navy);font-size:22px;font-weight:700;line-height:1.25;}
  .fact .v .b{color:var(--main-blue);} .fact .v .y{color:var(--yellow);}
</style>
</head>
<body>
<div class="card" id="card_01">
  <div class="pad">
    <div class="label"><span class="ldot"></span>OPERATIONS<span class="lbadge">VIETNAM</span></div>
    <div class="ctitle"><span class="y">Dong Hiep</span> Commune Monitors <span class="b">Sewage Plant</span> Operations</div>
    <div class="cdivider"></div>
    <div class="info">
      <svg width="900" height="320" viewBox="0 0 900 320" xmlns="http://www.w3.org/2000/svg">
        <rect x="40" y="40" width="240" height="240" rx="14" fill="#F5F7FA" stroke="#B5D4F4"/>
        <text x="160" y="100" font-size="20" font-weight="700" fill="#00205D" text-anchor="middle">INFLOW</text>
        <circle cx="160" cy="180" r="42" fill="#E6F1FB" stroke="#0075C1" stroke-width="3"/>
        <text x="160" y="188" font-size="22" font-weight="700" fill="#0075C1" text-anchor="middle">In</text>
        <rect x="330" y="40" width="240" height="240" rx="14" fill="#E6F1FB" stroke="#0075C1"/>
        <text x="450" y="100" font-size="20" font-weight="700" fill="#0075C1" text-anchor="middle">TREATMENT</text>
        <rect x="380" y="140" width="140" height="100" rx="10" fill="#ffffff" stroke="#0075C1" stroke-width="2"/>
        <text x="450" y="180" font-size="18" font-weight="700" fill="#00205D" text-anchor="middle">Bio</text>
        <text x="450" y="210" font-size="18" font-weight="700" fill="#00205D" text-anchor="middle">Reactor</text>
        <rect x="620" y="40" width="240" height="240" rx="14" fill="#F5F7FA" stroke="#B5D4F4"/>
        <text x="740" y="100" font-size="20" font-weight="700" fill="#00205D" text-anchor="middle">DISCHARGE</text>
        <circle cx="740" cy="180" r="42" fill="#ffffff" stroke="#DDA11D" stroke-width="3"/>
        <text x="740" y="188" font-size="22" font-weight="700" fill="#DDA11D" text-anchor="middle">Out</text>
        <polygon points="280,180 330,165 330,195" fill="#0075C1"/>
        <polygon points="570,180 620,165 620,195" fill="#0075C1"/>
      </svg>
    </div>
  </div>
  <div class="facts">
    <div class="fact"><div class="k">CATEGORY</div><div class="v"><span class="b">Operations</span></div></div>
    <div class="fact"><div class="k">FOCUS</div><div class="v">Sewage Plant Monitoring</div></div>
    <div class="fact"><div class="k">LOCATION</div><div class="v"><span class="y">Dong Hiep</span>, Vietnam</div></div>
  </div>
  <div class="footer">
    <div class="line"></div>
    <div class="row">
      <div class="logo"><span class="h">Hifil</span><span class="m">M</span>&nbsp;<span class="inc">INC.</span></div>
      <div class="center">Water Treatment</div>
      <div class="right"></div>
    </div>
  </div>
</div>
</body>
</html>
