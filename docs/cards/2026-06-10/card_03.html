<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  :root{--main-blue:#0075C1;--yellow:#DDA11D;--navy:#00205D;--tint:#E6F1FB;--card-bg:#F5F7FA;--line:#B5D4F4;--gray-light:#888780;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;}
  .card{width:1080px;height:1080px;background:#ffffff;position:relative;overflow:hidden;}
  .pad{padding:0 90px;}
  .footer{position:absolute;left:0;right:0;bottom:46px;padding:0 90px;}
  .footer .line{height:1px;background:var(--line);margin-bottom:22px;}
  .footer .row{display:flex;align-items:center;justify-content:space-between;}
  .logo{font-size:26px;font-weight:700;}
  .logo .h{color:var(--main-blue);} .logo .m{color:var(--yellow);} .logo .inc{color:var(--navy);}
  .footer .center{color:var(--main-blue);font-size:22px;font-weight:600;letter-spacing:2px;}
  .footer .right{width:120px;}
  .label{display:flex;align-items:center;gap:12px;padding-top:96px;color:var(--main-blue);font-size:24px;font-weight:700;letter-spacing:3px;}
  .label .ldot{width:10px;height:10px;border-radius:50%;background:var(--main-blue);}
  .label .lbadge{margin-left:6px;background:var(--tint);color:var(--main-blue);font-size:18px;letter-spacing:2px;padding:5px 14px;border-radius:20px;}
  .ctitle{margin-top:34px;color:var(--navy);font-size:50px;font-weight:700;line-height:1.18;}
  .ctitle .b{color:var(--main-blue);} .ctitle .y{color:var(--yellow);}
  .cdivider{width:160px;height:4px;background:var(--main-blue);margin-top:30px;}
  .info{margin-top:40px;}
  .facts{position:absolute;left:90px;right:90px;bottom:150px;display:flex;gap:18px;}
  .fact{flex:1;background:var(--card-bg);border-radius:16px;padding:22px 22px;}
  .fact .k{color:var(--gray-light);font-size:16px;letter-spacing:1px;margin-bottom:8px;}
  .fact .v{color:var(--navy);font-size:22px;font-weight:700;line-height:1.25;}
  .fact .v .b{color:var(--main-blue);} .fact .v .y{color:var(--yellow);}
</style>
</head>
<body>
<div class="card" id="card_03">
  <div class="pad">
    <div class="label"><span class="ldot"></span>TECHNOLOGY<span class="lbadge">USA</span></div>
    <div class="ctitle"><span class="y">University of Kansas</span> Cuts <span class="b">PFAS</span> Testing Costs</div>
    <div class="cdivider"></div>
    <div class="info">
      <svg width="900" height="320" viewBox="0 0 900 320" xmlns="http://www.w3.org/2000/svg">
        <text x="180" y="50" font-size="20" font-weight="700" fill="#00205D" text-anchor="middle">CONVENTIONAL</text>
        <text x="720" y="50" font-size="20" font-weight="700" fill="#0075C1" text-anchor="middle">KU BREAKTHROUGH</text>
        <rect x="80" y="80" width="200" height="200" rx="12" fill="#F5F7FA" stroke="#B5D4F4"/>
        <text x="180" y="140" font-size="18" fill="#888780" text-anchor="middle">COST</text>
        <text x="180" y="180" font-size="36" font-weight="700" fill="#00205D" text-anchor="middle">HIGH</text>
        <text x="180" y="230" font-size="18" fill="#888780" text-anchor="middle">SPEED</text>
        <text x="180" y="260" font-size="22" font-weight="700" fill="#00205D" text-anchor="middle">Slow</text>
        <rect x="320" y="80" width="200" height="200" rx="12" fill="#F5F7FA" stroke="#B5D4F4"/>
        <text x="420" y="140" font-size="18" fill="#888780" text-anchor="middle">DETECTION</text>
        <text x="420" y="180" font-size="22" font-weight="700" fill="#00205D" text-anchor="middle">Limited</text>
        <text x="420" y="230" font-size="18" fill="#888780" text-anchor="middle">ACCESS</text>
        <text x="420" y="260" font-size="22" font-weight="700" fill="#00205D" text-anchor="middle">Narrow</text>
        <rect x="620" y="80" width="200" height="200" rx="12" fill="#E6F1FB" stroke="#0075C1" stroke-width="3"/>
        <text x="720" y="140" font-size="18" fill="#0075C1" text-anchor="middle">COST</text>
        <text x="720" y="180" font-size="36" font-weight="700" fill="#DDA11D" text-anchor="middle">LOWER</text>
        <text x="720" y="230" font-size="18" fill="#0075C1" text-anchor="middle">DETECTION</text>
        <text x="720" y="260" font-size="22" font-weight="700" fill="#00205D" text-anchor="middle">Improved</text>
      </svg>
    </div>
  </div>
  <div class="facts">
    <div class="fact"><div class="k">CATEGORY</div><div class="v"><span class="b">Technology</span></div></div>
    <div class="fact"><div class="k">FOCUS</div><div class="v">PFAS Detection</div></div>
    <div class="fact"><div class="k">INSTITUTION</div><div class="v"><span class="y">U. of Kansas</span></div></div>
  </div>
  <div class="footer">
    <div class="line"></div>
    <div class="row">
      <div class="logo"><span class="h">Hifil</span><span class="m">M</span>&nbsp;<span class="inc">INC.</span></div>
      <div class="center">Water Treatment</div>
      <div class="right"></div>
    </div>
  </div>
</div>
</body>
</html>
