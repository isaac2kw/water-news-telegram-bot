<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  :root{
    --main-blue:#0075C1;
    --yellow:#DDA11D;
    --navy:#00205D;
    --tint:#E6F1FB;
    --card-bg:#F5F7FA;
    --line:#B5D4F4;
    --gray-light:#888780;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{margin:0;padding:0;font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;}
  .card{width:1080px;height:1080px;background:#ffffff;position:relative;overflow:hidden;}
  .pad{padding:0 90px;}
  .footer{position:absolute;left:0;right:0;bottom:46px;padding:0 90px;}
  .footer .line{height:1px;background:var(--line);margin-bottom:22px;}
  .footer .row{display:flex;align-items:center;justify-content:space-between;}
  .logo{font-size:26px;font-weight:700;letter-spacing:.2px;}
  .logo .h{color:var(--main-blue);}
  .logo .m{color:var(--yellow);}
  .logo .inc{color:var(--navy);}
  .footer .center{color:var(--main-blue);font-size:22px;font-weight:600;letter-spacing:2px;}
  .footer .right{width:120px;}
  .label{display:flex;align-items:center;gap:12px;padding-top:96px;color:var(--main-blue);font-size:24px;font-weight:700;letter-spacing:3px;}
  .label .ldot{width:10px;height:10px;border-radius:50%;background:var(--main-blue);}
  .label .lbadge{margin-left:6px;background:var(--tint);color:var(--main-blue);font-size:18px;letter-spacing:2px;padding:5px 14px;border-radius:20px;}
  .ctitle{margin-top:34px;color:var(--navy);font-size:54px;font-weight:700;line-height:1.18;}
  .ctitle .b{color:var(--main-blue);}
  .ctitle .y{color:var(--yellow);}
  .cdivider{width:160px;height:4px;background:var(--main-blue);margin-top:30px;}
  .info{margin-top:40px;}
  .facts{position:absolute;left:90px;right:90px;bottom:150px;display:flex;gap:18px;}
  .fact{flex:1;background:var(--card-bg);border-radius:16px;padding:26px 24px;}
  .fact .k{color:var(--gray-light);font-size:18px;letter-spacing:1px;margin-bottom:10px;}
  .fact .v{color:var(--navy);font-size:24px;font-weight:700;line-height:1.25;}
  .fact .v .b{color:var(--main-blue);}
  .fact .v .y{color:var(--yellow);}
</style>
</head>
<body>
<div class="card" id="card_02">
  <div class="pad">
    <div class="label"><span class="ldot"></span>TECHNOLOGY · DETECTION<span class="lbadge">US</span></div>
    <div class="ctitle"><span class="y">University of Kansas</span> breakthrough cuts cost &amp; improves <span class="b">PFAS</span> detection</div>
    <div class="cdivider"></div>
    <div class="info">
      <svg width="900" height="320" viewBox="0 0 900 320" xmlns="http://www.w3.org/2000/svg">
        <!-- Conventional vs New method comparison -->
        <rect x="20" y="40" width="410" height="240" rx="16" fill="#F5F7FA" stroke="#B5D4F4" stroke-width="2"/>
        <text x="225" y="80" text-anchor="middle" font-family="Helvetica" font-size="20" font-weight="700" fill="#888780">CONVENTIONAL</text>
        <text x="225" y="105" text-anchor="middle" font-family="Helvetica" font-size="14" fill="#888780">PFAS TESTING</text>

        <rect x="60" y="135" width="330" height="28" rx="6" fill="#B5D4F4"/>
        <text x="80" y="155" font-family="Helvetica" font-size="14" font-weight="700" fill="#00205D">COST</text>
        <text x="370" y="155" text-anchor="end" font-family="Helvetica" font-size="14" font-weight="700" fill="#00205D">HIGH</text>

        <rect x="60" y="180" width="280" height="28" rx="6" fill="#B5D4F4"/>
        <text x="80" y="200" font-family="Helvetica" font-size="14" font-weight="700" fill="#00205D">TIME</text>
        <text x="320" y="200" text-anchor="end" font-family="Helvetica" font-size="14" font-weight="700" fill="#00205D">SLOW</text>

        <rect x="60" y="225" width="200" height="28" rx="6" fill="#B5D4F4"/>
        <text x="80" y="245" font-family="Helvetica" font-size="14" font-weight="700" fill="#00205D">SENSITIVITY</text>
        <text x="245" y="245" text-anchor="end" font-family="Helvetica" font-size="14" font-weight="700" fill="#00205D">LIMITED</text>

        <rect x="470" y="40" width="410" height="240" rx="16" fill="#E6F1FB" stroke="#0075C1" stroke-width="2"/>
        <text x="675" y="80" text-anchor="middle" font-family="Helvetica" font-size="20" font-weight="700" fill="#0075C1">KU BREAKTHROUGH</text>
        <text x="675" y="105" text-anchor="middle" font-family="Helvetica" font-size="14" fill="#0075C1">NEW METHOD</text>

        <rect x="510" y="135" width="130" height="28" rx="6" fill="#0075C1"/>
        <text x="530" y="155" font-family="Helvetica" font-size="14" font-weight="700" fill="#ffffff">COST</text>
        <text x="820" y="155" text-anchor="end" font-family="Helvetica" font-size="14" font-weight="700" fill="#DDA11D">LOWER</text>

        <rect x="510" y="180" width="180" height="28" rx="6" fill="#0075C1"/>
        <text x="530" y="200" font-family="Helvetica" font-size="14" font-weight="700" fill="#ffffff">TIME</text>
        <text x="820" y="200" text-anchor="end" font-family="Helvetica" font-size="14" font-weight="700" fill="#DDA11D">FASTER</text>

        <rect x="510" y="225" width="320" height="28" rx="6" fill="#0075C1"/>
        <text x="530" y="245" font-family="Helvetica" font-size="14" font-weight="700" fill="#ffffff">SENSITIVITY</text>
        <text x="820" y="245" text-anchor="end" font-family="Helvetica" font-size="14" font-weight="700" fill="#DDA11D">IMPROVED</text>
      </svg>
    </div>
  </div>
  <div class="facts">
    <div class="fact"><div class="k">CATEGORY</div><div class="v"><span class="b">Technology</span></div></div>
    <div class="fact"><div class="k">FOCUS</div><div class="v">PFAS detection method</div></div>
    <div class="fact"><div class="k">SOURCE</div><div class="v"><span class="y">University of Kansas</span></div></div>
  </div>
  <div class="footer">
    <div class="line"></div>
    <div class="row">
      <div class="logo"><span class="h">Hifil</span><span class="m">M</span>&nbsp;<span class="inc">INC.</span></div>
      <div class="center">Water Treatment</div>
      <div class="right"></div>
    </div>
  </div>
</div>
</body>
</html>
