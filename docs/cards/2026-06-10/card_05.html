<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  :root{--main-blue:#0075C1;--yellow:#DDA11D;--navy:#00205D;--tint:#E6F1FB;--card-bg:#F5F7FA;--line:#B5D4F4;--gray-light:#888780;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{margin:0;padding:0;font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;}
  .card{width:1080px;height:1080px;background:#ffffff;position:relative;overflow:hidden;}
  .pad{padding:0 90px;}
  .footer{position:absolute;left:0;right:0;bottom:46px;padding:0 90px;}
  .footer .line{height:1px;background:var(--line);margin-bottom:22px;}
  .footer .row{display:flex;align-items:center;justify-content:space-between;}
  .logo{font-size:26px;font-weight:700;}
  .logo .h{color:var(--main-blue);}.logo .m{color:var(--yellow);}.logo .inc{color:var(--navy);}
  .footer .center{color:var(--main-blue);font-size:22px;font-weight:600;letter-spacing:2px;}
  .footer .right{width:120px;}
  .label{display:flex;align-items:center;gap:12px;padding-top:96px;color:var(--main-blue);font-size:24px;font-weight:700;letter-spacing:3px;}
  .label .ldot{width:10px;height:10px;border-radius:50%;background:var(--main-blue);}
  .label .lbadge{margin-left:6px;background:var(--tint);color:var(--main-blue);font-size:18px;letter-spacing:2px;padding:5px 14px;border-radius:20px;}
  .ctitle{margin-top:34px;color:var(--navy);font-size:50px;font-weight:700;line-height:1.18;}
  .ctitle .b{color:var(--main-blue);}.ctitle .y{color:var(--yellow);}
  .cdivider{width:160px;height:4px;background:var(--main-blue);margin-top:30px;}
  .info{margin-top:40px;}
  .facts{position:absolute;left:90px;right:90px;bottom:150px;display:flex;gap:18px;}
  .fact{flex:1;background:var(--card-bg);border-radius:16px;padding:26px 24px;}
  .fact .k{color:var(--gray-light);font-size:18px;letter-spacing:1px;margin-bottom:10px;}
  .fact .v{color:var(--navy);font-size:24px;font-weight:700;line-height:1.25;}
  .fact .v .b{color:var(--main-blue);}.fact .v .y{color:var(--yellow);}
</style>
</head>
<body>
<div class="card" id="card_05">
  <div class="pad">
    <div class="label"><span class="ldot"></span>학회 · 인증<span class="lbadge">KOREA</span></div>
    <div class="ctitle"><span class="y">한국상하수도협회</span>, 환경ISC 첫 <span class="b">'S등급'</span> 획득 — 인재양성 성과 인정</div>
    <div class="cdivider"></div>
    <div class="info">
      <svg width="900" height="300" viewBox="0 0 900 300" xmlns="http://www.w3.org/2000/svg">
        <rect x="60" y="100" width="120" height="160" rx="8" fill="#F5F7FA" stroke="#B5D4F4" stroke-width="2"/>
        <text x="120" y="200" text-anchor="middle" font-size="36" font-weight="700" fill="#B5D4F4">C</text>
        <text x="120" y="235" text-anchor="middle" font-size="14" fill="#888780">Basic</text>
        <rect x="200" y="80" width="120" height="180" rx="8" fill="#F5F7FA" stroke="#B5D4F4" stroke-width="2"/>
        <text x="260" y="200" text-anchor="middle" font-size="36" font-weight="700" fill="#B5D4F4">B</text>
        <text x="260" y="235" text-anchor="middle" font-size="14" fill="#888780">Good</text>
        <rect x="340" y="60" width="120" height="200" rx="8" fill="#E6F1FB" stroke="#0075C1" stroke-width="2"/>
        <text x="400" y="200" text-anchor="middle" font-size="36" font-weight="700" fill="#0075C1">A</text>
        <text x="400" y="235" text-anchor="middle" font-size="14" fill="#888780">Excellent</text>
        <rect x="480" y="30" width="160" height="230" rx="8" fill="#DDA11D"/>
        <text x="560" y="170" text-anchor="middle" font-size="56" font-weight="700" fill="#ffffff">S</text>
        <text x="560" y="210" text-anchor="middle" font-size="16" font-weight="700" fill="#ffffff">TOP GRADE</text>
        <text x="560" y="235" text-anchor="middle" font-size="14" fill="#ffffff">FIRST EVER</text>
        <rect x="680" y="100" width="180" height="160" rx="10" fill="#E6F1FB" stroke="#0075C1" stroke-width="2"/>
        <text x="770" y="140" text-anchor="middle" font-size="16" font-weight="700" fill="#0075C1">환경 ISC</text>
        <text x="770" y="175" text-anchor="middle" font-size="14" fill="#888780">Industrial</text>
        <text x="770" y="195" text-anchor="middle" font-size="14" fill="#888780">Skills Council</text>
        <text x="770" y="225" text-anchor="middle" font-size="14" fill="#00205D">인재양성</text>
      </svg>
    </div>
  </div>
  <div class="facts">
    <div class="fact"><div class="k">기관</div><div class="v"><span class="y">한국상하수도협회</span></div></div>
    <div class="fact"><div class="k">등급</div><div class="v"><span class="b">S등급</span> · 환경 ISC</div></div>
    <div class="fact"><div class="k">분야</div><div class="v">환경산업 인재양성</div></div>
  </div>
  <div class="footer">
    <div class="line"></div>
    <div class="row">
      <div class="logo"><span class="h">Hifil</span><span class="m">M</span>&nbsp;<span class="inc">INC.</span></div>
      <div class="center">Water Treatment</div>
      <div class="right"></div>
    </div>
  </div>
</div>
</body>
</html>
