<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  :root{--main-blue:#0075C1;--yellow:#DDA11D;--navy:#00205D;--tint:#E6F1FB;--card-bg:#F5F7FA;--line:#B5D4F4;--gray-light:#888780;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{margin:0;padding:0;font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;}
  .card{width:1080px;height:1080px;background:#ffffff;position:relative;overflow:hidden;}
  .pad{padding:0 90px;}
  .footer{position:absolute;left:0;right:0;bottom:46px;padding:0 90px;}
  .footer .line{height:1px;background:var(--line);margin-bottom:22px;}
  .footer .row{display:flex;align-items:center;justify-content:space-between;}
  .logo{font-size:26px;font-weight:700;}
  .logo .h{color:var(--main-blue);}.logo .m{color:var(--yellow);}.logo .inc{color:var(--navy);}
  .footer .center{color:var(--main-blue);font-size:22px;font-weight:600;letter-spacing:2px;}
  .footer .right{width:120px;}
  .label{display:flex;align-items:center;gap:12px;padding-top:96px;color:var(--main-blue);font-size:24px;font-weight:700;letter-spacing:3px;}
  .label .ldot{width:10px;height:10px;border-radius:50%;background:var(--main-blue);}
  .label .lbadge{margin-left:6px;background:var(--tint);color:var(--main-blue);font-size:18px;letter-spacing:2px;padding:5px 14px;border-radius:20px;}
  .ctitle{margin-top:34px;color:var(--navy);font-size:50px;font-weight:700;line-height:1.18;}
  .ctitle .b{color:var(--main-blue);}.ctitle .y{color:var(--yellow);}
  .cdivider{width:160px;height:4px;background:var(--main-blue);margin-top:30px;}
  .info{margin-top:40px;}
  .facts{position:absolute;left:90px;right:90px;bottom:150px;display:flex;gap:18px;}
  .fact{flex:1;background:var(--card-bg);border-radius:16px;padding:26px 24px;}
  .fact .k{color:var(--gray-light);font-size:18px;letter-spacing:1px;margin-bottom:10px;}
  .fact .v{color:var(--navy);font-size:24px;font-weight:700;line-height:1.25;}
  .fact .v .b{color:var(--main-blue);}.fact .v .y{color:var(--yellow);}
</style>
</head>
<body>
<div class="card" id="card_02">
  <div class="pad">
    <div class="label"><span class="ldot"></span>CONTAMINATION<span class="lbadge">UK</span></div>
    <div class="ctitle">Remote <span class="y">Scotland</span> island awash with <span class="b">PFAS</span> "forever chemicals" in drinking water</div>
    <div class="cdivider"></div>
    <div class="info">
      <svg width="900" height="300" viewBox="0 0 900 300" xmlns="http://www.w3.org/2000/svg">
        <rect x="40" y="80" width="180" height="140" rx="12" fill="#E6F1FB" stroke="#0075C1" stroke-width="2"/>
        <text x="130" y="120" text-anchor="middle" font-size="18" font-weight="700" fill="#00205D">SOURCE</text>
        <text x="130" y="150" text-anchor="middle" font-size="14" fill="#888780">Unknown</text>
        <text x="130" y="172" text-anchor="middle" font-size="14" fill="#888780">origin</text>
        <polygon points="230,140 270,140 270,130 290,150 270,170 270,160 230,160" fill="#0075C1"/>
        <rect x="310" y="80" width="180" height="140" rx="12" fill="#F5F7FA" stroke="#0075C1" stroke-width="2"/>
        <text x="400" y="120" text-anchor="middle" font-size="18" font-weight="700" fill="#00205D">ISLAND</text>
        <text x="400" y="150" text-anchor="middle" font-size="14" fill="#888780">Remote</text>
        <text x="400" y="172" text-anchor="middle" font-size="14" fill="#888780">community</text>
        <polygon points="500,140 540,140 540,130 560,150 540,170 540,160 500,160" fill="#0075C1"/>
        <rect x="580" y="80" width="280" height="140" rx="12" fill="#DDA11D"/>
        <text x="720" y="120" text-anchor="middle" font-size="22" font-weight="700" fill="#ffffff">HIGHEST PFAS</text>
        <text x="720" y="155" text-anchor="middle" font-size="16" fill="#ffffff">Drinking water levels</text>
        <text x="720" y="185" text-anchor="middle" font-size="16" fill="#ffffff">in Scotland</text>
      </svg>
    </div>
  </div>
  <div class="facts">
    <div class="fact"><div class="k">REGION</div><div class="v"><span class="y">Scotland</span> Island</div></div>
    <div class="fact"><div class="k">POLLUTANT</div><div class="v"><span class="b">PFAS</span> chemicals</div></div>
    <div class="fact"><div class="k">CONCERN</div><div class="v">Drinking water</div></div>
  </div>
  <div class="footer">
    <div class="line"></div>
    <div class="row">
      <div class="logo"><span class="h">Hifil</span><span class="m">M</span>&nbsp;<span class="inc">INC.</span></div>
      <div class="center">Water Treatment</div>
      <div class="right"></div>
    </div>
  </div>
</div>
</body>
</html>
