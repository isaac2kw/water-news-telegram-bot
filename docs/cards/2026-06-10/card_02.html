<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  :root{
    --main-blue:#0075C1;
    --yellow:#DDA11D;
    --navy:#00205D;
    --tint:#E6F1FB;
    --card-bg:#F5F7FA;
    --line:#B5D4F4;
    --gray-light:#888780;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{margin:0;padding:0;font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;}
  .card{width:1080px;height:1080px;background:#ffffff;position:relative;overflow:hidden;}
  .pad{padding:0 90px;}
  .footer{position:absolute;left:0;right:0;bottom:46px;padding:0 90px;}
  .footer .line{height:1px;background:var(--line);margin-bottom:22px;}
  .footer .row{display:flex;align-items:center;justify-content:space-between;}
  .logo{font-size:26px;font-weight:700;letter-spacing:.2px;}
  .logo .h{color:var(--main-blue);}
  .logo .m{color:var(--yellow);}
  .logo .inc{color:var(--navy);}
  .footer .center{color:var(--main-blue);font-size:22px;font-weight:600;letter-spacing:2px;}
  .footer .right{width:120px;}
  .label{display:flex;align-items:center;gap:12px;padding-top:96px;color:var(--main-blue);font-size:24px;font-weight:700;letter-spacing:3px;}
  .label .ldot{width:10px;height:10px;border-radius:50%;background:var(--main-blue);}
  .label .lbadge{margin-left:6px;background:var(--tint);color:var(--main-blue);font-size:18px;letter-spacing:2px;padding:5px 14px;border-radius:20px;}
  .ctitle{margin-top:34px;color:var(--navy);font-size:54px;font-weight:700;line-height:1.18;}
  .ctitle .b{color:var(--main-blue);}
  .ctitle .y{color:var(--yellow);}
  .cdivider{width:160px;height:4px;background:var(--main-blue);margin-top:30px;}
  .info{margin-top:40px;}
  .facts{position:absolute;left:90px;right:90px;bottom:150px;display:flex;gap:18px;}
  .fact{flex:1;background:var(--card-bg);border-radius:16px;padding:26px 24px;}
  .fact .k{color:var(--gray-light);font-size:18px;letter-spacing:1px;margin-bottom:10px;}
  .fact .v{color:var(--navy);font-size:24px;font-weight:700;line-height:1.25;}
  .fact .v .b{color:var(--main-blue);}
  .fact .v .y{color:var(--yellow);}
</style>
</head>
<body>
<div class="card" id="card_01">
  <div class="pad">
    <div class="label"><span class="ldot"></span>POLICY · CONTAMINATION<span class="lbadge">UK · SCOTLAND</span></div>
    <div class="ctitle">Highest <span class="b">PFAS</span> levels found in <span class="y">Scotland</span> remote island drinking water</div>
    <div class="cdivider"></div>
    <div class="info">
      <svg width="900" height="320" viewBox="0 0 900 320" xmlns="http://www.w3.org/2000/svg">
        <!-- Flow: Source → Water → Risk -->
        <rect x="20" y="80" width="220" height="160" rx="14" fill="#F5F7FA" stroke="#B5D4F4" stroke-width="2"/>
        <text x="130" y="125" text-anchor="middle" font-family="Helvetica" font-size="20" font-weight="700" fill="#00205D">FOREVER</text>
        <text x="130" y="152" text-anchor="middle" font-family="Helvetica" font-size="20" font-weight="700" fill="#00205D">CHEMICALS</text>
        <text x="130" y="190" text-anchor="middle" font-family="Helvetica" font-size="16" fill="#888780">Industrial &amp;</text>
        <text x="130" y="212" text-anchor="middle" font-family="Helvetica" font-size="16" fill="#888780">historic sources</text>

        <polygon points="260,140 310,140 310,125 340,160 310,195 310,180 260,180" fill="#0075C1"/>

        <rect x="350" y="80" width="220" height="160" rx="14" fill="#E6F1FB" stroke="#0075C1" stroke-width="2"/>
        <circle cx="460" cy="135" r="22" fill="#0075C1"/>
        <text x="460" y="142" text-anchor="middle" font-family="Helvetica" font-size="22" font-weight="700" fill="#ffffff">H₂O</text>
        <text x="460" y="185" text-anchor="middle" font-family="Helvetica" font-size="20" font-weight="700" fill="#00205D">DRINKING</text>
        <text x="460" y="212" text-anchor="middle" font-family="Helvetica" font-size="20" font-weight="700" fill="#00205D">WATER</text>

        <polygon points="590,140 640,140 640,125 670,160 640,195 640,180 590,180" fill="#0075C1"/>

        <rect x="680" y="80" width="200" height="160" rx="14" fill="#F5F7FA" stroke="#DDA11D" stroke-width="2"/>
        <circle cx="780" cy="135" r="22" fill="#DDA11D"/>
        <text x="780" y="143" text-anchor="middle" font-family="Helvetica" font-size="24" font-weight="700" fill="#ffffff">!</text>
        <text x="780" y="185" text-anchor="middle" font-family="Helvetica" font-size="20" font-weight="700" fill="#00205D">HEALTH</text>
        <text x="780" y="212" text-anchor="middle" font-family="Helvetica" font-size="20" font-weight="700" fill="#00205D">RISK</text>

        <text x="450" y="290" text-anchor="middle" font-family="Helvetica" font-size="18" fill="#888780">Persistent PFAS contamination on a remote Scottish island raises regulatory concern</text>
      </svg>
    </div>
  </div>
  <div class="facts">
    <div class="fact"><div class="k">CATEGORY</div><div class="v"><span class="b">Regulation</span></div></div>
    <div class="fact"><div class="k">FOCUS</div><div class="v">PFAS in drinking water</div></div>
    <div class="fact"><div class="k">REGION</div><div class="v"><span class="y">Scotland</span>, UK</div></div>
  </div>
  <div class="footer">
    <div class="line"></div>
    <div class="row">
      <div class="logo"><span class="h">Hifil</span><span class="m">M</span>&nbsp;<span class="inc">INC.</span></div>
      <div class="center">Water Treatment</div>
      <div class="right"></div>
    </div>
  </div>
</div>
</body>
</html>
