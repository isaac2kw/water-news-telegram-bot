<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  :root{--main-blue:#0075C1;--yellow:#DDA11D;--navy:#00205D;--tint:#E6F1FB;--card-bg:#F5F7FA;--line:#B5D4F4;--gray-light:#888780;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;}
  .card{width:1080px;height:1080px;background:#ffffff;position:relative;overflow:hidden;}
  .pad{padding:0 90px;}
  .footer{position:absolute;left:0;right:0;bottom:46px;padding:0 90px;}
  .footer .line{height:1px;background:var(--line);margin-bottom:22px;}
  .footer .row{display:flex;align-items:center;justify-content:space-between;}
  .logo{font-size:26px;font-weight:700;}
  .logo .h{color:var(--main-blue);} .logo .m{color:var(--yellow);} .logo .inc{color:var(--navy);}
  .footer .center{color:var(--main-blue);font-size:22px;font-weight:600;letter-spacing:2px;}
  .footer .right{width:120px;}
  .label{display:flex;align-items:center;gap:12px;padding-top:96px;color:var(--main-blue);font-size:24px;font-weight:700;letter-spacing:3px;}
  .label .ldot{width:10px;height:10px;border-radius:50%;background:var(--main-blue);}
  .label .lbadge{margin-left:6px;background:var(--tint);color:var(--main-blue);font-size:18px;letter-spacing:2px;padding:5px 14px;border-radius:20px;}
  .ctitle{margin-top:34px;color:var(--navy);font-size:48px;font-weight:700;line-height:1.18;}
  .ctitle .b{color:var(--main-blue);} .ctitle .y{color:var(--yellow);}
  .cdivider{width:160px;height:4px;background:var(--main-blue);margin-top:30px;}
  .info{margin-top:40px;}
  .facts{position:absolute;left:90px;right:90px;bottom:150px;display:flex;gap:18px;}
  .fact{flex:1;background:var(--card-bg);border-radius:16px;padding:22px 22px;}
  .fact .k{color:var(--gray-light);font-size:16px;letter-spacing:1px;margin-bottom:8px;}
  .fact .v{color:var(--navy);font-size:22px;font-weight:700;line-height:1.25;}
  .fact .v .b{color:var(--main-blue);} .fact .v .y{color:var(--yellow);}
</style>
</head>
<body>
<div class="card" id="card_10">
  <div class="pad">
    <div class="label"><span class="ldot"></span>INSPECTION<span class="lbadge">KOREA</span></div>
    <div class="ctitle"><span class="y">Yesan</span> Conducts <span class="b">Special Inspection</span> of Industrial Wastewater Facilities</div>
    <div class="cdivider"></div>
    <div class="info">
      <svg width="900" height="320" viewBox="0 0 900 320" xmlns="http://www.w3.org/2000/svg">
        <rect x="60" y="60" width="240" height="220" rx="14" fill="#F5F7FA" stroke="#B5D4F4"/>
        <text x="180" y="110" font-size="18" font-weight="700" fill="#00205D" text-anchor="middle">INDUSTRIAL</text>
        <text x="180" y="135" font-size="18" font-weight="700" fill="#00205D" text-anchor="middle">COMPLEX</text>
        <rect x="100" y="170" width="50" height="80" fill="#0075C1"/>
        <rect x="160" y="190" width="50" height="60" fill="#0075C1"/>
        <rect x="220" y="160" width="50" height="90" fill="#0075C1"/>
        <polygon points="300,165 360,150 360,180" fill="#0075C1"/>
        <rect x="380" y="60" width="240" height="220" rx="14" fill="#E6F1FB" stroke="#0075C1" stroke-width="3"/>
        <text x="500" y="110" font-size="18" font-weight="700" fill="#0075C1" text-anchor="middle">SPECIAL</text>
        <text x="500" y="135" font-size="18" font-weight="700" fill="#0075C1" text-anchor="middle">INSPECTION</text>
        <circle cx="500" cy="200" r="50" fill="#ffffff" stroke="#DDA11D" stroke-width="4"/>
        <circle cx="500" cy="200" r="20" fill="#DDA11D"/>
        <text x="500" y="270" font-size="14" fill="#888780" text-anchor="middle">Drainage + WWTP</text>
        <polygon points="620,165 680,150 680,180" fill="#0075C1"/>
        <rect x="700" y="60" width="240" height="220" rx="14" fill="#F5F7FA" stroke="#DDA11D" stroke-width="3"/>
        <text x="820" y="110" font-size="18" font-weight="700" fill="#DDA11D" text-anchor="middle">COMPLIANCE</text>
        <text x="820" y="200" font-size="56" font-weight="700" fill="#0075C1" text-anchor="middle">✓</text>
        <text x="820" y="245" font-size="16" font-weight="600" fill="#00205D" text-anchor="middle">Safety Check</text>
      </svg>
    </div>
  </div>
  <div class="facts">
    <div class="fact"><div class="k">CATEGORY</div><div class="v"><span class="b">Inspection</span></div></div>
    <div class="fact"><div class="k">FOCUS</div><div class="v">Industrial WWTP</div></div>
    <div class="fact"><div class="k">COUNTY</div><div class="v"><span class="y">Yesan</span></div></div>
  </div>
  <div class="footer">
    <div class="line"></div>
    <div class="row">
      <div class="logo"><span class="h">Hifil</span><span class="m">M</span>&nbsp;<span class="inc">INC.</span></div>
      <div class="center">Water Treatment</div>
      <div class="right"></div>
    </div>
  </div>
</div>
</body>
</html>
