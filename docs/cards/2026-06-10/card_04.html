<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  :root{
    --main-blue:#0075C1;
    --yellow:#DDA11D;
    --navy:#00205D;
    --tint:#E6F1FB;
    --card-bg:#F5F7FA;
    --line:#B5D4F4;
    --gray-light:#888780;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{margin:0;padding:0;font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;}
  .card{width:1080px;height:1080px;background:#ffffff;position:relative;overflow:hidden;}
  .pad{padding:0 90px;}
  .footer{position:absolute;left:0;right:0;bottom:46px;padding:0 90px;}
  .footer .line{height:1px;background:var(--line);margin-bottom:22px;}
  .footer .row{display:flex;align-items:center;justify-content:space-between;}
  .logo{font-size:26px;font-weight:700;letter-spacing:.2px;}
  .logo .h{color:var(--main-blue);}
  .logo .m{color:var(--yellow);}
  .logo .inc{color:var(--navy);}
  .footer .center{color:var(--main-blue);font-size:22px;font-weight:600;letter-spacing:2px;}
  .footer .right{width:120px;}
  .label{display:flex;align-items:center;gap:12px;padding-top:96px;color:var(--main-blue);font-size:24px;font-weight:700;letter-spacing:3px;}
  .label .ldot{width:10px;height:10px;border-radius:50%;background:var(--main-blue);}
  .label .lbadge{margin-left:6px;background:var(--tint);color:var(--main-blue);font-size:18px;letter-spacing:2px;padding:5px 14px;border-radius:20px;}
  .ctitle{margin-top:34px;color:var(--navy);font-size:54px;font-weight:700;line-height:1.18;}
  .ctitle .b{color:var(--main-blue);}
  .ctitle .y{color:var(--yellow);}
  .cdivider{width:160px;height:4px;background:var(--main-blue);margin-top:30px;}
  .info{margin-top:40px;}
  .facts{position:absolute;left:90px;right:90px;bottom:150px;display:flex;gap:18px;}
  .fact{flex:1;background:var(--card-bg);border-radius:16px;padding:26px 24px;}
  .fact .k{color:var(--gray-light);font-size:18px;letter-spacing:1px;margin-bottom:10px;}
  .fact .v{color:var(--navy);font-size:24px;font-weight:700;line-height:1.25;}
  .fact .v .b{color:var(--main-blue);}
  .fact .v .y{color:var(--yellow);}
</style>
</head>
<body>
<div class="card" id="card_03">
  <div class="pad">
    <div class="label"><span class="ldot"></span>TRENDS · MONITORING<span class="lbadge">US</span></div>
    <div class="ctitle">Faster low-cost <span class="b">PFAS</span> testing could reshape <span class="y">US</span> water monitoring</div>
    <div class="cdivider"></div>
    <div class="info">
      <svg width="900" height="320" viewBox="0 0 900 320" xmlns="http://www.w3.org/2000/svg">
        <!-- Flow diagram: Sample → Fast Test → Scale Up → Nationwide -->
        <rect x="10" y="100" width="180" height="120" rx="14" fill="#F5F7FA" stroke="#B5D4F4" stroke-width="2"/>
        <circle cx="100" cy="145" r="20" fill="#0075C1"/>
        <text x="100" y="152" text-anchor="middle" font-family="Helvetica" font-size="20" font-weight="700" fill="#ffffff">1</text>
        <text x="100" y="190" text-anchor="middle" font-family="Helvetica" font-size="16" font-weight="700" fill="#00205D">WATER</text>
        <text x="100" y="210" text-anchor="middle" font-family="Helvetica" font-size="16" font-weight="700" fill="#00205D">SAMPLE</text>

        <polygon points="200,145 230,145 230,135 255,160 230,185 230,175 200,175" fill="#0075C1"/>

        <rect x="265" y="100" width="180" height="120" rx="14" fill="#E6F1FB" stroke="#0075C1" stroke-width="2"/>
        <circle cx="355" cy="145" r="20" fill="#0075C1"/>
        <text x="355" y="152" text-anchor="middle" font-family="Helvetica" font-size="20" font-weight="700" fill="#ffffff">2</text>
        <text x="355" y="190" text-anchor="middle" font-family="Helvetica" font-size="16" font-weight="700" fill="#00205D">FAST</text>
        <text x="355" y="210" text-anchor="middle" font-family="Helvetica" font-size="16" font-weight="700" fill="#00205D">PFAS TEST</text>

        <polygon points="455,145 485,145 485,135 510,160 485,185 485,175 455,175" fill="#0075C1"/>

        <rect x="520" y="100" width="180" height="120" rx="14" fill="#F5F7FA" stroke="#B5D4F4" stroke-width="2"/>
        <circle cx="610" cy="145" r="20" fill="#0075C1"/>
        <text x="610" y="152" text-anchor="middle" font-family="Helvetica" font-size="20" font-weight="700" fill="#ffffff">3</text>
        <text x="610" y="190" text-anchor="middle" font-family="Helvetica" font-size="16" font-weight="700" fill="#00205D">LOWER</text>
        <text x="610" y="210" text-anchor="middle" font-family="Helvetica" font-size="16" font-weight="700" fill="#00205D">COST</text>

        <polygon points="710,145 740,145 740,135 765,160 740,185 740,175 710,175" fill="#DDA11D"/>

        <rect x="775" y="100" width="115" height="120" rx="14" fill="#FFF6E0" stroke="#DDA11D" stroke-width="2"/>
        <circle cx="832" cy="145" r="20" fill="#DDA11D"/>
        <text x="832" y="152" text-anchor="middle" font-family="Helvetica" font-size="20" font-weight="700" fill="#ffffff">4</text>
        <text x="832" y="190" text-anchor="middle" font-family="Helvetica" font-size="15" font-weight="700" fill="#00205D">NATION-</text>
        <text x="832" y="210" text-anchor="middle" font-family="Helvetica" font-size="15" font-weight="700" fill="#00205D">WIDE</text>

        <text x="450" y="280" text-anchor="middle" font-family="Helvetica" font-size="18" fill="#888780">Lower cost enables broader, more frequent water monitoring across the US</text>
      </svg>
    </div>
  </div>
  <div class="facts">
    <div class="fact"><div class="k">CATEGORY</div><div class="v"><span class="b">Industry Trend</span></div></div>
    <div class="fact"><div class="k">FOCUS</div><div class="v">Drinking water monitoring</div></div>
    <div class="fact"><div class="k">REGION</div><div class="v"><span class="y">United States</span></div></div>
  </div>
  <div class="footer">
    <div class="line"></div>
    <div class="row">
      <div class="logo"><span class="h">Hifil</span><span class="m">M</span>&nbsp;<span class="inc">INC.</span></div>
      <div class="center">Water Treatment</div>
      <div class="right"></div>
    </div>
  </div>
</div>
</body>
</html>
