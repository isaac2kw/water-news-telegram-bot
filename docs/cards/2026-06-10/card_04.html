<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  :root{--main-blue:#0075C1;--yellow:#DDA11D;--navy:#00205D;--tint:#E6F1FB;--card-bg:#F5F7FA;--line:#B5D4F4;--gray-light:#888780;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{margin:0;padding:0;font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;}
  .card{width:1080px;height:1080px;background:#ffffff;position:relative;overflow:hidden;}
  .pad{padding:0 90px;}
  .footer{position:absolute;left:0;right:0;bottom:46px;padding:0 90px;}
  .footer .line{height:1px;background:var(--line);margin-bottom:22px;}
  .footer .row{display:flex;align-items:center;justify-content:space-between;}
  .logo{font-size:26px;font-weight:700;}
  .logo .h{color:var(--main-blue);}.logo .m{color:var(--yellow);}.logo .inc{color:var(--navy);}
  .footer .center{color:var(--main-blue);font-size:22px;font-weight:600;letter-spacing:2px;}
  .footer .right{width:120px;}
  .label{display:flex;align-items:center;gap:12px;padding-top:96px;color:var(--main-blue);font-size:24px;font-weight:700;letter-spacing:3px;}
  .label .ldot{width:10px;height:10px;border-radius:50%;background:var(--main-blue);}
  .label .lbadge{margin-left:6px;background:var(--tint);color:var(--main-blue);font-size:18px;letter-spacing:2px;padding:5px 14px;border-radius:20px;}
  .ctitle{margin-top:34px;color:var(--navy);font-size:50px;font-weight:700;line-height:1.18;}
  .ctitle .b{color:var(--main-blue);}.ctitle .y{color:var(--yellow);}
  .cdivider{width:160px;height:4px;background:var(--main-blue);margin-top:30px;}
  .info{margin-top:40px;}
  .facts{position:absolute;left:90px;right:90px;bottom:150px;display:flex;gap:18px;}
  .fact{flex:1;background:var(--card-bg);border-radius:16px;padding:26px 24px;}
  .fact .k{color:var(--gray-light);font-size:18px;letter-spacing:1px;margin-bottom:10px;}
  .fact .v{color:var(--navy);font-size:24px;font-weight:700;line-height:1.25;}
  .fact .v .b{color:var(--main-blue);}.fact .v .y{color:var(--yellow);}
</style>
</head>
<body>
<div class="card" id="card_04">
  <div class="pad">
    <div class="label"><span class="ldot"></span>POLICY · MONITORING<span class="lbadge">USA</span></div>
    <div class="ctitle">Faster, lower-cost <span class="b">PFAS testing</span> could reshape <span class="y">US</span> drinking water monitoring</div>
    <div class="cdivider"></div>
    <div class="info">
      <svg width="900" height="300" viewBox="0 0 900 300" xmlns="http://www.w3.org/2000/svg">
        <line x1="80" y1="240" x2="820" y2="240" stroke="#00205D" stroke-width="2"/>
        <text x="160" y="270" text-anchor="middle" font-size="16" font-weight="700" fill="#888780">TODAY</text>
        <text x="450" y="270" text-anchor="middle" font-size="16" font-weight="700" fill="#0075C1">TRANSITION</text>
        <text x="740" y="270" text-anchor="middle" font-size="16" font-weight="700" fill="#DDA11D">REFORMED</text>
        <circle cx="160" cy="240" r="10" fill="#B5D4F4"/>
        <circle cx="450" cy="240" r="12" fill="#0075C1"/>
        <circle cx="740" cy="240" r="14" fill="#DDA11D"/>
        <rect x="100" y="110" width="120" height="100" rx="10" fill="#F5F7FA" stroke="#B5D4F4" stroke-width="2"/>
        <text x="160" y="150" text-anchor="middle" font-size="22" font-weight="700" fill="#00205D">SLOW</text>
        <text x="160" y="180" text-anchor="middle" font-size="14" fill="#888780">High cost</text>
        <rect x="390" y="100" width="120" height="110" rx="10" fill="#E6F1FB" stroke="#0075C1" stroke-width="2"/>
        <text x="450" y="140" text-anchor="middle" font-size="20" font-weight="700" fill="#0075C1">NEW TEST</text>
        <text x="450" y="170" text-anchor="middle" font-size="14" fill="#888780">Deploy</text>
        <text x="450" y="192" text-anchor="middle" font-size="14" fill="#888780">at scale</text>
        <rect x="680" y="90" width="120" height="120" rx="10" fill="#DDA11D"/>
        <text x="740" y="135" text-anchor="middle" font-size="22" font-weight="700" fill="#ffffff">WIDE</text>
        <text x="740" y="165" text-anchor="middle" font-size="14" fill="#ffffff">monitoring</text>
        <text x="740" y="187" text-anchor="middle" font-size="14" fill="#ffffff">coverage</text>
      </svg>
    </div>
  </div>
  <div class="facts">
    <div class="fact"><div class="k">REGION</div><div class="v"><span class="y">United States</span></div></div>
    <div class="fact"><div class="k">DRIVER</div><div class="v">Faster low-cost test</div></div>
    <div class="fact"><div class="k">OUTCOME</div><div class="v">Reshape <span class="b">monitoring</span></div></div>
  </div>
  <div class="footer">
    <div class="line"></div>
    <div class="row">
      <div class="logo"><span class="h">Hifil</span><span class="m">M</span>&nbsp;<span class="inc">INC.</span></div>
      <div class="center">Water Treatment</div>
      <div class="right"></div>
    </div>
  </div>
</div>
</body>
</html>
