<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  :root{--main-blue:#0075C1;--yellow:#DDA11D;--navy:#00205D;--tint:#E6F1FB;--card-bg:#F5F7FA;--line:#B5D4F4;--gray-light:#888780;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;}
  .card{width:1080px;height:1080px;background:#ffffff;position:relative;overflow:hidden;}
  .pad{padding:0 90px;}
  .footer{position:absolute;left:0;right:0;bottom:46px;padding:0 90px;}
  .footer .line{height:1px;background:var(--line);margin-bottom:22px;}
  .footer .row{display:flex;align-items:center;justify-content:space-between;}
  .logo{font-size:26px;font-weight:700;}
  .logo .h{color:var(--main-blue);} .logo .m{color:var(--yellow);} .logo .inc{color:var(--navy);}
  .footer .center{color:var(--main-blue);font-size:22px;font-weight:600;letter-spacing:2px;}
  .footer .right{width:120px;}
  .label{display:flex;align-items:center;gap:12px;padding-top:96px;color:var(--main-blue);font-size:24px;font-weight:700;letter-spacing:3px;}
  .label .ldot{width:10px;height:10px;border-radius:50%;background:var(--main-blue);}
  .label .lbadge{margin-left:6px;background:var(--tint);color:var(--main-blue);font-size:18px;letter-spacing:2px;padding:5px 14px;border-radius:20px;}
  .ctitle{margin-top:34px;color:var(--navy);font-size:46px;font-weight:700;line-height:1.18;}
  .ctitle .b{color:var(--main-blue);} .ctitle .y{color:var(--yellow);}
  .cdivider{width:160px;height:4px;background:var(--main-blue);margin-top:30px;}
  .info{margin-top:40px;}
  .facts{position:absolute;left:90px;right:90px;bottom:150px;display:flex;gap:18px;}
  .fact{flex:1;background:var(--card-bg);border-radius:16px;padding:22px 22px;}
  .fact .k{color:var(--gray-light);font-size:16px;letter-spacing:1px;margin-bottom:8px;}
  .fact .v{color:var(--navy);font-size:22px;font-weight:700;line-height:1.25;}
  .fact .v .b{color:var(--main-blue);} .fact .v .y{color:var(--yellow);}
</style>
</head>
<body>
<div class="card" id="card_07">
  <div class="pad">
    <div class="label"><span class="ldot"></span>PARTNERSHIP<span class="lbadge">USA</span></div>
    <div class="ctitle"><span class="y">Buffalo</span> and <span class="y">Corps of Engineers</span> Sign Pact to Protect <span class="b">Sewer Plant</span></div>
    <div class="cdivider"></div>
    <div class="info">
      <svg width="900" height="300" viewBox="0 0 900 300" xmlns="http://www.w3.org/2000/svg">
        <rect x="40" y="80" width="240" height="140" rx="14" fill="#E6F1FB" stroke="#0075C1" stroke-width="3"/>
        <text x="160" y="135" font-size="18" fill="#0075C1" text-anchor="middle">PARTNER A</text>
        <text x="160" y="175" font-size="22" font-weight="700" fill="#00205D" text-anchor="middle">US Army</text>
        <text x="160" y="200" font-size="18" font-weight="700" fill="#DDA11D" text-anchor="middle">Corps of Engineers</text>
        <line x1="280" y1="150" x2="380" y2="150" stroke="#0075C1" stroke-width="3"/>
        <circle cx="450" cy="150" r="60" fill="#ffffff" stroke="#DDA11D" stroke-width="4"/>
        <text x="450" y="145" font-size="16" font-weight="700" fill="#0075C1" text-anchor="middle">AGREEMENT</text>
        <text x="450" y="170" font-size="14" fill="#888780" text-anchor="middle">Protect WWTP</text>
        <line x1="520" y1="150" x2="620" y2="150" stroke="#0075C1" stroke-width="3"/>
        <rect x="620" y="80" width="240" height="140" rx="14" fill="#E6F1FB" stroke="#0075C1" stroke-width="3"/>
        <text x="740" y="135" font-size="18" fill="#0075C1" text-anchor="middle">PARTNER B</text>
        <text x="740" y="175" font-size="22" font-weight="700" fill="#DDA11D" text-anchor="middle">City of Buffalo</text>
        <text x="740" y="200" font-size="16" font-weight="700" fill="#00205D" text-anchor="middle">Sewer Authority</text>
      </svg>
    </div>
  </div>
  <div class="facts">
    <div class="fact"><div class="k">CATEGORY</div><div class="v"><span class="b">Partnership</span></div></div>
    <div class="fact"><div class="k">FOCUS</div><div class="v">WWTP Protection</div></div>
    <div class="fact"><div class="k">CITY</div><div class="v"><span class="y">Buffalo</span>, NY</div></div>
  </div>
  <div class="footer">
    <div class="line"></div>
    <div class="row">
      <div class="logo"><span class="h">Hifil</span><span class="m">M</span>&nbsp;<span class="inc">INC.</span></div>
      <div class="center">Water Treatment</div>
      <div class="right"></div>
    </div>
  </div>
</div>
</body>
</html>
