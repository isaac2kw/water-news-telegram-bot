<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  :root{--main-blue:#0075C1;--yellow:#DDA11D;--navy:#00205D;--tint:#E6F1FB;--card-bg:#F5F7FA;--line:#B5D4F4;--gray-light:#888780;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{margin:0;padding:0;font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;}
  .card{width:1080px;height:1080px;background:#ffffff;position:relative;overflow:hidden;}
  .pad{padding:0 90px;}
  .footer{position:absolute;left:0;right:0;bottom:46px;padding:0 90px;}
  .footer .line{height:1px;background:var(--line);margin-bottom:22px;}
  .footer .row{display:flex;align-items:center;justify-content:space-between;}
  .logo{font-size:26px;font-weight:700;}
  .logo .h{color:var(--main-blue);}.logo .m{color:var(--yellow);}.logo .inc{color:var(--navy);}
  .footer .center{color:var(--main-blue);font-size:22px;font-weight:600;letter-spacing:2px;}
  .footer .right{width:120px;}
  .label{display:flex;align-items:center;gap:12px;padding-top:96px;color:var(--main-blue);font-size:24px;font-weight:700;letter-spacing:3px;}
  .label .ldot{width:10px;height:10px;border-radius:50%;background:var(--main-blue);}
  .label .lbadge{margin-left:6px;background:var(--tint);color:var(--main-blue);font-size:18px;letter-spacing:2px;padding:5px 14px;border-radius:20px;}
  .ctitle{margin-top:34px;color:var(--navy);font-size:50px;font-weight:700;line-height:1.18;}
  .ctitle .b{color:var(--main-blue);}.ctitle .y{color:var(--yellow);}
  .cdivider{width:160px;height:4px;background:var(--main-blue);margin-top:30px;}
  .info{margin-top:48px;}
  .facts{position:absolute;left:90px;right:90px;bottom:150px;display:flex;gap:18px;}
  .fact{flex:1;background:var(--card-bg);border-radius:16px;padding:26px 24px;}
  .fact .k{color:var(--gray-light);font-size:18px;letter-spacing:1px;margin-bottom:10px;}
  .fact .v{color:var(--navy);font-size:26px;font-weight:700;line-height:1.25;}
  .fact .v .b{color:var(--main-blue);}.fact .v .y{color:var(--yellow);}
</style>
</head>
<body>
<div class="card" id="card_08">
  <div class="pad">
    <div class="label"><span class="ldot"></span>AWARDS · OPERATIONS<span class="lbadge">USA</span></div>
    <div class="ctitle"><span class="y">Walnut Creek</span> Plant Earns 6th Straight Environmental Stewardship Award</div>
    <div class="cdivider"></div>
    <div class="info">
      <svg width="900" height="300" viewBox="0 0 900 300" xmlns="http://www.w3.org/2000/svg">
        <text x="450" y="40" text-anchor="middle" fill="#0075C1" font-size="22" font-weight="700" letter-spacing="2">CONSECUTIVE YEARS AWARDED</text>
        <g transform="translate(60,80)">
          <rect x="0" y="140" width="100" height="40" fill="#B5D4F4"/>
          <text x="50" y="200" text-anchor="middle" fill="#00205D" font-size="18" font-weight="700">Y1</text>
          <rect x="130" y="120" width="100" height="60" fill="#B5D4F4"/>
          <text x="180" y="200" text-anchor="middle" fill="#00205D" font-size="18" font-weight="700">Y2</text>
          <rect x="260" y="100" width="100" height="80" fill="#0075C1"/>
          <text x="310" y="200" text-anchor="middle" fill="#00205D" font-size="18" font-weight="700">Y3</text>
          <rect x="390" y="80" width="100" height="100" fill="#0075C1"/>
          <text x="440" y="200" text-anchor="middle" fill="#00205D" font-size="18" font-weight="700">Y4</text>
          <rect x="520" y="60" width="100" height="120" fill="#0075C1"/>
          <text x="570" y="200" text-anchor="middle" fill="#00205D" font-size="18" font-weight="700">Y5</text>
          <rect x="650" y="30" width="100" height="150" fill="#DDA11D"/>
          <text x="700" y="200" text-anchor="middle" fill="#DDA11D" font-size="20" font-weight="700">Y6</text>
          <text x="700" y="20" text-anchor="middle" fill="#DDA11D" font-size="20" font-weight="700">★</text>
        </g>
      </svg>
    </div>
  </div>
  <div class="facts">
    <div class="fact"><div class="k">CATEGORY</div><div class="v"><span class="b">Operations</span></div></div>
    <div class="fact"><div class="k">PLANT</div><div class="v"><span class="y">Walnut Creek</span></div></div>
    <div class="fact"><div class="k">RECORD</div><div class="v">6 <span class="y">Consecutive</span> Years</div></div>
  </div>
  <div class="footer">
    <div class="line"></div>
    <div class="row">
      <div class="logo"><span class="h">Hifil</span><span class="m">M</span>&nbsp;<span class="inc">INC.</span></div>
      <div class="center">Water Treatment</div>
      <div class="right"></div>
    </div>
  </div>
</div>
</body>
</html>
