<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  :root{--main-blue:#0075C1;--yellow:#DDA11D;--navy:#00205D;--tint:#E6F1FB;--card-bg:#F5F7FA;--line:#B5D4F4;--gray-light:#888780;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{margin:0;padding:0;font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;}
  .card{width:1080px;height:1080px;background:#ffffff;position:relative;overflow:hidden;}
  .pad{padding:0 90px;}
  .footer{position:absolute;left:0;right:0;bottom:46px;padding:0 90px;}
  .footer .line{height:1px;background:var(--line);margin-bottom:22px;}
  .footer .row{display:flex;align-items:center;justify-content:space-between;}
  .logo{font-size:26px;font-weight:700;}
  .logo .h{color:var(--main-blue);}.logo .m{color:var(--yellow);}.logo .inc{color:var(--navy);}
  .footer .center{color:var(--main-blue);font-size:22px;font-weight:600;letter-spacing:2px;}
  .footer .right{width:120px;}
  .label{display:flex;align-items:center;gap:12px;padding-top:96px;color:var(--main-blue);font-size:24px;font-weight:700;letter-spacing:3px;}
  .label .ldot{width:10px;height:10px;border-radius:50%;background:var(--main-blue);}
  .label .lbadge{margin-left:6px;background:var(--tint);color:var(--main-blue);font-size:18px;letter-spacing:2px;padding:5px 14px;border-radius:20px;}
  .ctitle{margin-top:34px;color:var(--navy);font-size:56px;font-weight:700;line-height:1.18;}
  .ctitle .b{color:var(--main-blue);}.ctitle .y{color:var(--yellow);}
  .cdivider{width:160px;height:4px;background:var(--main-blue);margin-top:30px;}
  .info{margin-top:48px;}
  .facts{position:absolute;left:90px;right:90px;bottom:150px;display:flex;gap:18px;}
  .fact{flex:1;background:var(--card-bg);border-radius:16px;padding:26px 24px;}
  .fact .k{color:var(--gray-light);font-size:18px;letter-spacing:1px;margin-bottom:10px;}
  .fact .v{color:var(--navy);font-size:26px;font-weight:700;line-height:1.25;}
  .fact .v .b{color:var(--main-blue);}.fact .v .y{color:var(--yellow);}
</style>
</head>
<body>
<div class="card" id="card_01">
  <div class="pad">
    <div class="label"><span class="ldot"></span>ENERGY · RESOURCE<span class="lbadge">KOREA</span></div>
    <div class="ctitle"><span class="b">Clean Hydrogen</span> Produced and Sold at <span class="y">Korean</span> Wastewater Plant</div>
    <div class="cdivider"></div>
    <div class="info">
      <svg width="900" height="340" viewBox="0 0 900 340" xmlns="http://www.w3.org/2000/svg">
        <rect x="20" y="120" width="200" height="100" rx="12" fill="#E6F1FB" stroke="#0075C1" stroke-width="2"/>
        <text x="120" y="160" text-anchor="middle" fill="#00205D" font-size="22" font-weight="700">Wastewater</text>
        <text x="120" y="190" text-anchor="middle" fill="#00205D" font-size="22" font-weight="700">Plant</text>
        <polygon points="230,160 290,160 290,145 320,170 290,195 290,180 230,180" fill="#0075C1"/>
        <rect x="340" y="120" width="200" height="100" rx="12" fill="#F5F7FA" stroke="#0075C1" stroke-width="2"/>
        <text x="440" y="160" text-anchor="middle" fill="#00205D" font-size="22" font-weight="700">Biogas &amp;</text>
        <text x="440" y="190" text-anchor="middle" fill="#00205D" font-size="22" font-weight="700">Reforming</text>
        <polygon points="550,160 610,160 610,145 640,170 610,195 610,180 550,180" fill="#0075C1"/>
        <rect x="660" y="120" width="220" height="100" rx="12" fill="#DDA11D" stroke="#00205D" stroke-width="2"/>
        <text x="770" y="160" text-anchor="middle" fill="#ffffff" font-size="22" font-weight="700">Clean H₂</text>
        <text x="770" y="190" text-anchor="middle" fill="#ffffff" font-size="22" font-weight="700">Sold to Market</text>
        <text x="450" y="60" text-anchor="middle" fill="#0075C1" font-size="26" font-weight="700" letter-spacing="2">SEWAGE → HYDROGEN VALUE CHAIN</text>
        <text x="450" y="290" text-anchor="middle" fill="#888780" font-size="18">Wastewater biogas converted to clean hydrogen for commercial supply</text>
      </svg>
    </div>
  </div>
  <div class="facts">
    <div class="fact"><div class="k">CATEGORY</div><div class="v"><span class="b">Resource Recovery</span></div></div>
    <div class="fact"><div class="k">FOCUS</div><div class="v">Clean Hydrogen from Sewage</div></div>
    <div class="fact"><div class="k">MARKET</div><div class="v"><span class="y">Commercial Sales</span></div></div>
  </div>
  <div class="footer">
    <div class="line"></div>
    <div class="row">
      <div class="logo"><span class="h">Hifil</span><span class="m">M</span>&nbsp;<span class="inc">INC.</span></div>
      <div class="center">Water Treatment</div>
      <div class="right"></div>
    </div>
  </div>
</div>
</body>
</html>
