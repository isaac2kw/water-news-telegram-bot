<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  :root{--main-blue:#0075C1;--yellow:#DDA11D;--navy:#00205D;--tint:#E6F1FB;--card-bg:#F5F7FA;--line:#B5D4F4;--gray-light:#888780;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{margin:0;padding:0;font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;}
  .card{width:1080px;height:1080px;background:#ffffff;position:relative;overflow:hidden;}
  .pad{padding:0 90px;}
  .footer{position:absolute;left:0;right:0;bottom:46px;padding:0 90px;}
  .footer .line{height:1px;background:var(--line);margin-bottom:22px;}
  .footer .row{display:flex;align-items:center;justify-content:space-between;}
  .logo{font-size:26px;font-weight:700;}
  .logo .h{color:var(--main-blue);}.logo .m{color:var(--yellow);}.logo .inc{color:var(--navy);}
  .footer .center{color:var(--main-blue);font-size:22px;font-weight:600;letter-spacing:2px;}
  .footer .right{width:120px;}
  .label{display:flex;align-items:center;gap:12px;padding-top:96px;color:var(--main-blue);font-size:24px;font-weight:700;letter-spacing:3px;}
  .label .ldot{width:10px;height:10px;border-radius:50%;background:var(--main-blue);}
  .label .lbadge{margin-left:6px;background:var(--tint);color:var(--main-blue);font-size:18px;letter-spacing:2px;padding:5px 14px;border-radius:20px;}
  .ctitle{margin-top:34px;color:var(--navy);font-size:52px;font-weight:700;line-height:1.18;}
  .ctitle .b{color:var(--main-blue);}.ctitle .y{color:var(--yellow);}
  .cdivider{width:160px;height:4px;background:var(--main-blue);margin-top:30px;}
  .info{margin-top:48px;}
  .facts{position:absolute;left:90px;right:90px;bottom:150px;display:flex;gap:18px;}
  .fact{flex:1;background:var(--card-bg);border-radius:16px;padding:26px 24px;}
  .fact .k{color:var(--gray-light);font-size:18px;letter-spacing:1px;margin-bottom:10px;}
  .fact .v{color:var(--navy);font-size:26px;font-weight:700;line-height:1.25;}
  .fact .v .b{color:var(--main-blue);}.fact .v .y{color:var(--yellow);}
</style>
</head>
<body>
<div class="card" id="card_09">
  <div class="pad">
    <div class="label"><span class="ldot"></span>POLICY · REGULATION<span class="lbadge">USA</span></div>
    <div class="ctitle"><span class="y">Trump</span> Officials Kill Proposed <span class="b">PFAS</span> Sewage Fertilizer Rules</div>
    <div class="cdivider"></div>
    <div class="info">
      <svg width="900" height="320" viewBox="0 0 900 320" xmlns="http://www.w3.org/2000/svg">
        <text x="450" y="40" text-anchor="middle" fill="#0075C1" font-size="22" font-weight="700" letter-spacing="2">PFAS PATHWAY LEFT UNREGULATED</text>
        <rect x="30" y="120" width="180" height="110" rx="12" fill="#E6F1FB" stroke="#0075C1" stroke-width="2"/>
        <text x="120" y="165" text-anchor="middle" fill="#00205D" font-size="20" font-weight="700">Sewage</text>
        <text x="120" y="195" text-anchor="middle" fill="#00205D" font-size="20" font-weight="700">Sludge</text>
        <polygon points="220,170 260,170 260,155 285,175 260,195 260,180 220,180" fill="#0075C1"/>
        <rect x="295" y="120" width="180" height="110" rx="12" fill="#F5F7FA" stroke="#DDA11D" stroke-width="2"/>
        <text x="385" y="165" text-anchor="middle" fill="#DDA11D" font-size="22" font-weight="700">PFAS in</text>
        <text x="385" y="195" text-anchor="middle" fill="#DDA11D" font-size="22" font-weight="700">Fertilizer</text>
        <polygon points="485,170 525,170 525,155 550,175 525,195 525,180 485,180" fill="#0075C1"/>
        <rect x="560" y="120" width="180" height="110" rx="12" fill="#F5F7FA" stroke="#B5D4F4" stroke-width="2"/>
        <text x="650" y="165" text-anchor="middle" fill="#00205D" font-size="20" font-weight="700">Farmland</text>
        <text x="650" y="195" text-anchor="middle" fill="#00205D" font-size="20" font-weight="700">Application</text>
        <g transform="translate(770,120)">
          <rect x="0" y="0" width="110" height="110" rx="14" fill="#DDA11D"/>
          <text x="55" y="45" text-anchor="middle" fill="#ffffff" font-size="18" font-weight="700">RULES</text>
          <line x1="15" y1="20" x2="95" y2="90" stroke="#ffffff" stroke-width="5"/>
          <line x1="95" y1="20" x2="15" y2="90" stroke="#ffffff" stroke-width="5"/>
          <text x="55" y="90" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="700">KILLED</text>
        </g>
      </svg>
    </div>
  </div>
  <div class="facts">
    <div class="fact"><div class="k">CATEGORY</div><div class="v"><span class="b">Regulation</span></div></div>
    <div class="fact"><div class="k">CONTAMINANT</div><div class="v"><span class="b">PFAS</span></div></div>
    <div class="fact"><div class="k">STATUS</div><div class="v">Proposal Rejected</div></div>
  </div>
  <div class="footer">
    <div class="line"></div>
    <div class="row">
      <div class="logo"><span class="h">Hifil</span><span class="m">M</span>&nbsp;<span class="inc">INC.</span></div>
      <div class="center">Water Treatment</div>
      <div class="right"></div>
    </div>
  </div>
</div>
</body>
</html>
