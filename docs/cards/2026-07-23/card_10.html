<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  :root{--main-blue:#0075C1;--yellow:#DDA11D;--navy:#00205D;--tint:#E6F1FB;--card-bg:#F5F7FA;--line:#B5D4F4;--gray-light:#888780;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{margin:0;padding:0;font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;}
  .card{width:1080px;height:1080px;background:#ffffff;position:relative;overflow:hidden;}
  .pad{padding:0 90px;}
  .footer{position:absolute;left:0;right:0;bottom:46px;padding:0 90px;}
  .footer .line{height:1px;background:var(--line);margin-bottom:22px;}
  .footer .row{display:flex;align-items:center;justify-content:space-between;}
  .logo{font-size:26px;font-weight:700;}
  .logo .h{color:var(--main-blue);}.logo .m{color:var(--yellow);}.logo .inc{color:var(--navy);}
  .footer .center{color:var(--main-blue);font-size:22px;font-weight:600;letter-spacing:2px;}
  .footer .right{width:120px;}
  .label{display:flex;align-items:center;gap:12px;padding-top:96px;color:var(--main-blue);font-size:24px;font-weight:700;letter-spacing:3px;}
  .label .ldot{width:10px;height:10px;border-radius:50%;background:var(--main-blue);}
  .label .lbadge{margin-left:6px;background:var(--tint);color:var(--main-blue);font-size:18px;letter-spacing:2px;padding:5px 14px;border-radius:20px;}
  .ctitle{margin-top:34px;color:var(--navy);font-size:54px;font-weight:700;line-height:1.18;}
  .ctitle .b{color:var(--main-blue);}.ctitle .y{color:var(--yellow);}
  .cdivider{width:160px;height:4px;background:var(--main-blue);margin-top:30px;}
  .info{margin-top:48px;}
  .facts{position:absolute;left:90px;right:90px;bottom:150px;display:flex;gap:18px;}
  .fact{flex:1;background:var(--card-bg);border-radius:16px;padding:26px 24px;}
  .fact .k{color:var(--gray-light);font-size:18px;letter-spacing:1px;margin-bottom:10px;}
  .fact .v{color:var(--navy);font-size:26px;font-weight:700;line-height:1.25;}
  .fact .v .b{color:var(--main-blue);}.fact .v .y{color:var(--yellow);}
</style>
</head>
<body>
<div class="card" id="card_10">
  <div class="pad">
    <div class="label"><span class="ldot"></span>AWARDS · PERFORMANCE<span class="lbadge">USA</span></div>
    <div class="ctitle"><span class="y">Lynnwood</span> Named Top Performing Wastewater Treatment Plant</div>
    <div class="cdivider"></div>
    <div class="info">
      <svg width="900" height="320" viewBox="0 0 900 320" xmlns="http://www.w3.org/2000/svg">
        <text x="450" y="40" text-anchor="middle" fill="#0075C1" font-size="22" font-weight="700" letter-spacing="2">PERFORMANCE RANKING</text>
        <g transform="translate(150,80)">
          <rect x="0" y="70" width="140" height="150" rx="10" fill="#B5D4F4"/>
          <text x="70" y="120" text-anchor="middle" fill="#00205D" font-size="28" font-weight="700">2nd</text>
          <text x="70" y="155" text-anchor="middle" fill="#00205D" font-size="16">Peer Plant</text>
          <rect x="160" y="20" width="140" height="200" rx="10" fill="#DDA11D"/>
          <text x="230" y="80" text-anchor="middle" fill="#ffffff" font-size="20" font-weight="700">★ TOP</text>
          <text x="230" y="125" text-anchor="middle" fill="#ffffff" font-size="30" font-weight="700">1st</text>
          <text x="230" y="160" text-anchor="middle" fill="#ffffff" font-size="18" font-weight="700">Lynnwood</text>
          <rect x="320" y="90" width="140" height="130" rx="10" fill="#B5D4F4"/>
          <text x="390" y="140" text-anchor="middle" fill="#00205D" font-size="28" font-weight="700">3rd</text>
          <text x="390" y="175" text-anchor="middle" fill="#00205D" font-size="16">Peer Plant</text>
          <line x1="0" y1="220" x2="470" y2="220" stroke="#00205D" stroke-width="3"/>
          <text x="530" y="130" fill="#0075C1" font-size="22" font-weight="700">TOP</text>
          <text x="530" y="160" fill="#0075C1" font-size="22" font-weight="700">PERFORMING</text>
          <text x="530" y="190" fill="#00205D" font-size="18">WWTP AWARD</text>
        </g>
      </svg>
    </div>
  </div>
  <div class="facts">
    <div class="fact"><div class="k">CATEGORY</div><div class="v"><span class="b">Performance</span></div></div>
    <div class="fact"><div class="k">CITY</div><div class="v"><span class="y">Lynnwood</span></div></div>
    <div class="fact"><div class="k">RANK</div><div class="v"><span class="y">Top Performing</span></div></div>
  </div>
  <div class="footer">
    <div class="line"></div>
    <div class="row">
      <div class="logo"><span class="h">Hifil</span><span class="m">M</span>&nbsp;<span class="inc">INC.</span></div>
      <div class="center">Water Treatment</div>
      <div class="right"></div>
    </div>
  </div>
</div>
</body>
</html>
