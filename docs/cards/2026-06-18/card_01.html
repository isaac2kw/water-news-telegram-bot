<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  :root{--main-blue:#0075C1;--yellow:#DDA11D;--navy:#00205D;--tint:#E6F1FB;--card-bg:#F5F7FA;--line:#B5D4F4;--gray-light:#888780;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{margin:0;padding:0;font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;}
  .card{width:1080px;height:1080px;background:#ffffff;position:relative;overflow:hidden;}
  .pad{padding:0 90px;}
  .footer{position:absolute;left:0;right:0;bottom:46px;padding:0 90px;}
  .footer .line{height:1px;background:var(--line);margin-bottom:22px;}
  .footer .row{display:flex;align-items:center;justify-content:space-between;}
  .logo{font-size:26px;font-weight:700;}
  .logo .h{color:var(--main-blue);}.logo .m{color:var(--yellow);}.logo .inc{color:var(--navy);}
  .footer .center{color:var(--main-blue);font-size:22px;font-weight:600;letter-spacing:2px;}
  .footer .right{width:120px;}
  .label{display:flex;align-items:center;gap:12px;padding-top:96px;color:var(--main-blue);font-size:24px;font-weight:700;letter-spacing:3px;}
  .label .ldot{width:10px;height:10px;border-radius:50%;background:var(--main-blue);}
  .label .lbadge{margin-left:6px;background:var(--tint);color:var(--main-blue);font-size:18px;letter-spacing:2px;padding:5px 14px;border-radius:20px;}
  .ctitle{margin-top:34px;color:var(--navy);font-size:52px;font-weight:700;line-height:1.18;}
  .ctitle .b{color:var(--main-blue);}.ctitle .y{color:var(--yellow);}
  .cdivider{width:160px;height:4px;background:var(--main-blue);margin-top:30px;}
  .info{margin-top:44px;}
  .facts{position:absolute;left:90px;right:90px;bottom:150px;display:flex;gap:18px;}
  .fact{flex:1;background:var(--card-bg);border-radius:16px;padding:26px 24px;}
  .fact .k{color:var(--gray-light);font-size:18px;letter-spacing:1px;margin-bottom:10px;}
  .fact .v{color:var(--navy);font-size:24px;font-weight:700;line-height:1.25;}
  .fact .v .b{color:var(--main-blue);}.fact .v .y{color:var(--yellow);}
</style>
</head>
<body>
<div class="card" id="card_01">
  <div class="pad">
    <div class="label"><span class="ldot"></span>POLICY · DISCLOSURE<span class="lbadge">KOREA</span></div>
    <div class="ctitle"><span class="y">Gyeonggi</span> Institute Expands <span class="b">Onsite Sewage</span> Data Disclosure</div>
    <div class="cdivider"></div>
    <div class="info">
      <svg width="900" height="320" viewBox="0 0 900 320" xmlns="http://www.w3.org/2000/svg">
        <rect x="40" y="60" width="240" height="120" rx="14" fill="#E6F1FB"/>
        <text x="160" y="110" text-anchor="middle" font-family="Helvetica" font-size="22" font-weight="700" fill="#00205D">Institute</text>
        <text x="160" y="142" text-anchor="middle" font-family="Helvetica" font-size="16" fill="#0075C1">Gyeonggi HEI</text>
        <rect x="620" y="60" width="240" height="120" rx="14" fill="#E6F1FB"/>
        <text x="740" y="110" text-anchor="middle" font-family="Helvetica" font-size="22" font-weight="700" fill="#00205D">Public</text>
        <text x="740" y="142" text-anchor="middle" font-family="Helvetica" font-size="16" fill="#0075C1">Open Access</text>
        <circle cx="450" cy="120" r="50" fill="#DDA11D"/>
        <text x="450" y="115" text-anchor="middle" font-family="Helvetica" font-size="14" font-weight="700" fill="#ffffff">PRODUCT</text>
        <text x="450" y="133" text-anchor="middle" font-family="Helvetica" font-size="14" font-weight="700" fill="#ffffff">REGISTRY</text>
        <line x1="280" y1="120" x2="400" y2="120" stroke="#0075C1" stroke-width="3"/>
        <line x1="500" y1="120" x2="620" y2="120" stroke="#0075C1" stroke-width="3"/>
        <rect x="40" y="220" width="820" height="70" rx="12" fill="#F5F7FA"/>
        <text x="450" y="265" text-anchor="middle" font-family="Helvetica" font-size="20" font-weight="700" fill="#00205D">Reform Forum · Transparency · System Improvement</text>
      </svg>
    </div>
  </div>
  <div class="facts">
    <div class="fact"><div class="k">REGION</div><div class="v"><span class="y">Gyeonggi</span></div></div>
    <div class="fact"><div class="k">FOCUS</div><div class="v">Disclosure Expansion</div></div>
    <div class="fact"><div class="k">SCOPE</div><div class="v"><span class="b">Onsite Sewage</span></div></div>
  </div>
  <div class="footer">
    <div class="line"></div>
    <div class="row">
      <div class="logo"><span class="h">Hifil</span><span class="m">M</span>&nbsp;<span class="inc">INC.</span></div>
      <div class="center">Water Treatment</div>
      <div class="right"></div>
    </div>
  </div>
</div>
</body>
</html>
