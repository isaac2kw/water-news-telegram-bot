<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  :root{--main-blue:#0075C1;--yellow:#DDA11D;--navy:#00205D;--tint:#E6F1FB;--card-bg:#F5F7FA;--line:#B5D4F4;--gray-light:#888780;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{margin:0;padding:0;font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;}
  .card{width:1080px;height:1080px;background:#ffffff;position:relative;overflow:hidden;}
  .pad{padding:0 90px;}
  .footer{position:absolute;left:0;right:0;bottom:46px;padding:0 90px;}
  .footer .line{height:1px;background:var(--line);margin-bottom:22px;}
  .footer .row{display:flex;align-items:center;justify-content:space-between;}
  .logo{font-size:26px;font-weight:700;}
  .logo .h{color:var(--main-blue);}.logo .m{color:var(--yellow);}.logo .inc{color:var(--navy);}
  .footer .center{color:var(--main-blue);font-size:22px;font-weight:600;letter-spacing:2px;}
  .footer .right{width:120px;}
  .label{display:flex;align-items:center;gap:12px;padding-top:96px;color:var(--main-blue);font-size:24px;font-weight:700;letter-spacing:3px;}
  .label .ldot{width:10px;height:10px;border-radius:50%;background:var(--main-blue);}
  .label .lbadge{margin-left:6px;background:var(--tint);color:var(--main-blue);font-size:18px;letter-spacing:2px;padding:5px 14px;border-radius:20px;}
  .ctitle{margin-top:34px;color:var(--navy);font-size:52px;font-weight:700;line-height:1.18;}
  .ctitle .b{color:var(--main-blue);}.ctitle .y{color:var(--yellow);}
  .cdivider{width:160px;height:4px;background:var(--main-blue);margin-top:30px;}
  .info{margin-top:44px;}
  .facts{position:absolute;left:90px;right:90px;bottom:150px;display:flex;gap:18px;}
  .fact{flex:1;background:var(--card-bg);border-radius:16px;padding:26px 24px;}
  .fact .k{color:var(--gray-light);font-size:18px;letter-spacing:1px;margin-bottom:10px;}
  .fact .v{color:var(--navy);font-size:24px;font-weight:700;line-height:1.25;}
  .fact .v .b{color:var(--main-blue);}.fact .v .y{color:var(--yellow);}
</style>
</head>
<body>
<div class="card" id="card_03">
  <div class="pad">
    <div class="label"><span class="ldot"></span>TECH · MBR PROJECT<span class="lbadge">AUSTRALIA</span></div>
    <div class="ctitle"><span class="y">DuPont</span> <span class="b">MBR</span> Selected for Major Wastewater Project in <span class="y">Sydney</span></div>
    <div class="cdivider"></div>
    <div class="info">
      <svg width="900" height="320" viewBox="0 0 900 320" xmlns="http://www.w3.org/2000/svg">
        <rect x="30" y="60" width="240" height="140" rx="14" fill="#E6F1FB"/>
        <text x="150" y="115" text-anchor="middle" font-family="Helvetica" font-size="22" font-weight="700" fill="#DDA11D">DuPont</text>
        <text x="150" y="148" text-anchor="middle" font-family="Helvetica" font-size="18" fill="#00205D">Technology</text>
        <text x="150" y="172" text-anchor="middle" font-family="Helvetica" font-size="16" fill="#0075C1">Supplier</text>
        <circle cx="450" cy="130" r="60" fill="#0075C1"/>
        <text x="450" y="125" text-anchor="middle" font-family="Helvetica" font-size="20" font-weight="700" fill="#ffffff">MBR</text>
        <text x="450" y="150" text-anchor="middle" font-family="Helvetica" font-size="14" fill="#ffffff">SYSTEM</text>
        <line x1="270" y1="130" x2="390" y2="130" stroke="#0075C1" stroke-width="3" stroke-dasharray="6,4"/>
        <line x1="510" y1="130" x2="630" y2="130" stroke="#0075C1" stroke-width="3" stroke-dasharray="6,4"/>
        <rect x="630" y="60" width="240" height="140" rx="14" fill="#E6F1FB"/>
        <text x="750" y="115" text-anchor="middle" font-family="Helvetica" font-size="22" font-weight="700" fill="#DDA11D">Sydney</text>
        <text x="750" y="148" text-anchor="middle" font-family="Helvetica" font-size="18" fill="#00205D">Wastewater</text>
        <text x="750" y="172" text-anchor="middle" font-family="Helvetica" font-size="16" fill="#0075C1">Project</text>
        <rect x="30" y="230" width="840" height="60" rx="12" fill="#F5F7FA"/>
        <text x="450" y="268" text-anchor="middle" font-family="Helvetica" font-size="20" font-weight="700" fill="#00205D">Membrane Bioreactor · Municipal Scale Deployment</text>
      </svg>
    </div>
  </div>
  <div class="facts">
    <div class="fact"><div class="k">SUPPLIER</div><div class="v"><span class="y">DuPont</span></div></div>
    <div class="fact"><div class="k">TECH</div><div class="v"><span class="b">MBR</span></div></div>
    <div class="fact"><div class="k">LOCATION</div><div class="v"><span class="y">Sydney</span>, AU</div></div>
  </div>
  <div class="footer">
    <div class="line"></div>
    <div class="row">
      <div class="logo"><span class="h">Hifil</span><span class="m">M</span>&nbsp;<span class="inc">INC.</span></div>
      <div class="center">Water Treatment</div>
      <div class="right"></div>
    </div>
  </div>
</div>
</body>
</html>
