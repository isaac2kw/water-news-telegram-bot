<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  :root{--main-blue:#0075C1;--yellow:#DDA11D;--navy:#00205D;--tint:#E6F1FB;--card-bg:#F5F7FA;--line:#B5D4F4;--gray-light:#888780;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{margin:0;padding:0;font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;}
  .card{width:1080px;height:1080px;background:#ffffff;position:relative;overflow:hidden;}
  .pad{padding:0 90px;}
  .footer{position:absolute;left:0;right:0;bottom:46px;padding:0 90px;}
  .footer .line{height:1px;background:var(--line);margin-bottom:22px;}
  .footer .row{display:flex;align-items:center;justify-content:space-between;}
  .logo{font-size:26px;font-weight:700;}
  .logo .h{color:var(--main-blue);}.logo .m{color:var(--yellow);}.logo .inc{color:var(--navy);}
  .footer .center{color:var(--main-blue);font-size:22px;font-weight:600;letter-spacing:2px;}
  .footer .right{width:120px;}
  .label{display:flex;align-items:center;gap:12px;padding-top:96px;color:var(--main-blue);font-size:24px;font-weight:700;letter-spacing:3px;}
  .label .ldot{width:10px;height:10px;border-radius:50%;background:var(--main-blue);}
  .label .lbadge{margin-left:6px;background:var(--tint);color:var(--main-blue);font-size:18px;letter-spacing:2px;padding:5px 14px;border-radius:20px;}
  .ctitle{margin-top:34px;color:var(--navy);font-size:48px;font-weight:700;line-height:1.18;}
  .ctitle .b{color:var(--main-blue);}.ctitle .y{color:var(--yellow);}
  .cdivider{width:160px;height:4px;background:var(--main-blue);margin-top:30px;}
  .info{margin-top:44px;}
  .facts{position:absolute;left:90px;right:90px;bottom:150px;display:flex;gap:18px;}
  .fact{flex:1;background:var(--card-bg);border-radius:16px;padding:26px 24px;}
  .fact .k{color:var(--gray-light);font-size:18px;letter-spacing:1px;margin-bottom:10px;}
  .fact .v{color:var(--navy);font-size:22px;font-weight:700;line-height:1.25;}
  .fact .v .b{color:var(--main-blue);}.fact .v .y{color:var(--yellow);}
</style>
</head>
<body>
<div class="card" id="card_06">
  <div class="pad">
    <div class="label"><span class="ldot"></span>POLICY · DISPUTE<span class="lbadge">KOREA</span></div>
    <div class="ctitle"><span class="y">Saekdal</span> Sewage Plant Expansion Faces <span class="b">Ministry Guideline</span> Bypass Dispute</div>
    <div class="cdivider"></div>
    <div class="info">
      <svg width="900" height="320" viewBox="0 0 900 320" xmlns="http://www.w3.org/2000/svg">
        <rect x="30" y="50" width="200" height="100" rx="12" fill="#E6F1FB"/>
        <text x="130" y="90" text-anchor="middle" font-family="Helvetica" font-size="18" font-weight="700" fill="#00205D">Expansion</text>
        <text x="130" y="118" text-anchor="middle" font-family="Helvetica" font-size="16" fill="#DDA11D">Saekdal Plant</text>
        <polygon points="230,100 280,80 280,120" fill="#0075C1"/>
        <rect x="290" y="50" width="220" height="100" rx="12" fill="#E6F1FB"/>
        <text x="400" y="90" text-anchor="middle" font-family="Helvetica" font-size="18" font-weight="700" fill="#00205D">Required</text>
        <text x="400" y="118" text-anchor="middle" font-family="Helvetica" font-size="16" fill="#0075C1">Ministry Guideline</text>
        <polygon points="510,100 560,80 560,120" fill="#DDA11D"/>
        <text x="535" y="65" text-anchor="middle" font-family="Helvetica" font-size="14" font-weight="700" fill="#DDA11D">BYPASS</text>
        <rect x="570" y="50" width="280" height="100" rx="12" fill="#DDA11D"/>
        <text x="710" y="90" text-anchor="middle" font-family="Helvetica" font-size="18" font-weight="700" fill="#ffffff">Controversy</text>
        <text x="710" y="118" text-anchor="middle" font-family="Helvetica" font-size="16" fill="#ffffff">Procedure Skipped</text>
        <rect x="30" y="200" width="820" height="80" rx="12" fill="#F5F7FA"/>
        <text x="440" y="235" text-anchor="middle" font-family="Helvetica" font-size="20" font-weight="700" fill="#00205D">Issue: Compliance with Ministry of Environment Procedures</text>
        <text x="440" y="262" text-anchor="middle" font-family="Helvetica" font-size="16" fill="#0075C1">Local Oversight · Procedural Review</text>
      </svg>
    </div>
  </div>
  <div class="facts">
    <div class="fact"><div class="k">PROJECT</div><div class="v"><span class="y">Saekdal</span> Expansion</div></div>
    <div class="fact"><div class="k">ISSUE</div><div class="v"><span class="b">Guideline Bypass</span></div></div>
    <div class="fact"><div class="k">AUTHORITY</div><div class="v">Ministry of Environment</div></div>
  </div>
  <div class="footer">
    <div class="line"></div>
    <div class="row">
      <div class="logo"><span class="h">Hifil</span><span class="m">M</span>&nbsp;<span class="inc">INC.</span></div>
      <div class="center">Water Treatment</div>
      <div class="right"></div>
    </div>
  </div>
</div>
</body>
</html>
