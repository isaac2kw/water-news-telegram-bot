<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  :root{--main-blue:#0075C1;--yellow:#DDA11D;--navy:#00205D;--tint:#E6F1FB;--card-bg:#F5F7FA;--line:#B5D4F4;--gray-light:#888780;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{margin:0;padding:0;font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;}
  .card{width:1080px;height:1080px;background:#ffffff;position:relative;overflow:hidden;}
  .pad{padding:0 90px;}
  .footer{position:absolute;left:0;right:0;bottom:46px;padding:0 90px;}
  .footer .line{height:1px;background:var(--line);margin-bottom:22px;}
  .footer .row{display:flex;align-items:center;justify-content:space-between;}
  .logo{font-size:26px;font-weight:700;}
  .logo .h{color:var(--main-blue);}.logo .m{color:var(--yellow);}.logo .inc{color:var(--navy);}
  .footer .center{color:var(--main-blue);font-size:22px;font-weight:600;letter-spacing:2px;}
  .footer .right{width:120px;}
  .label{display:flex;align-items:center;gap:12px;padding-top:96px;color:var(--main-blue);font-size:24px;font-weight:700;letter-spacing:3px;}
  .label .ldot{width:10px;height:10px;border-radius:50%;background:var(--main-blue);}
  .label .lbadge{margin-left:6px;background:var(--tint);color:var(--main-blue);font-size:18px;letter-spacing:2px;padding:5px 14px;border-radius:20px;}
  .ctitle{margin-top:34px;color:var(--navy);font-size:52px;font-weight:700;line-height:1.18;}
  .ctitle .b{color:var(--main-blue);}.ctitle .y{color:var(--yellow);}
  .cdivider{width:160px;height:4px;background:var(--main-blue);margin-top:30px;}
  .info{margin-top:44px;}
  .facts{position:absolute;left:90px;right:90px;bottom:150px;display:flex;gap:18px;}
  .fact{flex:1;background:var(--card-bg);border-radius:16px;padding:26px 24px;}
  .fact .k{color:var(--gray-light);font-size:18px;letter-spacing:1px;margin-bottom:10px;}
  .fact .v{color:var(--navy);font-size:24px;font-weight:700;line-height:1.25;}
  .fact .v .b{color:var(--main-blue);}.fact .v .y{color:var(--yellow);}
</style>
</head>
<body>
<div class="card" id="card_02">
  <div class="pad">
    <div class="label"><span class="ldot"></span>POLICY · FORUM<span class="lbadge">KOREA</span></div>
    <div class="ctitle"><span class="y">Gyeonggi</span> Hosts Forum on <span class="b">Onsite Sewage</span> System Reform</div>
    <div class="cdivider"></div>
    <div class="info">
      <svg width="900" height="320" viewBox="0 0 900 320" xmlns="http://www.w3.org/2000/svg">
        <rect x="20" y="80" width="180" height="100" rx="12" fill="#E6F1FB"/>
        <text x="110" y="125" text-anchor="middle" font-family="Helvetica" font-size="18" font-weight="700" fill="#00205D">Registered</text>
        <text x="110" y="150" text-anchor="middle" font-family="Helvetica" font-size="16" fill="#0075C1">Products</text>
        <polygon points="200,130 240,115 240,145" fill="#0075C1"/>
        <rect x="250" y="80" width="180" height="100" rx="12" fill="#E6F1FB"/>
        <text x="340" y="125" text-anchor="middle" font-family="Helvetica" font-size="18" font-weight="700" fill="#00205D">Public</text>
        <text x="340" y="150" text-anchor="middle" font-family="Helvetica" font-size="16" fill="#0075C1">Disclosure</text>
        <polygon points="430,130 470,115 470,145" fill="#0075C1"/>
        <rect x="480" y="80" width="180" height="100" rx="12" fill="#E6F1FB"/>
        <text x="570" y="125" text-anchor="middle" font-family="Helvetica" font-size="18" font-weight="700" fill="#00205D">Stakeholder</text>
        <text x="570" y="150" text-anchor="middle" font-family="Helvetica" font-size="16" fill="#0075C1">Forum</text>
        <polygon points="660,130 700,115 700,145" fill="#0075C1"/>
        <rect x="710" y="80" width="170" height="100" rx="12" fill="#DDA11D"/>
        <text x="795" y="125" text-anchor="middle" font-family="Helvetica" font-size="18" font-weight="700" fill="#ffffff">System</text>
        <text x="795" y="150" text-anchor="middle" font-family="Helvetica" font-size="16" font-weight="700" fill="#ffffff">Reform</text>
        <rect x="20" y="220" width="860" height="70" rx="12" fill="#F5F7FA"/>
        <text x="450" y="265" text-anchor="middle" font-family="Helvetica" font-size="20" font-weight="700" fill="#00205D">Pathway: Registry → Disclosure → Dialogue → Policy</text>
      </svg>
    </div>
  </div>
  <div class="facts">
    <div class="fact"><div class="k">HOST</div><div class="v"><span class="y">Gyeonggi HEI</span></div></div>
    <div class="fact"><div class="k">EVENT</div><div class="v">Discussion Forum</div></div>
    <div class="fact"><div class="k">GOAL</div><div class="v"><span class="b">System Reform</span></div></div>
  </div>
  <div class="footer">
    <div class="line"></div>
    <div class="row">
      <div class="logo"><span class="h">Hifil</span><span class="m">M</span>&nbsp;<span class="inc">INC.</span></div>
      <div class="center">Water Treatment</div>
      <div class="right"></div>
    </div>
  </div>
</div>
</body>
</html>
