<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  :root{
    --main-blue:#0075C1;
    --yellow:#DDA11D;
    --navy:#00205D;
    --tint:#E6F1FB;
    --card-bg:#F5F7FA;
    --line:#B5D4F4;
    --gray-light:#888780;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{margin:0;padding:0;font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;}
  .card{width:1080px;height:1080px;background:#ffffff;position:relative;overflow:hidden;}
  .pad{padding:0 90px;}
  .footer{position:absolute;left:0;right:0;bottom:46px;padding:0 90px;}
  .footer .line{height:1px;background:var(--line);margin-bottom:22px;}
  .footer .row{display:flex;align-items:center;justify-content:space-between;}
  .logo{font-size:26px;font-weight:700;letter-spacing:.2px;}
  .logo .h{color:var(--main-blue);}
  .logo .m{color:var(--yellow);}
  .logo .inc{color:var(--navy);}
  .footer .center{color:var(--main-blue);font-size:22px;font-weight:600;letter-spacing:2px;}
  .footer .right{width:120px;}
  .label{display:flex;align-items:center;gap:12px;padding-top:96px;color:var(--main-blue);font-size:24px;font-weight:700;letter-spacing:3px;}
  .label .ldot{width:10px;height:10px;border-radius:50%;background:var(--main-blue);}
  .label .lbadge{margin-left:6px;background:var(--tint);color:var(--main-blue);font-size:18px;letter-spacing:2px;padding:5px 14px;border-radius:20px;}
  .ctitle{margin-top:34px;color:var(--navy);font-size:50px;font-weight:700;line-height:1.18;}
  .ctitle .b{color:var(--main-blue);}
  .ctitle .y{color:var(--yellow);}
  .cdivider{width:160px;height:4px;background:var(--main-blue);margin-top:30px;}
  .info{margin-top:40px;}
  .facts{position:absolute;left:90px;right:90px;bottom:150px;display:flex;gap:18px;}
  .fact{flex:1;background:var(--card-bg);border-radius:16px;padding:26px 24px;}
  .fact .k{color:var(--gray-light);font-size:18px;letter-spacing:1px;margin-bottom:10px;}
  .fact .v{color:var(--navy);font-size:22px;font-weight:700;line-height:1.25;}
  .fact .v .b{color:var(--main-blue);}
  .fact .v .y{color:var(--yellow);}
</style>
</head>
<body>
<div class="card" id="card_02">
  <div class="pad">
    <div class="label"><span class="ldot"></span>POLICY · GOVERNANCE<span class="lbadge">KR</span></div>
    <div class="ctitle">Critics Urge: "Don't Push <span class="b">Sewage Project</span> Through Before <span class="y">Mayor-Elect</span> Takes Office"</div>
    <div class="cdivider"></div>
    <div class="info">
      <svg width="900" height="340" viewBox="0 0 900 340" xmlns="http://www.w3.org/2000/svg">
        <!-- Left side: Current admin pushing -->
        <rect x="40" y="60" width="280" height="220" rx="14" fill="#F5F7FA" stroke="#B5D4F4" stroke-width="2"/>
        <text x="180" y="100" text-anchor="middle" fill="#00205D" font-size="20" font-weight="700">CURRENT ADMIN</text>
        <text x="180" y="125" text-anchor="middle" fill="#888780" font-size="14">Interim Period</text>
        
        <!-- Icon: gavel/push -->
        <rect x="130" y="150" width="100" height="60" rx="8" fill="#E6F1FB"/>
        <text x="180" y="180" text-anchor="middle" fill="#0075C1" font-size="14" font-weight="700">PUSH</text>
        <text x="180" y="200" text-anchor="middle" fill="#0075C1" font-size="14" font-weight="700">FORWARD</text>
        
        <text x="180" y="240" text-anchor="middle" fill="#00205D" font-size="14">Project Modification</text>
        <text x="180" y="260" text-anchor="middle" fill="#00205D" font-size="14">In Progress</text>
        
        <!-- Center: VS / Tension arrow -->
        <polygon points="370,150 410,150 410,140 440,170 410,200 410,190 370,190" fill="#DDA11D"/>
        <polygon points="530,150 490,150 490,140 460,170 490,200 490,190 530,190" fill="#DDA11D"/>
        <circle cx="450" cy="170" r="28" fill="#DDA11D"/>
        <text x="450" y="178" text-anchor="middle" fill="#ffffff" font-size="18" font-weight="700">VS</text>
        
        <!-- Right side: Mayor-elect & critics -->
        <rect x="580" y="60" width="280" height="220" rx="14" fill="#F5F7FA" stroke="#DDA11D" stroke-width="2"/>
        <text x="720" y="100" text-anchor="middle" fill="#DDA11D" font-size="20" font-weight="700">MAYOR-ELECT</text>
        <text x="720" y="125" text-anchor="middle" fill="#888780" font-size="14">Pre-Inauguration</text>
        
        <!-- Icon: pause/wait -->
        <rect x="670" y="150" width="100" height="60" rx="8" fill="#E6F1FB"/>
        <text x="720" y="180" text-anchor="middle" fill="#00205D" font-size="14" font-weight="700">WAIT</text>
        <text x="720" y="200" text-anchor="middle" fill="#00205D" font-size="14" font-weight="700">& REVIEW</text>
        
        <text x="720" y="240" text-anchor="middle" fill="#00205D" font-size="14">Calls for Halt</text>
        <text x="720" y="260" text-anchor="middle" fill="#00205D" font-size="14">Public Demand</text>
        
        <!-- Bottom caption -->
        <text x="450" y="320" text-anchor="middle" fill="#888780" font-size="14" letter-spacing="2">GOVERNANCE TRANSITION CONFLICT</text>
      </svg>
    </div>
  </div>
  <div class="facts">
    <div class="fact"><div class="k">CONTEXT</div><div class="v"><span class="y">Cheonan</span> Sewage Treatment</div></div>
    <div class="fact"><div class="k">DEMAND</div><div class="v"><span class="b">Halt</span> Until Inauguration</div></div>
    <div class="fact"><div class="k">STAKE</div><div class="v">Public Trust & Process</div></div>
  </div>
  <div class="footer">
    <div class="line"></div>
    <div class="row">
      <div class="logo"><span class="h">Hifil</span><span class="m">M</span>&nbsp;<span class="inc">INC.</span></div>
      <div class="center">Water Treatment</div>
      <div class="right"></div>
    </div>
  </div>
</div>
</body>
</html>
