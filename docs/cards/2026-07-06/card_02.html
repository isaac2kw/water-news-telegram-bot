<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  :root{--main-blue:#0075C1;--yellow:#DDA11D;--navy:#00205D;--tint:#E6F1FB;--card-bg:#F5F7FA;--line:#B5D4F4;--gray-light:#888780;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{margin:0;padding:0;font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;}
  .card{width:1080px;height:1080px;background:#ffffff;position:relative;overflow:hidden;}
  .pad{padding:0 90px;}
  .footer{position:absolute;left:0;right:0;bottom:46px;padding:0 90px;}
  .footer .line{height:1px;background:var(--line);margin-bottom:22px;}
  .footer .row{display:flex;align-items:center;justify-content:space-between;}
  .logo{font-size:26px;font-weight:700;}
  .logo .h{color:var(--main-blue);}.logo .m{color:var(--yellow);}.logo .inc{color:var(--navy);}
  .footer .center{color:var(--main-blue);font-size:22px;font-weight:600;letter-spacing:2px;}
  .footer .right{width:120px;}
  .label{display:flex;align-items:center;gap:12px;padding-top:96px;color:var(--main-blue);font-size:24px;font-weight:700;letter-spacing:3px;}
  .label .ldot{width:10px;height:10px;border-radius:50%;background:var(--main-blue);}
  .label .lbadge{margin-left:6px;background:var(--tint);color:var(--main-blue);font-size:18px;letter-spacing:2px;padding:5px 14px;border-radius:20px;}
  .ctitle{margin-top:34px;color:var(--navy);font-size:52px;font-weight:700;line-height:1.18;}
  .ctitle .b{color:var(--main-blue);}.ctitle .y{color:var(--yellow);}
  .cdivider{width:160px;height:4px;background:var(--main-blue);margin-top:30px;}
  .info{margin-top:44px;}
  .facts{position:absolute;left:90px;right:90px;bottom:150px;display:flex;gap:18px;}
  .fact{flex:1;background:var(--card-bg);border-radius:16px;padding:26px 24px;}
  .fact .k{color:var(--gray-light);font-size:18px;letter-spacing:1px;margin-bottom:10px;}
  .fact .v{color:var(--navy);font-size:24px;font-weight:700;line-height:1.25;}
  .fact .v .b{color:var(--main-blue);}.fact .v .y{color:var(--yellow);}
</style>
</head>
<body>
<div class="card" id="card_02">
  <div class="pad">
    <div class="label"><span class="ldot"></span>POLICY · AUDIT<span class="lbadge">KR</span></div>
    <div class="ctitle"><span class="y">Jeju City</span> Officials Face Discipline Over Forged WWTP Completion Certificate</div>
    <div class="cdivider"></div>
    <div class="info">
      <svg width="900" height="300" viewBox="0 0 900 300" xmlns="http://www.w3.org/2000/svg">
        <rect x="30" y="90" width="220" height="120" rx="12" fill="#E6F1FB" stroke="#B5D4F4" stroke-width="2"/>
        <text x="140" y="140" text-anchor="middle" fill="#00205D" font-size="20" font-weight="700">WWTP Project</text>
        <text x="140" y="170" text-anchor="middle" fill="#888780" font-size="16">Completion Filing</text>
        <polygon points="260,150 305,135 305,165" fill="#0075C1"/>
        <rect x="320" y="90" width="220" height="120" rx="12" fill="#F5F7FA" stroke="#DDA11D" stroke-width="2"/>
        <text x="430" y="140" text-anchor="middle" fill="#DDA11D" font-size="20" font-weight="700">FORGERY</text>
        <text x="430" y="170" text-anchor="middle" fill="#888780" font-size="16">Certificate Falsified</text>
        <polygon points="550,150 595,135 595,165" fill="#0075C1"/>
        <rect x="610" y="90" width="260" height="120" rx="12" fill="#E6F1FB" stroke="#B5D4F4" stroke-width="2"/>
        <text x="740" y="140" text-anchor="middle" fill="#00205D" font-size="20" font-weight="700">Heavy Discipline</text>
        <text x="740" y="170" text-anchor="middle" fill="#888780" font-size="16">Requested by Audit</text>
        <text x="450" y="260" text-anchor="middle" fill="#0075C1" font-size="18" font-weight="700" letter-spacing="2">ADMINISTRATIVE ACCOUNTABILITY</text>
      </svg>
    </div>
  </div>
  <div class="facts">
    <div class="fact"><div class="k">LOCATION</div><div class="v"><span class="y">Jeju City</span></div></div>
    <div class="fact"><div class="k">ISSUE</div><div class="v"><span class="b">Document Forgery</span></div></div>
    <div class="fact"><div class="k">ACTION</div><div class="v">Heavy Punishment</div></div>
  </div>
  <div class="footer">
    <div class="line"></div>
    <div class="row">
      <div class="logo"><span class="h">Hifil</span><span class="m">M</span>&nbsp;<span class="inc">INC.</span></div>
      <div class="center">Water Treatment</div>
      <div class="right"></div>
    </div>
  </div>
</div>
</body>
</html>
