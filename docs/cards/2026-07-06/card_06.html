<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  :root{--main-blue:#0075C1;--yellow:#DDA11D;--navy:#00205D;--tint:#E6F1FB;--card-bg:#F5F7FA;--line:#B5D4F4;--gray-light:#888780;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{margin:0;padding:0;font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;}
  .card{width:1080px;height:1080px;background:#ffffff;position:relative;overflow:hidden;}
  .pad{padding:0 90px;}
  .footer{position:absolute;left:0;right:0;bottom:46px;padding:0 90px;}
  .footer .line{height:1px;background:var(--line);margin-bottom:22px;}
  .footer .row{display:flex;align-items:center;justify-content:space-between;}
  .logo{font-size:26px;font-weight:700;}
  .logo .h{color:var(--main-blue);}.logo .m{color:var(--yellow);}.logo .inc{color:var(--navy);}
  .footer .center{color:var(--main-blue);font-size:22px;font-weight:600;letter-spacing:2px;}
  .footer .right{width:120px;}
  .label{display:flex;align-items:center;gap:12px;padding-top:96px;color:var(--main-blue);font-size:24px;font-weight:700;letter-spacing:3px;}
  .label .ldot{width:10px;height:10px;border-radius:50%;background:var(--main-blue);}
  .label .lbadge{margin-left:6px;background:var(--tint);color:var(--main-blue);font-size:18px;letter-spacing:2px;padding:5px 14px;border-radius:20px;}
  .ctitle{margin-top:34px;color:var(--navy);font-size:50px;font-weight:700;line-height:1.18;}
  .ctitle .b{color:var(--main-blue);}.ctitle .y{color:var(--yellow);}
  .cdivider{width:160px;height:4px;background:var(--main-blue);margin-top:30px;}
  .info{margin-top:44px;}
  .facts{position:absolute;left:90px;right:90px;bottom:150px;display:flex;gap:18px;}
  .fact{flex:1;background:var(--card-bg);border-radius:16px;padding:26px 24px;}
  .fact .k{color:var(--gray-light);font-size:18px;letter-spacing:1px;margin-bottom:10px;}
  .fact .v{color:var(--navy);font-size:24px;font-weight:700;line-height:1.25;}
  .fact .v .b{color:var(--main-blue);}.fact .v .y{color:var(--yellow);}
</style>
</head>
<body>
<div class="card" id="card_06">
  <div class="pad">
    <div class="label"><span class="ldot"></span>PFAS · BIOSOLIDS<span class="lbadge">US</span></div>
    <div class="ctitle"><span class="y">DEP</span> Seeks Input on <span class="b">PFAS</span> Safeguards for Biosolids in <span class="y">Pennsylvania</span></div>
    <div class="cdivider"></div>
    <div class="info">
      <svg width="900" height="310" viewBox="0 0 900 310" xmlns="http://www.w3.org/2000/svg">
        <rect x="20" y="110" width="180" height="100" rx="12" fill="#E6F1FB" stroke="#B5D4F4" stroke-width="2"/>
        <text x="110" y="150" text-anchor="middle" fill="#00205D" font-size="18" font-weight="700">Wastewater</text>
        <text x="110" y="175" text-anchor="middle" fill="#00205D" font-size="18" font-weight="700">Treatment</text>
        <polygon points="205,160 240,145 240,175" fill="#0075C1"/>
        <rect x="250" y="110" width="180" height="100" rx="12" fill="#E6F1FB" stroke="#B5D4F4" stroke-width="2"/>
        <text x="340" y="150" text-anchor="middle" fill="#00205D" font-size="18" font-weight="700">Biosolids</text>
        <text x="340" y="175" text-anchor="middle" fill="#00205D" font-size="18" font-weight="700">Land Apply</text>
        <polygon points="435,160 470,145 470,175" fill="#0075C1"/>
        <rect x="480" y="110" width="180" height="100" rx="12" fill="#F5F7FA" stroke="#DDA11D" stroke-width="2"/>
        <text x="570" y="150" text-anchor="middle" fill="#DDA11D" font-size="20" font-weight="700">PFAS</text>
        <text x="570" y="175" text-anchor="middle" fill="#00205D" font-size="16">Forever Chemicals</text>
        <polygon points="665,160 700,145 700,175" fill="#0075C1"/>
        <rect x="710" y="110" width="170" height="100" rx="12" fill="#E6F1FB" stroke="#B5D4F4" stroke-width="2"/>
        <text x="795" y="150" text-anchor="middle" fill="#00205D" font-size="18" font-weight="700">Groundwater</text>
        <text x="795" y="175" text-anchor="middle" fill="#0075C1" font-size="16" font-weight="700">RISK</text>
        <text x="450" y="260" text-anchor="middle" fill="#0075C1" font-size="18" font-weight="700" letter-spacing="2">DEP + AGRICULTURE UPDATED SAFEGUARDS</text>
      </svg>
    </div>
  </div>
  <div class="facts">
    <div class="fact"><div class="k">AGENCY</div><div class="v"><span class="y">PA DEP</span> + Agriculture</div></div>
    <div class="fact"><div class="k">FOCUS</div><div class="v"><span class="b">PFAS</span> in Biosolids</div></div>
    <div class="fact"><div class="k">GOAL</div><div class="v">Prevent Groundwater Pollution</div></div>
  </div>
  <div class="footer">
    <div class="line"></div>
    <div class="row">
      <div class="logo"><span class="h">Hifil</span><span class="m">M</span>&nbsp;<span class="inc">INC.</span></div>
      <div class="center">Water Treatment</div>
      <div class="right"></div>
    </div>
  </div>
</div>
</body>
</html>
