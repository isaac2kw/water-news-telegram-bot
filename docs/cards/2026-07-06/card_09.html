<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  :root{--main-blue:#0075C1;--yellow:#DDA11D;--navy:#00205D;--tint:#E6F1FB;--card-bg:#F5F7FA;--line:#B5D4F4;--gray-light:#888780;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{margin:0;padding:0;font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;}
  .card{width:1080px;height:1080px;background:#ffffff;position:relative;overflow:hidden;}
  .pad{padding:0 90px;}
  .footer{position:absolute;left:0;right:0;bottom:46px;padding:0 90px;}
  .footer .line{height:1px;background:var(--line);margin-bottom:22px;}
  .footer .row{display:flex;align-items:center;justify-content:space-between;}
  .logo{font-size:26px;font-weight:700;}
  .logo .h{color:var(--main-blue);}.logo .m{color:var(--yellow);}.logo .inc{color:var(--navy);}
  .footer .center{color:var(--main-blue);font-size:22px;font-weight:600;letter-spacing:2px;}
  .footer .right{width:120px;}
  .label{display:flex;align-items:center;gap:12px;padding-top:96px;color:var(--main-blue);font-size:24px;font-weight:700;letter-spacing:3px;}
  .label .ldot{width:10px;height:10px;border-radius:50%;background:var(--main-blue);}
  .label .lbadge{margin-left:6px;background:var(--tint);color:var(--main-blue);font-size:18px;letter-spacing:2px;padding:5px 14px;border-radius:20px;}
  .ctitle{margin-top:34px;color:var(--navy);font-size:50px;font-weight:700;line-height:1.18;}
  .ctitle .b{color:var(--main-blue);}.ctitle .y{color:var(--yellow);}
  .cdivider{width:160px;height:4px;background:var(--main-blue);margin-top:30px;}
  .info{margin-top:44px;}
  .facts{position:absolute;left:90px;right:90px;bottom:150px;display:flex;gap:18px;}
  .fact{flex:1;background:var(--card-bg);border-radius:16px;padding:26px 24px;}
  .fact .k{color:var(--gray-light);font-size:18px;letter-spacing:1px;margin-bottom:10px;}
  .fact .v{color:var(--navy);font-size:24px;font-weight:700;line-height:1.25;}
  .fact .v .b{color:var(--main-blue);}.fact .v .y{color:var(--yellow);}
</style>
</head>
<body>
<div class="card" id="card_09">
  <div class="pad">
    <div class="label"><span class="ldot"></span>GOVERNANCE<span class="lbadge">KR</span></div>
    <div class="ctitle">Forged Completion Certificate Scandal Hits <span class="y">Jeju City</span> Sewage Office</div>
    <div class="cdivider"></div>
    <div class="info">
      <svg width="900" height="320" viewBox="0 0 900 320" xmlns="http://www.w3.org/2000/svg">
        <rect x="60" y="60" width="780" height="220" rx="16" fill="#F5F7FA"/>
        <rect x="120" y="120" width="200" height="120" rx="12" fill="#ffffff" stroke="#B5D4F4" stroke-width="2"/>
        <text x="220" y="165" text-anchor="middle" fill="#00205D" font-size="20" font-weight="700">WWTP Facility</text>
        <text x="220" y="200" text-anchor="middle" fill="#888780" font-size="16">Completion Filing</text>
        <line x1="330" y1="180" x2="410" y2="180" stroke="#DDA11D" stroke-width="3" stroke-dasharray="6,4"/>
        <polygon points="400,168 425,180 400,192" fill="#DDA11D"/>
        <rect x="430" y="100" width="150" height="160" rx="12" fill="#DDA11D"/>
        <text x="505" y="170" text-anchor="middle" fill="#ffffff" font-size="20" font-weight="700">FORGED</text>
        <text x="505" y="195" text-anchor="middle" fill="#ffffff" font-size="16">DOCUMENT</text>
        <line x1="590" y1="180" x2="670" y2="180" stroke="#0075C1" stroke-width="3" stroke-dasharray="6,4"/>
        <polygon points="660,168 685,180 660,192" fill="#0075C1"/>
        <rect x="690" y="120" width="130" height="120" rx="12" fill="#ffffff" stroke="#0075C1" stroke-width="2"/>
        <text x="755" y="165" text-anchor="middle" fill="#00205D" font-size="18" font-weight="700">Sanction</text>
        <text x="755" y="195" text-anchor="middle" fill="#0075C1" font-size="16" font-weight="700">Heavy</text>
      </svg>
    </div>
  </div>
  <div class="facts">
    <div class="fact"><div class="k">SITE</div><div class="v"><span class="y">Jeju City</span></div></div>
    <div class="fact"><div class="k">INCIDENT</div><div class="v"><span class="b">Certificate Forgery</span></div></div>
    <div class="fact"><div class="k">OUTCOME</div><div class="v">Heavy Discipline</div></div>
  </div>
  <div class="footer">
    <div class="line"></div>
    <div class="row">
      <div class="logo"><span class="h">Hifil</span><span class="m">M</span>&nbsp;<span class="inc">INC.</span></div>
      <div class="center">Water Treatment</div>
      <div class="right"></div>
    </div>
  </div>
</div>
</body>
</html>
