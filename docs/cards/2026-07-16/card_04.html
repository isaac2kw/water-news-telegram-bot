<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  :root{--main-blue:#0075C1;--yellow:#DDA11D;--navy:#00205D;--tint:#E6F1FB;--card-bg:#F5F7FA;--line:#B5D4F4;--gray-light:#888780;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;}
  .card{width:1080px;height:1080px;background:#fff;position:relative;overflow:hidden;}
  .pad{padding:0 90px;}
  .footer{position:absolute;left:0;right:0;bottom:46px;padding:0 90px;}
  .footer .line{height:1px;background:var(--line);margin-bottom:22px;}
  .footer .row{display:flex;align-items:center;justify-content:space-between;}
  .logo{font-size:26px;font-weight:700;} .logo .h{color:var(--main-blue);} .logo .m{color:var(--yellow);} .logo .inc{color:var(--navy);}
  .footer .center{color:var(--main-blue);font-size:22px;font-weight:600;letter-spacing:2px;}
  .footer .right{width:120px;}
  .label{display:flex;align-items:center;gap:12px;padding-top:96px;color:var(--main-blue);font-size:24px;font-weight:700;letter-spacing:3px;}
  .label .ldot{width:10px;height:10px;border-radius:50%;background:var(--main-blue);}
  .label .lbadge{margin-left:6px;background:var(--tint);color:var(--main-blue);font-size:18px;letter-spacing:2px;padding:5px 14px;border-radius:20px;}
  .ctitle{margin-top:34px;color:var(--navy);font-size:54px;font-weight:700;line-height:1.18;}
  .ctitle .b{color:var(--main-blue);} .ctitle .y{color:var(--yellow);}
  .cdivider{width:160px;height:4px;background:var(--main-blue);margin-top:30px;}
  .info{margin-top:44px;}
  .facts{position:absolute;left:90px;right:90px;bottom:150px;display:flex;gap:18px;}
  .fact{flex:1;background:var(--card-bg);border-radius:16px;padding:26px 24px;}
  .fact .k{color:var(--gray-light);font-size:18px;letter-spacing:1px;margin-bottom:10px;}
  .fact .v{color:var(--navy);font-size:24px;font-weight:700;line-height:1.25;}
  .fact .v .b{color:var(--main-blue);} .fact .v .y{color:var(--yellow);}
</style>
</head>
<body>
<div class="card" id="card_04">
  <div class="pad">
    <div class="label"><span class="ldot"></span>MEMBRANE · TECH<span class="lbadge">INDIA</span></div>
    <div class="ctitle"><span class="y">IIT-Madras</span> Membrane Route Targets <span class="b">Chemical Industry Reuse</span></div>
    <div class="cdivider"></div>
    <div class="info">
      <svg width="900" height="320" viewBox="0 0 900 320" xmlns="http://www.w3.org/2000/svg">
        <rect x="40" y="80" width="820" height="180" rx="14" fill="#F5F7FA" stroke="#B5D4F4"/>
        <text x="450" y="115" text-anchor="middle" font-family="Helvetica" font-size="20" font-weight="700" fill="#00205D">Membrane-Assisted Treatment Flow</text>

        <rect x="70" y="150" width="130" height="70" rx="8" fill="#E6F1FB" stroke="#0075C1"/>
        <text x="135" y="185" text-anchor="middle" font-family="Helvetica" font-size="15" font-weight="700" fill="#00205D">Chemical</text>
        <text x="135" y="205" text-anchor="middle" font-family="Helvetica" font-size="14" fill="#888780">Wastewater</text>

        <polygon points="210,180 235,180 235,170 255,190 235,210 235,200 210,200" fill="#0075C1"/>

        <rect x="265" y="150" width="130" height="70" rx="8" fill="#E6F1FB" stroke="#0075C1"/>
        <text x="330" y="185" text-anchor="middle" font-family="Helvetica" font-size="15" font-weight="700" fill="#00205D">Pretreatment</text>
        <text x="330" y="205" text-anchor="middle" font-family="Helvetica" font-size="14" fill="#888780">Coagulation</text>

        <polygon points="405,180 430,180 430,170 450,190 430,210 430,200 405,200" fill="#0075C1"/>

        <rect x="460" y="150" width="130" height="70" rx="8" fill="#DDA11D"/>
        <text x="525" y="185" text-anchor="middle" font-family="Helvetica" font-size="15" font-weight="700" fill="#ffffff">Membrane</text>
        <text x="525" y="205" text-anchor="middle" font-family="Helvetica" font-size="14" fill="#ffffff">Separation</text>

        <polygon points="600,180 625,180 625,170 645,190 625,210 625,200 600,200" fill="#0075C1"/>

        <rect x="655" y="150" width="180" height="70" rx="8" fill="#0075C1"/>
        <text x="745" y="185" text-anchor="middle" font-family="Helvetica" font-size="15" font-weight="700" fill="#ffffff">Reusable Water</text>
        <text x="745" y="205" text-anchor="middle" font-family="Helvetica" font-size="14" fill="#E6F1FB">Back to process</text>

        <text x="450" y="295" text-anchor="middle" font-family="Helvetica" font-size="17" font-weight="600" fill="#00205D">Closed-loop concept for chemical plants</text>
      </svg>
    </div>
  </div>
  <div class="facts">
    <div class="fact"><div class="k">TECHNOLOGY</div><div class="v"><span class="b">Membrane</span></div></div>
    <div class="fact"><div class="k">SECTOR</div><div class="v">Chemical Industry</div></div>
    <div class="fact"><div class="k">OUTCOME</div><div class="v"><span class="y">Water Reuse</span></div></div>
  </div>
  <div class="footer">
    <div class="line"></div>
    <div class="row">
      <div class="logo"><span class="h">Hifil</span><span class="m">M</span>&nbsp;<span class="inc">INC.</span></div>
      <div class="center">Water Treatment</div>
      <div class="right"></div>
    </div>
  </div>
</div>
</body>
</html>
