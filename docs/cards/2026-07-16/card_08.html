<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  :root{--main-blue:#0075C1;--yellow:#DDA11D;--navy:#00205D;--tint:#E6F1FB;--card-bg:#F5F7FA;--line:#B5D4F4;--gray-light:#888780;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;}
  .card{width:1080px;height:1080px;background:#fff;position:relative;overflow:hidden;}
  .pad{padding:0 90px;}
  .footer{position:absolute;left:0;right:0;bottom:46px;padding:0 90px;}
  .footer .line{height:1px;background:var(--line);margin-bottom:22px;}
  .footer .row{display:flex;align-items:center;justify-content:space-between;}
  .logo{font-size:26px;font-weight:700;} .logo .h{color:var(--main-blue);} .logo .m{color:var(--yellow);} .logo .inc{color:var(--navy);}
  .footer .center{color:var(--main-blue);font-size:22px;font-weight:600;letter-spacing:2px;}
  .footer .right{width:120px;}
  .label{display:flex;align-items:center;gap:12px;padding-top:96px;color:var(--main-blue);font-size:24px;font-weight:700;letter-spacing:3px;}
  .label .ldot{width:10px;height:10px;border-radius:50%;background:var(--main-blue);}
  .label .lbadge{margin-left:6px;background:var(--tint);color:var(--main-blue);font-size:18px;letter-spacing:2px;padding:5px 14px;border-radius:20px;}
  .ctitle{margin-top:34px;color:var(--navy);font-size:52px;font-weight:700;line-height:1.18;}
  .ctitle .b{color:var(--main-blue);} .ctitle .y{color:var(--yellow);}
  .cdivider{width:160px;height:4px;background:var(--main-blue);margin-top:30px;}
  .info{margin-top:44px;}
  .facts{position:absolute;left:90px;right:90px;bottom:150px;display:flex;gap:18px;}
  .fact{flex:1;background:var(--card-bg);border-radius:16px;padding:26px 24px;}
  .fact .k{color:var(--gray-light);font-size:18px;letter-spacing:1px;margin-bottom:10px;}
  .fact .v{color:var(--navy);font-size:24px;font-weight:700;line-height:1.25;}
  .fact .v .b{color:var(--main-blue);} .fact .v .y{color:var(--yellow);}
</style>
</head>
<body>
<div class="card" id="card_08">
  <div class="pad">
    <div class="label"><span class="ldot"></span>PPP · BRIBERY<span class="lbadge">KOREA</span></div>
    <div class="ctitle"><span class="y">Ansan</span> Sewage PPP Bribery Case: Officials <span class="b">Formally Charged</span></div>
    <div class="cdivider"></div>
    <div class="info">
      <svg width="900" height="320" viewBox="0 0 900 320" xmlns="http://www.w3.org/2000/svg">
        <rect x="40" y="80" width="820" height="180" rx="14" fill="#F5F7FA" stroke="#B5D4F4"/>
        <text x="450" y="115" text-anchor="middle" font-family="Helvetica" font-size="20" font-weight="700" fill="#00205D">PPP Project Timeline</text>

        <circle cx="130" cy="185" r="18" fill="#0075C1"/>
        <text x="130" y="230" text-anchor="middle" font-family="Helvetica" font-size="14" font-weight="700" fill="#00205D">Bid</text>
        <text x="130" y="248" text-anchor="middle" font-family="Helvetica" font-size="12" fill="#888780">Contractor Selected</text>

        <line x1="148" y1="185" x2="292" y2="185" stroke="#B5D4F4" stroke-width="3"/>

        <circle cx="310" cy="185" r="18" fill="#DDA11D"/>
        <text x="310" y="230" text-anchor="middle" font-family="Helvetica" font-size="14" font-weight="700" fill="#DDA11D">Bribes</text>
        <text x="310" y="248" text-anchor="middle" font-family="Helvetica" font-size="12" fill="#888780">Alleged Payments</text>

        <line x1="328" y1="185" x2="472" y2="185" stroke="#B5D4F4" stroke-width="3"/>

        <circle cx="490" cy="185" r="18" fill="#0075C1"/>
        <text x="490" y="230" text-anchor="middle" font-family="Helvetica" font-size="14" font-weight="700" fill="#00205D">Probe</text>
        <text x="490" y="248" text-anchor="middle" font-family="Helvetica" font-size="12" fill="#888780">Police Investigation</text>

        <line x1="508" y1="185" x2="652" y2="185" stroke="#B5D4F4" stroke-width="3"/>

        <circle cx="670" cy="185" r="18" fill="#00205D"/>
        <text x="670" y="230" text-anchor="middle" font-family="Helvetica" font-size="14" font-weight="700" fill="#00205D">Referral</text>
        <text x="670" y="248" text-anchor="middle" font-family="Helvetica" font-size="12" fill="#888780">To Prosecutors</text>

        <line x1="688" y1="185" x2="780" y2="185" stroke="#B5D4F4" stroke-width="3"/>

        <circle cx="800" cy="185" r="18" fill="#DDA11D"/>
        <text x="800" y="230" text-anchor="middle" font-family="Helvetica" font-size="14" font-weight="700" fill="#DDA11D">Trial</text>
        <text x="800" y="248" text-anchor="middle" font-family="Helvetica" font-size="12" fill="#888780">Pending</text>
      </svg>
    </div>
  </div>
  <div class="facts">
    <div class="fact"><div class="k">SCHEME</div><div class="v"><span class="b">PPP Project</span></div></div>
    <div class="fact"><div class="k">CITY</div><div class="v"><span class="y">Ansan</span></div></div>
    <div class="fact"><div class="k">CHARGE</div><div class="v">Bribery</div></div>
  </div>
  <div class="footer">
    <div class="line"></div>
    <div class="row">
      <div class="logo"><span class="h">Hifil</span><span class="m">M</span>&nbsp;<span class="inc">INC.</span></div>
      <div class="center">Water Treatment</div>
      <div class="right"></div>
    </div>
  </div>
</div>
</body>
</html>
