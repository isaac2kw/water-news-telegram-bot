<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  :root{--main-blue:#0075C1;--yellow:#DDA11D;--navy:#00205D;--tint:#E6F1FB;--card-bg:#F5F7FA;--line:#B5D4F4;--gray-light:#888780;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;}
  .card{width:1080px;height:1080px;background:#fff;position:relative;overflow:hidden;}
  .pad{padding:0 90px;}
  .footer{position:absolute;left:0;right:0;bottom:46px;padding:0 90px;}
  .footer .line{height:1px;background:var(--line);margin-bottom:22px;}
  .footer .row{display:flex;align-items:center;justify-content:space-between;}
  .logo{font-size:26px;font-weight:700;} .logo .h{color:var(--main-blue);} .logo .m{color:var(--yellow);} .logo .inc{color:var(--navy);}
  .footer .center{color:var(--main-blue);font-size:22px;font-weight:600;letter-spacing:2px;}
  .footer .right{width:120px;}
  .label{display:flex;align-items:center;gap:12px;padding-top:96px;color:var(--main-blue);font-size:24px;font-weight:700;letter-spacing:3px;}
  .label .ldot{width:10px;height:10px;border-radius:50%;background:var(--main-blue);}
  .label .lbadge{margin-left:6px;background:var(--tint);color:var(--main-blue);font-size:18px;letter-spacing:2px;padding:5px 14px;border-radius:20px;}
  .ctitle{margin-top:34px;color:var(--navy);font-size:52px;font-weight:700;line-height:1.18;}
  .ctitle .b{color:var(--main-blue);} .ctitle .y{color:var(--yellow);}
  .cdivider{width:160px;height:4px;background:var(--main-blue);margin-top:30px;}
  .info{margin-top:44px;}
  .facts{position:absolute;left:90px;right:90px;bottom:150px;display:flex;gap:18px;}
  .fact{flex:1;background:var(--card-bg);border-radius:16px;padding:26px 24px;}
  .fact .k{color:var(--gray-light);font-size:18px;letter-spacing:1px;margin-bottom:10px;}
  .fact .v{color:var(--navy);font-size:24px;font-weight:700;line-height:1.25;}
  .fact .v .b{color:var(--main-blue);} .fact .v .y{color:var(--yellow);}
</style>
</head>
<body>
<div class="card" id="card_01">
  <div class="pad">
    <div class="label"><span class="ldot"></span>INCIDENT · POLLUTION<span class="lbadge">USA</span></div>
    <div class="ctitle">49M Gallons of Sewage Spill into <span class="y">Hudson River</span> After <span class="y">Yonkers</span> WWTP Power Failure</div>
    <div class="cdivider"></div>
    <div class="info">
      <svg width="900" height="320" viewBox="0 0 900 320" xmlns="http://www.w3.org/2000/svg">
        <rect x="20" y="80" width="200" height="130" rx="12" fill="#F5F7FA" stroke="#B5D4F4"/>
        <text x="120" y="130" text-anchor="middle" font-family="Helvetica" font-size="20" font-weight="700" fill="#00205D">Yonkers</text>
        <text x="120" y="158" text-anchor="middle" font-family="Helvetica" font-size="16" fill="#888780">WWTP</text>
        <text x="120" y="188" text-anchor="middle" font-family="Helvetica" font-size="14" fill="#0075C1">Power Failure</text>

        <polygon points="240,135 300,135 300,120 340,145 300,170 300,155 240,155" fill="#DDA11D"/>
        <text x="290" y="105" text-anchor="middle" font-family="Helvetica" font-size="16" font-weight="700" fill="#DDA11D">Bypass</text>

        <rect x="360" y="80" width="220" height="130" rx="12" fill="#E6F1FB" stroke="#0075C1" stroke-width="2"/>
        <text x="470" y="125" text-anchor="middle" font-family="Helvetica" font-size="38" font-weight="700" fill="#0075C1">49M</text>
        <text x="470" y="155" text-anchor="middle" font-family="Helvetica" font-size="18" fill="#00205D">Gallons Untreated</text>
        <text x="470" y="185" text-anchor="middle" font-family="Helvetica" font-size="14" fill="#888780">Raw Sewage Released</text>

        <polygon points="600,135 660,135 660,120 700,145 660,170 660,155 600,155" fill="#0075C1"/>

        <rect x="720" y="80" width="160" height="130" rx="12" fill="#F5F7FA" stroke="#B5D4F4"/>
        <text x="800" y="130" text-anchor="middle" font-family="Helvetica" font-size="20" font-weight="700" fill="#DDA11D">Hudson</text>
        <text x="800" y="158" text-anchor="middle" font-family="Helvetica" font-size="16" fill="#00205D">River</text>
        <text x="800" y="188" text-anchor="middle" font-family="Helvetica" font-size="14" fill="#888780">Ecosystem Risk</text>

        <text x="450" y="270" text-anchor="middle" font-family="Helvetica" font-size="18" font-weight="600" fill="#00205D">Investigation into accountability underway</text>
      </svg>
    </div>
  </div>
  <div class="facts">
    <div class="fact"><div class="k">LOCATION</div><div class="v"><span class="y">Yonkers, NY</span></div></div>
    <div class="fact"><div class="k">VOLUME</div><div class="v"><span class="b">49M Gallons</span></div></div>
    <div class="fact"><div class="k">CAUSE</div><div class="v">Power Failure</div></div>
  </div>
  <div class="footer">
    <div class="line"></div>
    <div class="row">
      <div class="logo"><span class="h">Hifil</span><span class="m">M</span>&nbsp;<span class="inc">INC.</span></div>
      <div class="center">Water Treatment</div>
      <div class="right"></div>
    </div>
  </div>
</div>
</body>
</html>
