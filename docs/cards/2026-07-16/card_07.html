<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  :root{--main-blue:#0075C1;--yellow:#DDA11D;--navy:#00205D;--tint:#E6F1FB;--card-bg:#F5F7FA;--line:#B5D4F4;--gray-light:#888780;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;}
  .card{width:1080px;height:1080px;background:#fff;position:relative;overflow:hidden;}
  .pad{padding:0 90px;}
  .footer{position:absolute;left:0;right:0;bottom:46px;padding:0 90px;}
  .footer .line{height:1px;background:var(--line);margin-bottom:22px;}
  .footer .row{display:flex;align-items:center;justify-content:space-between;}
  .logo{font-size:26px;font-weight:700;} .logo .h{color:var(--main-blue);} .logo .m{color:var(--yellow);} .logo .inc{color:var(--navy);}
  .footer .center{color:var(--main-blue);font-size:22px;font-weight:600;letter-spacing:2px;}
  .footer .right{width:120px;}
  .label{display:flex;align-items:center;gap:12px;padding-top:96px;color:var(--main-blue);font-size:24px;font-weight:700;letter-spacing:3px;}
  .label .ldot{width:10px;height:10px;border-radius:50%;background:var(--main-blue);}
  .label .lbadge{margin-left:6px;background:var(--tint);color:var(--main-blue);font-size:18px;letter-spacing:2px;padding:5px 14px;border-radius:20px;}
  .ctitle{margin-top:34px;color:var(--navy);font-size:54px;font-weight:700;line-height:1.18;}
  .ctitle .b{color:var(--main-blue);} .ctitle .y{color:var(--yellow);}
  .cdivider{width:160px;height:4px;background:var(--main-blue);margin-top:30px;}
  .info{margin-top:44px;}
  .facts{position:absolute;left:90px;right:90px;bottom:150px;display:flex;gap:18px;}
  .fact{flex:1;background:var(--card-bg);border-radius:16px;padding:26px 24px;}
  .fact .k{color:var(--gray-light);font-size:18px;letter-spacing:1px;margin-bottom:10px;}
  .fact .v{color:var(--navy);font-size:24px;font-weight:700;line-height:1.25;}
  .fact .v .b{color:var(--main-blue);} .fact .v .y{color:var(--yellow);}
</style>
</head>
<body>
<div class="card" id="card_07">
  <div class="pad">
    <div class="label"><span class="ldot"></span>POLICY · CORRUPTION<span class="lbadge">KOREA</span></div>
    <div class="ctitle">7 Suspects Sent to Prosecutors Over <span class="y">Ansan</span> <span class="b">Sewage Plant</span> Bribes</div>
    <div class="cdivider"></div>
    <div class="info">
      <svg width="900" height="320" viewBox="0 0 900 320" xmlns="http://www.w3.org/2000/svg">
        <rect x="40" y="70" width="820" height="200" rx="14" fill="#F5F7FA" stroke="#B5D4F4"/>
        <text x="450" y="110" text-anchor="middle" font-family="Helvetica" font-size="22" font-weight="700" fill="#00205D">Suspects Referred</text>

        <circle cx="140" cy="190" r="30" fill="#0075C1"/>
        <text x="140" y="197" text-anchor="middle" font-family="Helvetica" font-size="16" font-weight="700" fill="#ffffff">1</text>
        <circle cx="220" cy="190" r="30" fill="#0075C1"/>
        <text x="220" y="197" text-anchor="middle" font-family="Helvetica" font-size="16" font-weight="700" fill="#ffffff">2</text>
        <circle cx="300" cy="190" r="30" fill="#0075C1"/>
        <text x="300" y="197" text-anchor="middle" font-family="Helvetica" font-size="16" font-weight="700" fill="#ffffff">3</text>
        <circle cx="380" cy="190" r="30" fill="#0075C1"/>
        <text x="380" y="197" text-anchor="middle" font-family="Helvetica" font-size="16" font-weight="700" fill="#ffffff">4</text>
        <circle cx="460" cy="190" r="30" fill="#DDA11D"/>
        <text x="460" y="197" text-anchor="middle" font-family="Helvetica" font-size="16" font-weight="700" fill="#ffffff">5</text>
        <circle cx="540" cy="190" r="30" fill="#DDA11D"/>
        <text x="540" y="197" text-anchor="middle" font-family="Helvetica" font-size="16" font-weight="700" fill="#ffffff">6</text>
        <circle cx="620" cy="190" r="30" fill="#DDA11D"/>
        <text x="620" y="197" text-anchor="middle" font-family="Helvetica" font-size="16" font-weight="700" fill="#ffffff">7</text>

        <text x="260" y="250" text-anchor="middle" font-family="Helvetica" font-size="16" fill="#0075C1">Public Officials</text>
        <text x="560" y="250" text-anchor="middle" font-family="Helvetica" font-size="16" fill="#DDA11D">Contractors &amp; Broker</text>

        <text x="770" y="197" font-family="Helvetica" font-size="42" font-weight="700" fill="#DDA11D">7</text>
      </svg>
    </div>
  </div>
  <div class="facts">
    <div class="fact"><div class="k">SUSPECTS</div><div class="v"><span class="b">7 People</span></div></div>
    <div class="fact"><div class="k">CITY</div><div class="v"><span class="y">Ansan</span></div></div>
    <div class="fact"><div class="k">ACTION</div><div class="v">Referred</div></div>
  </div>
  <div class="footer">
    <div class="line"></div>
    <div class="row">
      <div class="logo"><span class="h">Hifil</span><span class="m">M</span>&nbsp;<span class="inc">INC.</span></div>
      <div class="center">Water Treatment</div>
      <div class="right"></div>
    </div>
  </div>
</div>
</body>
</html>
