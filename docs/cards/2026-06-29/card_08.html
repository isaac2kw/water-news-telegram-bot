<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  :root{--main-blue:#0075C1;--yellow:#DDA11D;--navy:#00205D;--tint:#E6F1FB;--card-bg:#F5F7FA;--line:#B5D4F4;--gray-light:#888780;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;}
  .card{width:1080px;height:1080px;background:#ffffff;position:relative;overflow:hidden;}
  .pad{padding:0 90px;}
  .footer{position:absolute;left:0;right:0;bottom:46px;padding:0 90px;}
  .footer .line{height:1px;background:var(--line);margin-bottom:22px;}
  .footer .row{display:flex;align-items:center;justify-content:space-between;}
  .logo{font-size:26px;font-weight:700;}
  .logo .h{color:var(--main-blue);} .logo .m{color:var(--yellow);} .logo .inc{color:var(--navy);}
  .footer .center{color:var(--main-blue);font-size:22px;font-weight:600;letter-spacing:2px;}
  .footer .right{width:120px;}
  .label{display:flex;align-items:center;gap:12px;padding-top:96px;color:var(--main-blue);font-size:24px;font-weight:700;letter-spacing:3px;}
  .label .ldot{width:10px;height:10px;border-radius:50%;background:var(--main-blue);}
  .label .lbadge{margin-left:6px;background:var(--tint);color:var(--main-blue);font-size:18px;letter-spacing:2px;padding:5px 14px;border-radius:20px;}
  .ctitle{margin-top:34px;color:var(--navy);font-size:52px;font-weight:700;line-height:1.18;}
  .ctitle .b{color:var(--main-blue);} .ctitle .y{color:var(--yellow);}
  .cdivider{width:160px;height:4px;background:var(--main-blue);margin-top:30px;}
  .info{margin-top:48px;}
  .facts{position:absolute;left:90px;right:90px;bottom:150px;display:flex;gap:18px;}
  .fact{flex:1;background:var(--card-bg);border-radius:16px;padding:26px 24px;}
  .fact .k{color:var(--gray-light);font-size:18px;letter-spacing:1px;margin-bottom:10px;}
  .fact .v{color:var(--navy);font-size:23px;font-weight:700;line-height:1.25;}
  .fact .v .b{color:var(--main-blue);} .fact .v .y{color:var(--yellow);}
</style>
</head>
<body>
<div class="card" id="card_08">
  <div class="pad">
    <div class="label"><span class="ldot"></span>SITE SELECTION<span class="lbadge">KR</span></div>
    <div class="ctitle"><span class="y">Geoje Chilcheondo</span> Sewage Plant Site Selection Nears After <span class="b">10-Year Delay</span></div>
    <div class="cdivider"></div>
    <div class="info">
      <svg width="900" height="320" viewBox="0 0 900 320" xmlns="http://www.w3.org/2000/svg">
        <line x1="80" y1="180" x2="820" y2="180" stroke="#B5D4F4" stroke-width="3"/>
        <circle cx="130" cy="180" r="14" fill="#888780"/>
        <text x="130" y="140" text-anchor="middle" font-family="Helvetica" font-size="16" font-weight="700" fill="#888780">2016</text>
        <text x="130" y="220" text-anchor="middle" font-family="Helvetica" font-size="14" fill="#888780">Project</text>
        <text x="130" y="240" text-anchor="middle" font-family="Helvetica" font-size="14" fill="#888780">launched</text>
        <circle cx="350" cy="180" r="14" fill="#B5D4F4"/>
        <text x="350" y="140" text-anchor="middle" font-family="Helvetica" font-size="16" font-weight="700" fill="#888780">2016-2025</text>
        <text x="350" y="220" text-anchor="middle" font-family="Helvetica" font-size="14" fill="#888780">10 years</text>
        <text x="350" y="240" text-anchor="middle" font-family="Helvetica" font-size="14" fill="#888780">stalled</text>
        <circle cx="570" cy="180" r="14" fill="#0075C1"/>
        <text x="570" y="140" text-anchor="middle" font-family="Helvetica" font-size="16" font-weight="700" fill="#0075C1">2026</text>
        <text x="570" y="220" text-anchor="middle" font-family="Helvetica" font-size="14" font-weight="700" fill="#0075C1">Site selection</text>
        <text x="570" y="240" text-anchor="middle" font-family="Helvetica" font-size="14" font-weight="700" fill="#0075C1">imminent</text>
        <circle cx="780" cy="180" r="18" fill="#DDA11D"/>
        <text x="780" y="140" text-anchor="middle" font-family="Helvetica" font-size="16" font-weight="700" fill="#DDA11D">NEXT</text>
        <text x="780" y="220" text-anchor="middle" font-family="Helvetica" font-size="14" font-weight="700" fill="#DDA11D">Construction</text>
        <text x="780" y="240" text-anchor="middle" font-family="Helvetica" font-size="14" font-weight="700" fill="#DDA11D">phase</text>
      </svg>
    </div>
  </div>
  <div class="facts">
    <div class="fact"><div class="k">CATEGORY</div><div class="v"><span class="b">Site Selection</span></div></div>
    <div class="fact"><div class="k">LOCATION</div><div class="v"><span class="y">Geoje Chilcheondo</span></div></div>
    <div class="fact"><div class="k">DELAY</div><div class="v"><span class="y">10 years</span></div></div>
  </div>
  <div class="footer">
    <div class="line"></div>
    <div class="row">
      <div class="logo"><span class="h">Hifil</span><span class="m">M</span>&nbsp;<span class="inc">INC.</span></div>
      <div class="center">Water Treatment</div>
      <div class="right"></div>
    </div>
  </div>
</div>
</body>
</html>
