<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  :root{--main-blue:#0075C1;--yellow:#DDA11D;--navy:#00205D;--tint:#E6F1FB;--card-bg:#F5F7FA;--line:#B5D4F4;--gray-light:#888780;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;}
  .card{width:1080px;height:1080px;background:#ffffff;position:relative;overflow:hidden;}
  .pad{padding:0 90px;}
  .footer{position:absolute;left:0;right:0;bottom:46px;padding:0 90px;}
  .footer .line{height:1px;background:var(--line);margin-bottom:22px;}
  .footer .row{display:flex;align-items:center;justify-content:space-between;}
  .logo{font-size:26px;font-weight:700;}
  .logo .h{color:var(--main-blue);} .logo .m{color:var(--yellow);} .logo .inc{color:var(--navy);}
  .footer .center{color:var(--main-blue);font-size:22px;font-weight:600;letter-spacing:2px;}
  .footer .right{width:120px;}
  .label{display:flex;align-items:center;gap:12px;padding-top:96px;color:var(--main-blue);font-size:24px;font-weight:700;letter-spacing:3px;}
  .label .ldot{width:10px;height:10px;border-radius:50%;background:var(--main-blue);}
  .label .lbadge{margin-left:6px;background:var(--tint);color:var(--main-blue);font-size:18px;letter-spacing:2px;padding:5px 14px;border-radius:20px;}
  .ctitle{margin-top:34px;color:var(--navy);font-size:54px;font-weight:700;line-height:1.18;}
  .ctitle .b{color:var(--main-blue);} .ctitle .y{color:var(--yellow);}
  .cdivider{width:160px;height:4px;background:var(--main-blue);margin-top:30px;}
  .info{margin-top:48px;}
  .facts{position:absolute;left:90px;right:90px;bottom:150px;display:flex;gap:18px;}
  .fact{flex:1;background:var(--card-bg);border-radius:16px;padding:26px 24px;}
  .fact .k{color:var(--gray-light);font-size:18px;letter-spacing:1px;margin-bottom:10px;}
  .fact .v{color:var(--navy);font-size:24px;font-weight:700;line-height:1.25;}
  .fact .v .b{color:var(--main-blue);} .fact .v .y{color:var(--yellow);}
</style>
</head>
<body>
<div class="card" id="card_09">
  <div class="pad">
    <div class="label"><span class="ldot"></span>MARKETS<span class="lbadge">XYL</span></div>
    <div class="ctitle">Is <span class="y">Xylem</span> Undervalued After Its New <span class="b">Industrial Wastewater</span> Partnership?</div>
    <div class="cdivider"></div>
    <div class="info">
      <svg width="900" height="320" viewBox="0 0 900 320" xmlns="http://www.w3.org/2000/svg">
        <line x1="80" y1="270" x2="860" y2="270" stroke="#B5D4F4" stroke-width="2"/>
        <line x1="80" y1="60" x2="80" y2="270" stroke="#B5D4F4" stroke-width="2"/>
        <polyline points="80,220 200,210 320,195 440,170 560,150 680,130 820,110" fill="none" stroke="#0075C1" stroke-width="4"/>
        <circle cx="200" cy="210" r="6" fill="#0075C1"/>
        <circle cx="440" cy="170" r="6" fill="#0075C1"/>
        <circle cx="680" cy="130" r="8" fill="#DDA11D"/>
        <line x1="680" y1="80" x2="680" y2="125" stroke="#DDA11D" stroke-width="2" stroke-dasharray="4,4"/>
        <text x="680" y="70" text-anchor="middle" font-family="Helvetica" font-size="16" font-weight="700" fill="#DDA11D">PARTNERSHIP</text>
        <text x="680" y="92" text-anchor="middle" font-family="Helvetica" font-size="14" fill="#DDA11D">announced</text>
        <text x="820" y="100" text-anchor="middle" font-family="Helvetica" font-size="18" font-weight="700" fill="#0075C1">XYL ▲</text>
        <text x="120" y="295" font-family="Helvetica" font-size="14" fill="#888780">Q1</text>
        <text x="240" y="295" font-family="Helvetica" font-size="14" fill="#888780">Q2</text>
        <text x="360" y="295" font-family="Helvetica" font-size="14" fill="#888780">Q3</text>
        <text x="480" y="295" font-family="Helvetica" font-size="14" fill="#888780">Q4</text>
        <text x="600" y="295" font-family="Helvetica" font-size="14" fill="#888780">2026 Q1</text>
        <text x="730" y="295" font-family="Helvetica" font-size="14" fill="#888780">Q2</text>
        <text x="80" y="45" font-family="Helvetica" font-size="20" font-weight="700" fill="#00205D">XYL share price trend</text>
      </svg>
    </div>
  </div>
  <div class="facts">
    <div class="fact"><div class="k">CATEGORY</div><div class="v"><span class="b">Stock Analysis</span></div></div>
    <div class="fact"><div class="k">TICKER</div><div class="v"><span class="y">XYL</span></div></div>
    <div class="fact"><div class="k">CATALYST</div><div class="v">New Partnership</div></div>
  </div>
  <div class="footer">
    <div class="line"></div>
    <div class="row">
      <div class="logo"><span class="h">Hifil</span><span class="m">M</span>&nbsp;<span class="inc">INC.</span></div>
      <div class="center">Water Treatment</div>
      <div class="right"></div>
    </div>
  </div>
</div>
</body>
</html>
